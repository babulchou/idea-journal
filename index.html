<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="随手记">
<meta name="theme-color" content="#000000">
<title>随手记</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --card: rgba(28, 28, 30, 0.8);
    --card-solid: #1c1c1e;
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.3);
    --accent: #0a84ff;
    --accent-light: rgba(10,132,255,0.15);
    --green: #30d158;
    --orange: #ff9f0a;
    --pink: #ff375f;
    --purple: #bf5af2;
    --teal: #64d2ff;
    --yellow: #ffd60a;
    --border: rgba(255,255,255,0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: var(--safe-bottom);
  }

  /* ---- Header ---- */
  .header {
    padding: 16px 20px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--card);
    border: none; color: var(--accent); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); margin-right: 4px;
  }
  .status-dot.offline { background: var(--pink); box-shadow: 0 0 6px var(--pink); }

  /* ---- Tabs ---- */
  .tabs { display: flex; padding: 8px 20px; position: relative; }
  .tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 15px; font-weight: 500;
    color: var(--text-secondary); background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: color 0.2s;
  }
  .tab.active { color: var(--text); }
  .tab-indicator {
    position: absolute; bottom: 0; height: 2px; background: var(--accent); border-radius: 1px;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ---- Compose ---- */
  .compose { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
  .compose-input {
    width: 100%; min-height: 140px; max-height: 40vh;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; color: var(--text); font-size: 16px; line-height: 1.6;
    resize: none; outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  .compose-input::placeholder { color: var(--text-tertiary); }
  .compose-input:focus { border-color: rgba(10,132,255,0.4); }

  /* ---- Category Chips (inline) ---- */
  .compose-section-label {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px;
  }
  .ai-badge {
    font-size: 10px; font-weight: 600; background: linear-gradient(135deg, #0a84ff, #bf5af2);
    color: white; padding: 1px 7px; border-radius: 6px;
  }
  .compose-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .compose-chip {
    padding: 8px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    position: relative;
  }
  .compose-chip:active { transform: scale(0.95); }
  .compose-chip.selected {
    border-color: var(--accent); background: var(--accent-light); color: var(--accent);
  }
  .compose-chip .rec-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: none;
    position: absolute; top: 4px; right: 4px;
  }
  .compose-chip.recommended .rec-dot { display: block; }

  .tags-input-row { display: flex; gap: 8px; align-items: center; }
  .tags-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
  }
  .tags-input::placeholder { color: var(--text-tertiary); }

  .submit-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--accent); color: white; font-size: 17px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
  .submit-btn:disabled { background: rgba(10,132,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; }

  /* ---- Insight Card (post-save) ---- */
  .insight-card {
    background: linear-gradient(135deg, rgba(10,132,255,0.08), rgba(191,90,242,0.08));
    border: 1px solid rgba(10,132,255,0.15);
    border-radius: 16px;
    padding: 16px;
    animation: insightSlideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes insightSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .insight-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .insight-icon { font-size: 18px; }
  .insight-title {
    font-size: 14px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .insight-close {
    margin-left: auto; background: none; border: none;
    color: var(--text-tertiary); font-size: 18px; cursor: pointer;
    padding: 2px 6px; -webkit-tap-highlight-color: transparent;
  }
  .insight-body {
    font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.75);
  }
  .insight-body strong {
    color: var(--accent); font-weight: 600;
  }
  .insight-related {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .insight-related-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .insight-related-item {
    font-size: 13px; color: var(--text-secondary); padding: 4px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
  }
  .insight-related-item::before { content: '·'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

  /* ---- Entry List ---- */
  .entry-list { padding: 8px 20px 100px; display: flex; flex-direction: column; gap: 12px; }
  .entry-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1px solid var(--border); transition: transform 0.15s;
  }
  .entry-card:active { transform: scale(0.98); }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .entry-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .entry-type-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 500; }
  .entry-type-badge.thought { background: rgba(10,132,255,0.15); color: var(--accent); }
  .entry-type-badge.inspiration { background: rgba(255,159,10,0.15); color: var(--orange); }
  .entry-type-badge.todo { background: rgba(48,209,88,0.15); color: var(--green); }
  .entry-type-badge.quote { background: rgba(191,90,242,0.15); color: var(--purple); }
  .entry-type-badge.link { background: rgba(100,210,255,0.15); color: var(--teal); }
  .entry-type-badge.reflection { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .entry-type-badge.product { background: rgba(255,55,95,0.15); color: var(--pink); }

  .entry-time { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
  .entry-content { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.85); word-break: break-word; }
  .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .entry-tag { font-size: 12px; color: var(--text-secondary); background: rgba(255,255,255,0.06); padding: 2px 10px; border-radius: 8px; }
  .entry-delete {
    background: none; border: none; color: var(--text-tertiary); font-size: 16px;
    cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent;
    opacity: 0; transition: opacity 0.2s;
  }
  .entry-card:hover .entry-delete,
  .entry-card:active .entry-delete { opacity: 1; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; color: var(--text-tertiary); text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; line-height: 1.6; }

  .toast {
    position: fixed; top: calc(var(--safe-top) + 60px); left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card-solid); border: 1px solid var(--border); color: var(--text);
    padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 1100;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { display: flex; justify-content: center; padding: 40px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .counter { padding: 4px 20px 0; font-size: 13px; color: var(--text-tertiary); }

  @media (min-width: 481px) {
    .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>随手记</h1>
    <div class="header-actions">
      <div class="status-dot" id="statusDot" title="数据库连接状态"></div>
      <button class="icon-btn" onclick="loadEntries()" title="刷新">↻</button>
    </div>
  </header>

  <div class="tabs" id="tabBar">
    <button class="tab active" data-tab="compose" onclick="switchTab('compose')">记录</button>
    <button class="tab" data-tab="list" onclick="switchTab('list')">回顾</button>
    <div class="tab-indicator" id="tabIndicator"></div>
  </div>

  <div class="content">
    <div class="compose" id="composeView">
      <textarea class="compose-input" id="contentInput" placeholder="写下你此刻的想法..." autofocus></textarea>

      <div class="compose-section-label">
        分类 <span class="ai-badge">AI 推荐</span>
      </div>
      <div class="compose-chips" id="composeChips"></div>

      <div class="tags-input-row">
        <input class="tags-input" id="tagsInput" placeholder="标签（可选，空格或逗号分隔）">
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">记下来</button>

      <!-- Insight card appears here after successful save -->
      <div id="insightContainer"></div>
    </div>

    <div id="listView" style="display:none;">
      <div class="counter" id="counter"></div>
      <div class="entry-list" id="entryList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- Config ----
const SUPABASE_URL = 'https://dbduutzsoynmhbfazpxu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZHV1dHpzb3lubWhiZmF6cHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzU3NDIsImV4cCI6MjA4OTg1MTc0Mn0.lTrhFI7KlhbYQlvyCJ-n-MIPR9uRJ3nW44tE2CNRCW8';
const API_BASE = `${SUPABASE_URL}/rest/v1`;
const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// ---- All available categories ----
const CATEGORIES = [
  { id: 'thought',     emoji: '💭', label: '想法' },
  { id: 'inspiration', emoji: '⚡', label: '灵感' },
  { id: 'todo',        emoji: '✅', label: '待办' },
  { id: 'quote',       emoji: '📖', label: '摘录' },
  { id: 'link',        emoji: '🔗', label: '链接' },
  { id: 'reflection',  emoji: '🪞', label: '感悟' },
  { id: 'product',     emoji: '🧪', label: '产品' },
];

// ---- Smart Classification Rules ----
function classifyContent(text) {
  const t = text.toLowerCase();
  const scores = {};
  CATEGORIES.forEach(c => scores[c.id] = 0);

  if (/https?:\/\/|www\.|\.com|\.cn|\.io|\.org|\.net/i.test(t) || /xhslink|bilibili|zhihu|weixin|douyin/i.test(t)) scores.link += 10;
  if (/要做|需要|待办|todo|记得|别忘|提醒|deadline|ddl|计划做|打算/i.test(t)) scores.todo += 10;
  if (/[""「」『』]/.test(text) || /说过|名言|摘录|原文|出自|引用|——.*说/i.test(t)) scores.quote += 8;
  if (/^["「『]/.test(text.trim())) scores.quote += 10;
  if (/产品|用户体验|ux|ui|交互|需求|功能|体验|设计|迭代|mvp|feature|痛点|场景|用户/i.test(t)) scores.product += 7;
  if (/产品经理|pm|产品设计|用户调研|竞品/i.test(t)) scores.product += 10;
  if (/感觉|觉得|认为|反思|本质|启发|认知|思考|感受|感悟|理解|洞察|意识到|发现了|明白了|宽容|容错/i.test(t)) scores.reflection += 7;
  if (/人生|哲学|价值观|世界观|底层逻辑/i.test(t)) scores.reflection += 5;
  if (/突然|灵感|想到一个|如果能|可以做一个|idea|创意|点子|脑洞|能不能/i.test(t)) scores.inspiration += 10;
  if (/ai|人工智能|gpt|llm|agent|模型|算法|机器学习|mcp|token|prompt/i.test(t)) {
    scores.thought += 5;
    if (scores.product > 0) scores.product += 3;
    if (scores.reflection > 0) scores.reflection += 3;
  }
  scores.thought += 3;

  const sorted = Object.entries(scores).filter(([_, s]) => s > 0).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return ['thought'];
  const topScore = sorted[0][1];
  const recommended = [];
  sorted.forEach(([id, score]) => {
    if (score >= topScore * 0.5 && score > 3) recommended.push(id);
  });
  if (recommended.length === 0) recommended.push(sorted[0][0]);
  return recommended.slice(0, 3);
}

// ---- State ----
let entries = [];
let cachedEntries = []; // cached for insight analysis
let selectedTypes = new Set();
let currentRecommended = [];
let debounceTimer = null;

// ---- Render Category Chips (always visible in compose) ----
function renderComposeChips() {
  const grid = document.getElementById('composeChips');
  grid.innerHTML = CATEGORIES.map(c => {
    const isSel = selectedTypes.has(c.id);
    const isRec = currentRecommended.includes(c.id);
    return `<button class="compose-chip ${isSel ? 'selected' : ''} ${isRec ? 'recommended' : ''}"
              data-type="${c.id}" onclick="toggleChip('${c.id}')">
              ${c.emoji} ${c.label}
              <span class="rec-dot"></span>
            </button>`;
  }).join('');
}

function toggleChip(typeId) {
  if (selectedTypes.has(typeId)) {
    selectedTypes.delete(typeId);
  } else {
    selectedTypes.add(typeId);
  }
  renderComposeChips();
}

// ---- Auto-recommend on input change ----
function onContentChange() {
  const text = document.getElementById('contentInput').value.trim();
  if (text.length < 4) {
    currentRecommended = [];
    // Don't clear manual selections
    renderComposeChips();
    return;
  }
  const rec = classifyContent(text);
  // Only auto-update recommended highlights, preserve manual selections
  const prevRec = new Set(currentRecommended);
  currentRecommended = rec;
  // Auto-select newly recommended ones (unless user has manually deselected)
  rec.forEach(r => {
    if (!prevRec.has(r) && !manuallyDeselected.has(r)) {
      selectedTypes.add(r);
    }
  });
  renderComposeChips();
}

// Track what user manually deselected to not re-add
let manuallyDeselected = new Set();
function toggleChip(typeId) {
  if (selectedTypes.has(typeId)) {
    selectedTypes.delete(typeId);
    if (currentRecommended.includes(typeId)) {
      manuallyDeselected.add(typeId);
    }
  } else {
    selectedTypes.add(typeId);
    manuallyDeselected.delete(typeId);
  }
  renderComposeChips();
}

// ---- Tab Switching ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('composeView').style.display = tab === 'compose' ? 'flex' : 'none';
  document.getElementById('listView').style.display = tab === 'list' ? 'block' : 'none';
  if (tab === 'list') loadEntries();
  updateIndicator();
}

function updateIndicator() {
  const at = document.querySelector('.tab.active');
  const ind = document.getElementById('tabIndicator');
  ind.style.left = at.offsetLeft + 'px';
  ind.style.width = at.offsetWidth + 'px';
}

// ---- Submit ----
async function handleSubmit() {
  const content = document.getElementById('contentInput').value.trim();
  if (!content) { showToast('写点什么再提交'); return; }

  // If no type selected, auto-classify
  if (selectedTypes.size === 0) {
    const auto = classifyContent(content);
    auto.forEach(t => selectedTypes.add(t));
    renderComposeChips();
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const typesArray = Array.from(selectedTypes);
  const primaryType = typesArray[0];
  const extraTypeTags = typesArray.slice(1).map(t => {
    const cat = CATEGORIES.find(c => c.id === t);
    return cat ? cat.label : t;
  });

  const tagsRaw = document.getElementById('tagsInput').value.trim();
  const userTags = tagsRaw ? tagsRaw.split(/[\s,，、]+/).filter(Boolean) : [];
  const allTags = [...userTags, ...extraTypeTags];
  const title = content.length > 30 ? content.substring(0, 30) + '...' : content;

  const entry = {
    title,
    content,
    type: primaryType,
    tags: allTags,
    source: /iPhone|iPad|Android/i.test(navigator.userAgent) ? '手机' : '电脑',
  };

  try {
    const res = await fetch(`${API_BASE}/entries`, {
      method: 'POST', headers,
      body: JSON.stringify(entry)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const saved = await res.json();

    // Clear form
    document.getElementById('contentInput').value = '';
    document.getElementById('contentInput').style.height = 'auto';
    document.getElementById('tagsInput').value = '';
    selectedTypes.clear();
    currentRecommended = [];
    manuallyDeselected.clear();
    renderComposeChips();

    btn.disabled = false;
    btn.textContent = '记下来';
    showToast('已记录 ✓');
    if (navigator.vibrate) navigator.vibrate(10);

    // Generate insight asynchronously
    generateInsight(saved[0] || { ...entry, content });
  } catch (err) {
    console.error('Save error:', err);
    showToast('保存失败，请检查网络');
    btn.disabled = false;
    btn.textContent = '记下来';
  }
}

// ---- Insight Generation ----
async function generateInsight(newEntry) {
  const container = document.getElementById('insightContainer');

  // Fetch recent entries for context (if not cached)
  try {
    if (cachedEntries.length === 0) {
      const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers });
      if (res.ok) cachedEntries = await res.json();
    }
  } catch { /* ignore, just won't show insight */ }

  // Exclude the just-saved entry itself
  const otherEntries = cachedEntries.filter(e => e.id !== newEntry.id);
  if (otherEntries.length < 1) {
    // Not enough history, don't show insight
    container.innerHTML = '';
    return;
  }

  // Analyze relationships
  const insight = analyzeInsight(newEntry, otherEntries);
  if (!insight) {
    container.innerHTML = '';
    return;
  }

  // Add new entry to cached list
  cachedEntries.unshift(newEntry);
  if (cachedEntries.length > 30) cachedEntries = cachedEntries.slice(0, 30);

  // Render insight card
  container.innerHTML = `
    <div class="insight-card">
      <div class="insight-header">
        <span class="insight-icon">✨</span>
        <span class="insight-title">灵感亮点</span>
        <button class="insight-close" onclick="this.closest('.insight-card').remove()">&times;</button>
      </div>
      <div class="insight-body">${insight.summary}</div>
      ${insight.related.length > 0 ? `
        <div class="insight-related">
          <div class="insight-related-label">关联记录</div>
          ${insight.related.map(r => `<div class="insight-related-item">${escapeHtml(r)}</div>`).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function analyzeInsight(newEntry, history) {
  const content = newEntry.content.toLowerCase();
  const newWords = extractKeywords(newEntry.content);

  // Find related entries by keyword overlap
  const scored = history.map(e => {
    const eWords = extractKeywords(e.content);
    const overlap = newWords.filter(w => eWords.includes(w));
    // Also check type match
    const sameType = e.type === newEntry.type ? 1 : 0;
    // Tag overlap
    const newTags = new Set(newEntry.tags || []);
    const eTags = (e.tags || []);
    const tagOverlap = eTags.filter(t => newTags.has(t)).length;
    return {
      entry: e,
      score: overlap.length * 3 + sameType * 1 + tagOverlap * 2,
      overlapWords: overlap,
    };
  }).filter(s => s.score > 2).sort((a, b) => b.score - a.score);

  if (scored.length === 0) return null;

  const topRelated = scored.slice(0, 3);
  const relatedTexts = topRelated.map(s => {
    const preview = s.entry.content.length > 50 ? s.entry.content.substring(0, 50) + '...' : s.entry.content;
    return preview;
  });

  // Build summary
  let summary = '';
  const allOverlapWords = [...new Set(topRelated.flatMap(s => s.overlapWords))];

  if (allOverlapWords.length > 0) {
    const keywordHighlight = allOverlapWords.slice(0, 4).map(w => `<strong>${w}</strong>`).join('、');
    
    // Check for patterns
    const sameTypeCount = topRelated.filter(s => s.entry.type === newEntry.type).length;
    const typeLabel = CATEGORIES.find(c => c.id === newEntry.type)?.label || newEntry.type;

    if (topRelated.length >= 2) {
      summary = `这条记录与你之前的 <strong>${topRelated.length} 条想法</strong>有关联，核心关键词：${keywordHighlight}。`;
      if (sameTypeCount >= 2) {
        summary += ` 你已经在「${typeLabel}」类下积累了多条相关记录，这个方向值得持续深挖。`;
      } else {
        summary += ` 这些想法跨越了不同分类，或许正在形成一个更大的思考脉络。`;
      }
    } else {
      summary = `这条记录与一条历史想法产生了共鸣，关键词：${keywordHighlight}。持续记录，连点成线。`;
    }
  } else {
    // Related by type/tags but no keyword overlap
    summary = `你最近在相似方向上有不少思考，持续积累会带来意想不到的灵感碰撞。`;
  }

  // Check for emerging theme
  const typeCounts = {};
  history.forEach(e => { typeCounts[e.type] = (typeCounts[e.type] || 0) + 1; });
  const nt = newEntry.type;
  if (typeCounts[nt] && typeCounts[nt] >= 4) {
    const typeLabel = CATEGORIES.find(c => c.id === nt)?.label || nt;
    summary += ` 提示：你在「${typeLabel}」类别下已有 ${typeCounts[nt]+1} 条记录，这是你活跃的思考领域。`;
  }

  return {
    summary,
    related: relatedTexts,
  };
}

function extractKeywords(text) {
  // Simple Chinese + English keyword extraction
  // Remove common stop words, extract meaningful segments
  const cleaned = text
    .replace(/https?:\/\/\S+/g, '')
    .replace(/[^\u4e00-\u9fff\w]+/g, ' ')
    .toLowerCase();

  // For Chinese: extract 2-4 char segments that appear meaningful
  const chineseMatches = text.match(/[\u4e00-\u9fff]{2,6}/g) || [];
  // For English: extract words > 2 chars
  const englishMatches = cleaned.match(/[a-z]{3,}/g) || [];

  // Filter out common stop words
  const stopWords = new Set([
    '的', '了', '是', '在', '我', '有', '和', '就', '不', '人', '都', '一', '一个',
    '上', '也', '很', '到', '说', '要', '去', '你', '会', '着', '没有', '看', '好',
    '这', '他', '她', '它', '们', '那', '个', '来', '但', '而', '与', '或', '等',
    '这个', '那个', '什么', '怎么', '可以', '因为', '所以', '如果', '虽然', '但是',
    'the', 'and', 'for', 'that', 'this', 'with', 'are', 'was', 'not', 'but', 'have',
    'from', 'they', 'been', 'has', 'its', 'will', 'can', 'would', 'could', 'should',
  ]);

  const keywords = [...chineseMatches, ...englishMatches].filter(w => !stopWords.has(w));
  // Deduplicate
  return [...new Set(keywords)];
}

// ---- Load Entries ----
async function loadEntries() {
  const listEl = document.getElementById('entryList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=50`, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    entries = await res.json();
    cachedEntries = entries.slice(0, 30); // update cache
    renderEntries();
    setOnline(true);
  } catch (err) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">加载失败<br>请检查网络连接</div></div>';
    setOnline(false);
  }
}

function renderEntries() {
  const listEl = document.getElementById('entryList');
  const counterEl = document.getElementById('counter');
  if (entries.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">💡</div><div class="empty-text">还没有记录<br>去「记录」页写下第一条</div></div>';
    counterEl.textContent = '';
    return;
  }
  counterEl.textContent = `共 ${entries.length} 条记录`;

  const typeLabels = {};
  CATEGORIES.forEach(c => typeLabels[c.id] = c.label);

  listEl.innerHTML = entries.map(e => {
    const date = new Date(e.created_at);
    const timeStr = formatTime(date);
    const primaryBadge = `<span class="entry-type-badge ${e.type}">${typeLabels[e.type] || e.type}</span>`;
    const typeLabelSet = new Set(Object.values(typeLabels));
    const extraBadges = (e.tags || [])
      .filter(t => typeLabelSet.has(t) && t !== typeLabels[e.type])
      .map(t => {
        const cat = CATEGORIES.find(c => c.label === t);
        return cat ? `<span class="entry-type-badge ${cat.id}">${t}</span>` : '';
      }).join('');
    const normalTags = (e.tags || [])
      .filter(t => !typeLabelSet.has(t))
      .map(t => `<span class="entry-tag">#${t}</span>`).join('');

    return `
      <div class="entry-card" data-id="${e.id}">
        <div class="entry-header">
          <div class="entry-badges">${primaryBadge}${extraBadges}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="entry-time">${timeStr}</span>
            <button class="entry-delete" onclick="deleteEntry('${e.id}')" title="删除">&times;</button>
          </div>
        </div>
        <div class="entry-content">${escapeHtml(e.content)}</div>
        ${normalTags ? `<div class="entry-tags">${normalTags}</div>` : ''}
      </div>`;
  }).join('');
}

// ---- Delete ----
async function deleteEntry(id) {
  if (!confirm('确定删除？')) return;
  try {
    await fetch(`${API_BASE}/entries?id=eq.${id}`, { method: 'DELETE', headers });
    entries = entries.filter(e => e.id !== id);
    cachedEntries = cachedEntries.filter(e => e.id !== id);
    renderEntries();
    showToast('已删除');
  } catch { showToast('删除失败'); }
}

// ---- Health ----
async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/entries?select=id&limit=1`, { headers });
    setOnline(r.ok);
  } catch { setOnline(false); }
}
function setOnline(s) {
  const d = document.getElementById('statusDot');
  d.className = s ? 'status-dot' : 'status-dot offline';
  d.title = s ? '数据库已连接' : '连接失败';
}

// ---- Utils ----
function formatTime(date) {
  const now = new Date(), diff = now - date;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
  const m = date.getMonth()+1, d = date.getDate();
  const h = String(date.getHours()).padStart(2,'0'), mi = String(date.getMinutes()).padStart(2,'0');
  if (date.getFullYear() === now.getFullYear()) return `${m}月${d}日 ${h}:${mi}`;
  return `${date.getFullYear()}/${m}/${d}`;
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- Input Events ----
const contentInput = document.getElementById('contentInput');
contentInput.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
});
contentInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, window.innerHeight*0.4) + 'px';
  // Debounce AI classification
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(onContentChange, 400);
});

// ---- Init ----
window.addEventListener('DOMContentLoaded', () => {
  renderComposeChips();
  updateIndicator();
  checkHealth();
  // Pre-load entries for insight analysis
  fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers })
    .then(r => r.ok ? r.json() : [])
    .then(data => { cachedEntries = data; })
    .catch(() => {});
});
setInterval(checkHealth, 30000);
</script>
