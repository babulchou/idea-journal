<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="脑瓜子">
<meta name="theme-color" content="#000000">
<title>脑瓜子 Buzzy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --card: rgba(28, 28, 30, 0.8);
    --card-solid: #1c1c1e;
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.3);
    --accent: #0a84ff;
    --accent-light: rgba(10,132,255,0.15);
    --green: #30d158;
    --orange: #ff9f0a;
    --pink: #ff375f;
    --purple: #bf5af2;
    --teal: #64d2ff;
    --yellow: #ffd60a;
    --border: rgba(255,255,255,0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
  }

  .app {
    max-width: 480px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: var(--safe-bottom);
  }

  /* ---- Header ---- */
  .header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; flex-shrink: 0; }
  .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 1; min-width: 0; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--card);
    border: none; color: var(--accent); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); margin-right: 4px;
  }
  .status-dot.offline { background: var(--pink); box-shadow: 0 0 6px var(--pink); }

  /* ---- Tabs ---- */
  .tabs { display: flex; padding: 8px 20px; position: relative; }
  .tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 15px; font-weight: 500;
    color: var(--text-secondary); background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: color 0.2s;
  }
  .tab.active { color: var(--text); }
  .tab-indicator {
    position: absolute; bottom: 0; height: 2px; background: var(--accent); border-radius: 1px;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ---- Compose ---- */
  .compose { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
  .compose-input {
    width: 100%; min-height: 140px; max-height: 40vh;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; color: var(--text); font-size: 16px; line-height: 1.6;
    resize: none; outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  .compose-input::placeholder { color: var(--text-tertiary); }
  .compose-input:focus { border-color: rgba(10,132,255,0.4); }

  .compose-section-label {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px;
  }
  .ai-badge {
    font-size: 10px; font-weight: 600; background: linear-gradient(135deg, #0a84ff, #bf5af2);
    color: white; padding: 1px 7px; border-radius: 6px;
  }
  .compose-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .compose-chip {
    padding: 8px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    position: relative;
  }
  .compose-chip:active { transform: scale(0.95); }
  .compose-chip.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .compose-chip .rec-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: none;
    position: absolute; top: 4px; right: 4px;
  }
  .compose-chip.recommended .rec-dot { display: block; }

  .tags-input-row { display: flex; gap: 8px; align-items: center; }
  .tags-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
  }
  .tags-input::placeholder { color: var(--text-tertiary); }

  .submit-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--accent); color: white; font-size: 17px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
  .submit-btn:disabled { background: rgba(10,132,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; }

  /* ---- Insight Card ---- */
  .insight-card {
    background: linear-gradient(135deg, rgba(10,132,255,0.08), rgba(191,90,242,0.08));
    border: 1px solid rgba(10,132,255,0.15); border-radius: 16px; padding: 16px;
    animation: slideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }
  /* 灵光一闪特效 */
  .insight-card.sparkle-entrance {
    animation: sparkleIn 1.2s cubic-bezier(0.32, 0.72, 0, 1);
    position: relative;
    border-color: rgba(255,215,0,0.6) !important;
  }
  /* 金色发光脉冲边框（加强版） */
  .insight-card.sparkle-entrance {
    box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15), 0 0 80px rgba(191,90,242,0.1), inset 0 0 20px rgba(255,215,0,0.08);
    animation: sparkleIn 1.2s cubic-bezier(0.32, 0.72, 0, 1), sparkleGlow 1.5s ease-in-out 1s 3;
  }
  @keyframes sparkleIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.88); box-shadow: 0 0 0 rgba(255,215,0,0); border-color: transparent; }
    20% { opacity: 1; transform: translateY(-10px) scale(1.05); box-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3); border-color: rgba(255,215,0,0.8); }
    40% { transform: translateY(4px) scale(0.98); box-shadow: 0 0 50px rgba(191,90,242,0.4), 0 0 20px rgba(255,215,0,0.4); }
    60% { transform: translateY(-2px) scale(1.02); }
    100% { transform: translateY(0) scale(1); box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15), inset 0 0 20px rgba(255,215,0,0.08); }
  }
  @keyframes sparkleGlow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.5); }
    50% { box-shadow: 0 0 35px rgba(255,215,0,0.6), 0 0 70px rgba(191,90,242,0.3), 0 0 100px rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.8); }
  }
  /* 灵感闪光背景脉冲 — icon 弹跳加强 */
  .insight-card.sparkle-entrance .insight-header .insight-icon {
    animation: iconPulse 1s ease-in-out 0.2s;
  }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1) rotate(0); }
    20% { transform: scale(2) rotate(-15deg); }
    40% { transform: scale(1.5) rotate(10deg); }
    60% { transform: scale(1.8) rotate(-5deg); }
    80% { transform: scale(1.2) rotate(3deg); }
  }
  /* 顶部闪光条 */
  .insight-card.sparkle-entrance .insight-header::after {
    content: '';
    position: absolute; top: 0; left: -100%; width: 60%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.8), rgba(255,255,255,0.9), rgba(255,215,0,0.8), transparent);
    animation: shineSlide 1.2s ease-in-out 0.3s;
  }
  .insight-card.sparkle-entrance .insight-header {
    position: relative; overflow: hidden;
  }
  @keyframes shineSlide {
    0% { left: -60%; } 100% { left: 120%; }
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .insight-icon { font-size: 18px; }
  .insight-title {
    font-size: 14px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .insight-close {
    margin-left: auto; background: none; border: none;
    color: var(--text-tertiary); font-size: 18px; cursor: pointer;
    padding: 2px 6px; -webkit-tap-highlight-color: transparent;
  }
  .insight-body { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.75); }
  .insight-body strong { color: var(--accent); font-weight: 600; }
  .insight-related { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
  .insight-related-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .insight-related-item {
    font-size: 13px; color: var(--text-secondary); padding: 4px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
  }
  .insight-related-item::before { content: '·'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .insight-card.encouragement {
    background: linear-gradient(135deg, rgba(48,209,88,0.06), rgba(255,214,10,0.06));
    border-color: rgba(48,209,88,0.12);
  }
  .insight-card.encouragement .insight-title {
    background: linear-gradient(135deg, var(--green), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* ---- Mode Badge (降级模式透明度) ---- */
  .insight-mode-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
    margin-left: 6px; white-space: nowrap; letter-spacing: 0.2px;
  }
  .insight-mode-badge.mode-ai {
    background: linear-gradient(135deg, #0a84ff, #bf5af2);
    color: white;
  }
  .insight-mode-badge.mode-rule {
    background: rgba(255,159,10,0.15);
    color: var(--orange);
  }
  .insight-mode-badge.mode-encourage {
    background: rgba(48,209,88,0.15);
    color: var(--green);
  }
  .insight-mode-badge.mode-local {
    background: rgba(255,255,255,0.08);
    color: var(--text-tertiary);
  }

  /* ---- Source Tag (来源标签视觉层级) ---- */
  .insight-source-tag {
    font-size: 11px; font-weight: 500; color: var(--text-tertiary);
    background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px;
    flex-shrink: 0;
  }

  /* ---- Insight body long text (排版处理) ---- */
  .insight-body p { margin-bottom: 8px; }
  .insight-body p:last-child { margin-bottom: 0; }
  .insight-body em { font-style: italic; color: var(--purple); }

  /* ---- Ask Bar (Review Page) ---- */
  .ask-bar {
    padding: 12px 20px; display: flex; gap: 8px; align-items: center;
    position: sticky; top: 0; z-index: 50;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .ask-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .ask-input::placeholder { color: var(--text-tertiary); }
  .ask-input:focus { border-color: rgba(10,132,255,0.4); }
  .ask-send {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ask-send:active { transform: scale(0.9); }
  .ask-send:disabled { background: rgba(10,132,255,0.3); cursor: not-allowed; }

  /* ---- Answer Panel ---- */
  .answer-panel {
    margin: 0 20px 12px; border-radius: 16px; overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .answer-intent {
    display: flex; align-items: center; gap: 8px; padding: 14px 16px;
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
  }
  .answer-intent-icon { font-size: 16px; }
  .answer-intent-label {
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .answer-close {
    margin-left: auto; background: none; border: none;
    color: var(--text-tertiary); font-size: 18px; cursor: pointer;
    padding: 2px 6px; -webkit-tap-highlight-color: transparent;
  }

  /* Search result style */
  .answer-panel.search-mode { background: var(--card); border: 1px solid var(--border); }
  .answer-panel.search-mode .answer-question {
    padding: 0 16px 10px; font-size: 13px; color: var(--text-tertiary); line-height: 1.4;
  }
  .search-results { display: flex; flex-direction: column; }
  .search-result-item {
    padding: 12px 16px; border-top: 1px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .search-result-item:active { background: rgba(255,255,255,0.04); }
  .search-result-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .search-result-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
  .search-result-badge.thought { background: rgba(10,132,255,0.15); color: var(--accent); }
  .search-result-badge.inspiration { background: rgba(255,159,10,0.15); color: var(--orange); }
  .search-result-badge.todo { background: rgba(48,209,88,0.15); color: var(--green); }
  .search-result-badge.quote { background: rgba(191,90,242,0.15); color: var(--purple); }
  .search-result-badge.link { background: rgba(100,210,255,0.15); color: var(--teal); }
  .search-result-badge.reflection { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .search-result-badge.product { background: rgba(255,55,95,0.15); color: var(--pink); }
  .search-result-time { font-size: 11px; color: var(--text-tertiary); }
  .search-result-content { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); }
  .search-result-content mark {
    background: rgba(10,132,255,0.25); color: var(--accent);
    border-radius: 2px; padding: 0 2px;
  }
  .search-result-score {
    font-size: 11px; color: var(--text-tertiary); margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Summary result style */
  .answer-panel.summary-mode {
    background: linear-gradient(135deg, rgba(10,132,255,0.06), rgba(191,90,242,0.06));
    border: 1px solid rgba(10,132,255,0.12);
  }
  .answer-panel.summary-mode .answer-question {
    padding: 0 16px 10px; font-size: 13px; color: var(--text-tertiary); line-height: 1.4;
  }
  .summary-body {
    padding: 0 16px 16px; font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8);
  }
  .summary-body strong { color: var(--accent); font-weight: 600; }
  .summary-body .summary-section {
    margin-bottom: 12px;
  }
  .summary-body .summary-section-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .summary-body .summary-section-title::before {
    content: ''; width: 3px; height: 14px; border-radius: 2px;
    background: linear-gradient(135deg, var(--accent), var(--purple)); flex-shrink: 0;
  }
  .summary-body .summary-point {
    padding: 3px 0; display: flex; align-items: flex-start; gap: 8px;
  }
  .summary-body .summary-point::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0; margin-top: 8px;
  }
  .summary-sources {
    padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .summary-sources-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .summary-source-item {
    font-size: 12px; color: var(--text-secondary); padding: 2px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
  }
  .summary-source-item::before { content: '→'; color: var(--accent); flex-shrink: 0; font-size: 11px; }
  .summary-source-item.clickable {
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s; border-radius: 8px; padding: 6px 8px; margin: 0 -8px;
  }
  .summary-source-item.clickable:active { background: rgba(255,255,255,0.04); }

  /* AI answer ref tags */
  .answer-panel ref {
    display: inline; color: var(--accent); cursor: pointer;
    font-weight: 500; -webkit-tap-highlight-color: transparent;
    border-bottom: 1px dashed rgba(10,132,255,0.4);
    transition: opacity 0.15s;
  }
  .answer-panel ref:active { opacity: 0.6; }

  /* AI mode badge in answer */
  .answer-mode-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
    margin-left: 6px; white-space: nowrap;
  }
  .answer-mode-badge.mode-ai {
    background: linear-gradient(135deg, #0a84ff, #bf5af2); color: white;
  }
  .answer-mode-badge.mode-local {
    background: rgba(255,255,255,0.08); color: var(--text-tertiary);
  }

  /* Thinking animation */
  .thinking { padding: 20px 16px; display: flex; align-items: center; gap: 10px; }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: thinking 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinking {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking-text { font-size: 13px; color: var(--text-secondary); }

  /* Highlighted entry card */
  .entry-card.highlighted {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(10,132,255,0.15);
    animation: highlightPulse 2s ease-out;
  }
  @keyframes highlightPulse {
    0% { box-shadow: 0 0 0 1px var(--accent), 0 4px 30px rgba(10,132,255,0.3); }
    100% { box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(10,132,255,0.15); }
  }

  /* ---- Entry List ---- */
  .entry-list { padding: 8px 20px 100px; display: flex; flex-direction: column; gap: 12px; }
  .entry-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1px solid var(--border); transition: all 0.3s;
  }
  .entry-card:active { transform: scale(0.98); }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .entry-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .entry-type-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 500; }
  .entry-type-badge.thought { background: rgba(10,132,255,0.15); color: var(--accent); }
  .entry-type-badge.inspiration { background: rgba(255,159,10,0.15); color: var(--orange); }
  .entry-type-badge.todo { background: rgba(48,209,88,0.15); color: var(--green); }
  .entry-type-badge.quote { background: rgba(191,90,242,0.15); color: var(--purple); }
  .entry-type-badge.link { background: rgba(100,210,255,0.15); color: var(--teal); }
  .entry-type-badge.reflection { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .entry-type-badge.product { background: rgba(255,55,95,0.15); color: var(--pink); }
  .entry-time { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
  .entry-content { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.85); word-break: break-word; }
  .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .entry-tag { font-size: 12px; color: var(--text-secondary); background: rgba(255,255,255,0.06); padding: 2px 10px; border-radius: 8px; }

  /* ---- Tag Editor Overlay ---- */
  .tag-editor-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 2000;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.2s ease;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .tag-editor-panel {
    width: 100%; max-width: 420px;
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .tag-editor-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .tag-editor-title { font-size: 17px; font-weight: 700; }
  .tag-editor-close {
    background: none; border: none; color: var(--text-tertiary); font-size: 24px; cursor: pointer;
  }
  .tag-editor-section { margin-bottom: 16px; }
  .tag-editor-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px; font-weight: 600; }
  .tag-editor-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-editor-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s ease;
  }
  .tag-editor-chip.selected {
    background: rgba(10,132,255,0.15); border-color: var(--accent); color: var(--accent);
  }
  .tag-editor-save {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: var(--accent); color: white; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }
  .tag-editor-save:active { opacity: 0.8; }

  /* Link Summary Collapsible */
  .link-summary-toggle {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; color: var(--teal); font-size: 13px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent; width: 100%;
    transition: all 0.2s;
  }
  .link-summary-toggle:active { transform: scale(0.98); }
  .link-summary-toggle .toggle-arrow {
    font-size: 10px; transition: transform 0.2s; margin-left: auto; color: var(--text-tertiary);
  }
  .link-summary-toggle.open .toggle-arrow { transform: rotate(90deg); }
  .link-summary-body {
    display: none; margin-top: 8px; padding: 12px;
    background: rgba(100,210,255,0.04); border: 1px solid rgba(100,210,255,0.08);
    border-radius: 12px; font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.7);
  }
  .link-summary-body.open { display: block; animation: slideIn 0.3s ease; }
  .link-summary-body .ls-title {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;
  }
  .link-summary-body .ls-source {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .link-summary-body .ls-text { white-space: pre-wrap; }
  .link-summary-loading {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(100,210,255,0.04); border: 1px solid rgba(100,210,255,0.08);
    border-radius: 12px; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-secondary);
  }
  .link-summary-loading .spinner { width: 16px; height: 16px; border-width: 1.5px; }

  /* ---- Link Reading Progress ---- */
  .link-reading-card {
    border-color: rgba(100,210,255,0.2) !important;
    background: linear-gradient(135deg, rgba(100,210,255,0.06), rgba(10,132,255,0.06)) !important;
  }
  .link-reading-progress {
    padding: 4px 0 2px;
  }
  .link-reading-bar {
    height: 3px; border-radius: 2px; background: rgba(100,210,255,0.1);
    overflow: hidden; margin-bottom: 10px;
  }
  .link-reading-fill {
    height: 100%; width: 30%; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--accent));
    animation: readingProgress 2.5s ease-in-out infinite;
  }
  @keyframes readingProgress {
    0% { width: 5%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 5%; margin-left: 95%; }
  }
  .link-reading-hint {
    font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  }

  /* ---- Link Result Card (main feedback) ---- */
  .link-result-card {
    border-color: rgba(100,210,255,0.2) !important;
    background: linear-gradient(135deg, rgba(100,210,255,0.06), rgba(10,132,255,0.06)) !important;
  }
  .link-result-main {
    padding: 2px 0 4px;
  }
  .link-result-title {
    font-size: 16px; font-weight: 700; color: var(--text);
    line-height: 1.5; margin-bottom: 6px;
  }
  .link-result-meta {
    font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;
    line-height: 1.5;
  }
  .link-result-summary {
    font-size: 14px; line-height: 1.75; color: rgba(255,255,255,0.78);
    margin-top: 8px; white-space: pre-wrap;
  }
  .link-result-keywords {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .link-kw-tag {
    font-size: 12px; padding: 3px 10px; border-radius: 10px;
    background: rgba(100,210,255,0.1); color: var(--teal); font-weight: 500;
  }
  .link-result-related {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* Insight card link summary section (review page) */
  .insight-link-summary {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .insight-link-summary .ils-label {
    font-size: 11px; font-weight: 600; color: var(--teal);
    letter-spacing: 0.5px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .insight-link-summary .ils-title {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
  }
  .insight-link-summary .ils-text {
    font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.7);
  }

  .entry-delete {
    background: none; border: none; color: var(--text-tertiary); font-size: 16px;
    cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent;
    opacity: 0; transition: opacity 0.2s;
  }
  .entry-card:hover .entry-delete, .entry-card:active .entry-delete { opacity: 1; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; color: var(--text-tertiary); text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; line-height: 1.6; }

  .toast {
    position: fixed; top: calc(var(--safe-top) + 60px); left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card-solid); border: 1px solid var(--border); color: var(--text);
    padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 1100;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading { display: flex; justify-content: center; padding: 40px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .counter { padding: 4px 20px 0; font-size: 13px; color: var(--text-tertiary); }

  /* ---- Todo Hub Entry Card (in Review page) ---- */
  .todo-hub-card {
    margin: 12px 20px 4px; padding: 14px 16px;
    background: linear-gradient(135deg, rgba(48,209,88,0.08), rgba(48,209,88,0.02));
    border: 1px solid rgba(48,209,88,0.15); border-radius: 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }
  .todo-hub-card:active { transform: scale(0.98); }
  .todo-hub-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(48,209,88,0.15); display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .todo-hub-info { flex: 1; min-width: 0; }
  .todo-hub-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .todo-hub-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .todo-hub-badge {
    background: var(--green); color: #000; font-size: 13px; font-weight: 700;
    min-width: 24px; height: 24px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; padding: 0 7px;
  }
  .todo-hub-badge.empty { background: var(--text-tertiary); }
  .todo-hub-arrow { color: var(--text-tertiary); font-size: 16px; margin-left: 4px; }

  /* ---- Todo Panel (Full-screen overlay) ---- */
  .todo-panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg); z-index: 200;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .todo-panel.open { transform: translateX(0); }
  .todo-panel-header {
    padding: calc(var(--safe-top) + 12px) 20px 12px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .todo-back-btn {
    background: none; border: none; color: var(--accent); font-size: 24px;
    cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center;
  }
  .todo-panel-title { font-size: 20px; font-weight: 700; flex: 1; }
  .todo-panel-count { font-size: 13px; color: var(--text-secondary); }

  /* Todo Filter Tabs */
  .todo-filter-tabs {
    display: flex; padding: 12px 20px 0; gap: 8px;
  }
  .todo-filter-tab {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--card); border: 1px solid var(--border); color: var(--text-secondary);
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.2s;
  }
  .todo-filter-tab.active {
    background: rgba(48,209,88,0.15); border-color: rgba(48,209,88,0.3); color: var(--green);
  }
  .todo-filter-tab .tab-count {
    font-size: 11px; margin-left: 4px; opacity: 0.7;
  }

  /* Todo List */
  .todo-list-container {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 12px 20px 100px;
  }
  .todo-time-group { margin-bottom: 20px; }
  .todo-time-label {
    font-size: 12px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 0 6px;
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }

  /* Todo Item */
  .todo-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .todo-item.completing { opacity: 0.5; }
  .todo-checkbox {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25); background: none;
    flex-shrink: 0; cursor: pointer; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    color: transparent; font-size: 12px;
  }
  .todo-checkbox:active { transform: scale(0.85); }
  .todo-checkbox.checked {
    background: var(--green); border-color: var(--green); color: #000;
  }
  .todo-item-body { flex: 1; min-width: 0; }
  .todo-item-content {
    font-size: 15px; line-height: 1.5; color: var(--text);
    word-break: break-word; transition: all 0.3s;
  }
  .todo-item.done .todo-item-content {
    color: var(--text-tertiary); text-decoration: line-through;
  }
  .todo-item-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
    font-size: 12px; color: var(--text-tertiary);
  }
  .todo-item-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .todo-item-tag {
    font-size: 10px; padding: 1px 7px; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
  }

  /* Todo Empty State */
  .todo-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 40px; color: var(--text-tertiary); text-align: center;
  }
  .todo-empty-icon { font-size: 40px; margin-bottom: 12px; }
  .todo-empty-text { font-size: 15px; line-height: 1.6; }

  /* Todo Stats Bar */
  .todo-stats {
    display: flex; gap: 16px; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  .todo-stat {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-secondary);
  }
  .todo-stat-num { font-weight: 700; font-size: 18px; }
  .todo-stat-num.pending { color: var(--green); }
  .todo-stat-num.done { color: var(--text-tertiary); }
  .todo-progress-bar {
    flex: 1; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08); overflow: hidden;
    align-self: center;
  }
  .todo-progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--green), var(--teal));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ---- Auth Screen ---- */
  .auth-screen {
    position: fixed; inset: 0; z-index: 9999; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .auth-screen.hidden { display: none; }
  .auth-card {
    width: 100%; max-width: 380px;
    background: var(--card-solid); border-radius: 24px; padding: 40px 28px;
    border: 1px solid var(--border);
  }
  .auth-logo { text-align: center; font-size: 52px; margin-bottom: 8px; }
  .auth-title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .auth-subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
  .auth-input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; outline: none; font-family: inherit;
    margin-bottom: 12px; transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: rgba(10,132,255,0.5); }
  .auth-input::placeholder { color: var(--text-tertiary); }
  .auth-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--accent); color: white; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
  }
  .auth-btn:active { opacity: 0.8; }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-switch {
    text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);
  }
  .auth-switch a {
    color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500;
  }
  .auth-error {
    background: rgba(255,55,95,0.1); border: 1px solid rgba(255,55,95,0.2);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
    font-size: 13px; color: var(--pink); display: none;
  }
  .auth-error.show { display: block; }
  .auth-success {
    background: rgba(48,209,88,0.1); border: 1px solid rgba(48,209,88,0.2);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 16px;
    font-size: 13px; color: var(--green); display: none;
  }
  .auth-success.show { display: block; }
  .auth-nickname-row { position: relative; }
  .nickname-hint {
    font-size: 12px; margin: -8px 0 12px 4px; min-height: 16px;
    transition: color 0.2s;
  }
  .nickname-hint.ok { color: var(--green); }
  .nickname-hint.err { color: var(--pink); }
  .nickname-hint.checking { color: var(--text-tertiary); }
  .auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    color: var(--text-tertiary); font-size: 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .auth-user-bar {
    display: flex; align-items: center; gap: 8px; padding: 0 4px;
  }
  .auth-user-email {
    font-size: 11px; color: var(--text-tertiary); max-width: 80px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auth-logout-btn {
    background: none; border: none; color: var(--text-tertiary);
    font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-logout-btn:hover { color: var(--pink); }

  @media (min-width: 481px) {
    .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }
  ::-webkit-scrollbar { width: 0; }

  /* ---- Feedback Floating Button ---- */
  .feedback-fab {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); right: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 90; transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    -webkit-tap-highlight-color: transparent;
    opacity: 0.6;
  }
  .feedback-fab:hover, .feedback-fab:active { opacity: 1; transform: scale(1.1); }

  /* ---- Feedback Modal ---- */
  .feedback-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .feedback-overlay.show { display: flex; }
  .feedback-modal {
    width: 100%; max-width: 480px; max-height: 85vh;
    background: var(--card-solid); border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(20px + var(--safe-bottom));
    display: flex; flex-direction: column; gap: 16px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .feedback-header { display: flex; justify-content: space-between; align-items: center; }
  .feedback-header h3 { font-size: 18px; font-weight: 600; }
  .feedback-close {
    width: 32px; height: 32px; border-radius: 50%; background: var(--card);
    border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .feedback-textarea {
    width: 100%; min-height: 120px; max-height: 200px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; color: var(--text); font-size: 15px; line-height: 1.5;
    resize: none; outline: none; font-family: inherit;
  }
  .feedback-textarea::placeholder { color: var(--text-tertiary); }
  .feedback-textarea:focus { border-color: rgba(10,132,255,0.4); }
  .feedback-actions { display: flex; gap: 10px; align-items: center; }
  .feedback-screenshot-btn {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .feedback-screenshot-btn.has-screenshot { border-color: var(--green); color: var(--green); }
  .feedback-submit-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    background: var(--accent); border: none; color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .feedback-submit-btn:disabled { opacity: 0.5; }
  .feedback-screenshot-preview {
    position: relative; border-radius: 8px; overflow: hidden;
    max-height: 120px; display: none;
  }
  .feedback-screenshot-preview.show { display: block; }
  .feedback-screenshot-preview img { width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--border); }
  .feedback-screenshot-remove {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(0,0,0,0.7); border: none; color: #fff;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .feedback-hint { font-size: 12px; color: var(--text-tertiary); text-align: center; }

  /* ---- Admin Console ---- */
  .admin-screen {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 300; display: none; flex-direction: column;
    overflow: hidden;
  }
  .admin-screen.show { display: flex; }
  .admin-header {

<script>
// ---- Config ----
const SUPABASE_URL = 'https://dbduutzsoynmhbfazpxu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZHV1dHpzb3lubWhiZmF6cHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzU3NDIsImV4cCI6MjA4OTg1MTc0Mn0.lTrhFI7KlhbYQlvyCJ-n-MIPR9uRJ3nW44tE2CNRCW8';
const API_BASE = `${SUPABASE_URL}/rest/v1`;

// ---- Supabase Client (Auth) ----
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentSession = null;

// Dynamic headers — uses user's access_token when logged in
let headers = {};
function updateHeaders() {
  const token = currentSession?.access_token || SUPABASE_KEY;
  headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}
updateHeaders(); // initial with anon key

// ============================================================
// ========= BUZZY ANALYTICS — 埋点 SDK =======================
// ============================================================
const _ba = (() => {
  const SESSION_KEY = 'buzzy_session';
  const FLUSH_INTERVAL = 10000; // 10s flush
  const MAX_QUEUE = 50;
  let queue = [];
  let sessionId = '';
  let currentPage = 'compose';
  let pageEnterTime = Date.now();
  let _flushTimer = null;
  let _consoleLogs = []; // 最近 50 条日志，用于反馈附带
  const MAX_LOGS = 50;

  // ---- Session ----
  function initSession() {
    const stored = sessionStorage.getItem(SESSION_KEY);
    if (stored) { sessionId = stored; return; }
    sessionId = 'bs_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem(SESSION_KEY, sessionId);
  }

  // ---- Console Log Capture ----
  function hookConsole() {
    const orig = { log: console.log, warn: console.warn, error: console.error };
    ['log', 'warn', 'error'].forEach(level => {
      console[level] = function(...args) {
        orig[level].apply(console, args);
        try {
          const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
          _consoleLogs.push({ t: Date.now(), l: level, m: msg.slice(0, 500) });
          if (_consoleLogs.length > MAX_LOGS) _consoleLogs.shift();
        } catch {}
      };
    });
    window.addEventListener('error', e => {
      _consoleLogs.push({ t: Date.now(), l: 'error', m: `[Uncaught] ${e.message} at ${e.filename}:${e.lineno}` });
      if (_consoleLogs.length > MAX_LOGS) _consoleLogs.shift();
    });
    window.addEventListener('unhandledrejection', e => {
      _consoleLogs.push({ t: Date.now(), l: 'error', m: `[UnhandledRejection] ${e.reason}` });
      if (_consoleLogs.length > MAX_LOGS) _consoleLogs.shift();
    });
  }

  // ---- Track ----
  function track(event, category = '', label = '', value = 0, metadata = {}) {
    if (!currentUser) return;
    queue.push({
      user_id: currentUser.id,
      event, category, label,
      value: Number(value) || 0,
      page: currentPage,
      session_id: sessionId,
      metadata: { ...metadata, ua: navigator.userAgent, screen: `${screen.width}x${screen.height}` },
      created_at: new Date().toISOString()
    });
    if (queue.length >= MAX_QUEUE) flush();
  }

  // ---- Page View / Duration ----
  function trackPageView(page) {
    // Record duration on previous page
    const now = Date.now();
    const duration = now - pageEnterTime;
    if (duration > 1000) {
      track('page_duration', 'navigation', currentPage, duration);
    }
    currentPage = page;
    pageEnterTime = now;
    track('page_view', 'navigation', page);
  }

  // ---- Flush to Supabase ----
  async function flush() {
    if (queue.length === 0 || !currentUser) return;
    const batch = queue.splice(0, MAX_QUEUE);
    try {
      await fetch(`${API_BASE}/analytics_events`, {
        method: 'POST', headers, body: JSON.stringify(batch)
      });
    } catch {
      // 失败则放回队列头部，下次重试
      queue.unshift(...batch);
    }
  }

  function startFlush() {
    if (_flushTimer) return;
    _flushTimer = setInterval(flush, FLUSH_INTERVAL);
    // Page unload flush
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        track('page_duration', 'navigation', currentPage, Date.now() - pageEnterTime);
        flush();
      }
      if (document.visibilityState === 'visible') {
        pageEnterTime = Date.now();
      }
    });
    window.addEventListener('beforeunload', () => {
      track('page_duration', 'navigation', currentPage, Date.now() - pageEnterTime);
      // Use fetch keepalive for reliable final flush (preserves full auth headers, unlike sendBeacon)
      if (queue.length > 0 && currentUser) {
        const body = JSON.stringify(queue);
        try {
          fetch(`${API_BASE}/analytics_events`, {
            method: 'POST', headers, body, keepalive: true
          });
        } catch {
          // keepalive fetch failed, fallback to sendBeacon (best-effort, no auth header)
          navigator.sendBeacon?.(`${API_BASE}/analytics_events?apikey=${SUPABASE_KEY}`, new Blob([body], { type: 'application/json' }));
        }
        queue = [];
      }
    });
  }

  function stopFlush() { clearInterval(_flushTimer); _flushTimer = null; }

  function getConsoleLogs() { return [..._consoleLogs]; }

  initSession();
  hookConsole();

  return { track, trackPageView, flush, startFlush, stopFlush, getConsoleLogs, get currentPage() { return currentPage; } };
})();

// ============================================================
// ========= FEEDBACK SYSTEM — 用户反馈 =======================
// ============================================================
let _feedbackScreenshotData = '';

function openFeedback() {
  document.getElementById('feedbackOverlay').classList.add('show');
  document.getElementById('feedbackText').focus();
  _ba.track('feedback_open', 'feedback', 'fab_click');
}

function closeFeedback() {
  document.getElementById('feedbackOverlay').classList.remove('show');
  document.getElementById('feedbackText').value = '';
  _feedbackScreenshotData = '';
  document.getElementById('feedbackScreenshotPreview').classList.remove('show');
  document.getElementById('feedbackScreenshotBtn').classList.remove('has-screenshot');
}

function captureFeedbackScreenshot() {
  // 使用文件选择让用户上传截图或拍照
  document.getElementById('feedbackFileInput').click();
}

function handleFeedbackFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('图片太大，请选择 5MB 以内的'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    _feedbackScreenshotData = reader.result;
    document.getElementById('feedbackScreenshotImg').src = _feedbackScreenshotData;
    document.getElementById('feedbackScreenshotPreview').classList.add('show');
    document.getElementById('feedbackScreenshotBtn').classList.add('has-screenshot');
  };
  reader.readAsDataURL(file);
  event.target.value = ''; // reset
}

function removeFeedbackScreenshot() {
  _feedbackScreenshotData = '';
  document.getElementById('feedbackScreenshotPreview').classList.remove('show');
  document.getElementById('feedbackScreenshotBtn').classList.remove('has-screenshot');
}

async function submitFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) { showToast('请输入反馈内容'); return; }
  if (!currentUser) { showToast('请先登录'); return; }

  const btn = document.getElementById('feedbackSubmitBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  const feedback = {
    user_id: currentUser.id,
    content: text,
    screenshot: _feedbackScreenshotData || '',
    logs: _ba.getConsoleLogs(),
    page: _ba.currentPage,
    ua: navigator.userAgent,
    screen_size: `${screen.width}x${screen.height}`,
    status: 'pending'
  };

  try {
    const res = await fetch(`${API_BASE}/user_feedback`, {
      method: 'POST', headers, body: JSON.stringify(feedback)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast('反馈已提交，谢谢！ ❤️');
    closeFeedback();
    _ba.track('feedback_submit', 'feedback', 'success');
  } catch (err) {
    console.error('Feedback submit error:', err);
    showToast('提交失败，请稍后再试');
    _ba.track('feedback_submit', 'feedback', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '提交反馈';
  }
}

// ============================================================
// ========= ADMIN CONSOLE — 后台管理 =========================
// ============================================================
let _adminData = { feedback: [], events: [], users: [] };
let _adminTab = 'feedback';
let _isAdmin = false;
let _adminEventFilter = '7d'; // 7d, 30d, all
let _adminSelectedUser = 'all';

async function checkIsAdmin() {
  if (!currentUser) return false;
  try {
    const res = await fetch(`${API_BASE}/admin_users?user_id=eq.${currentUser.id}&select=user_id`, { headers });
    if (res.ok) {
      const data = await res.json();
      _isAdmin = data.length > 0;
    }
  } catch { _isAdmin = false; }
  return _isAdmin;
}

function openAdmin() {
  if (!_isAdmin) { showToast('无管理权限'); return; }
  document.getElementById('adminScreen').classList.add('show');
  _adminTab = 'feedback';
  loadAdminData();
  _ba.track('admin_open', 'admin', 'open');
}

}

function switchAdminTab(tab) {
  _adminTab = tab;
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.atab === tab));
  renderAdminContent();
}

async function loadAdminData() {
  const content = document.getElementById('adminContent');
  content.innerHTML = '<div class="admin-loading"><div class="spinner"></div></div>';

  try {
    // Load feedback
    const fbRes = await fetch(`${API_BASE}/user_feedback?select=*&order=created_at.desc&limit=100`, { headers });
    if (fbRes.ok) _adminData.feedback = await fbRes.json();

    // Load recent events (last 7 days by default)
    const since = new Date(Date.now() - 7 * 86400000).toISOString();
    const evRes = await fetch(`${API_BASE}/analytics_events?select=*&created_at=gte.${since}&order=created_at.desc&limit=2000`, { headers });
    if (evRes.ok) _adminData.events = await evRes.json();

    // Extract unique users
    const userMap = {};
    _adminData.events.forEach(e => {
      if (e.user_id && !userMap[e.user_id]) userMap[e.user_id] = { id: e.user_id, count: 0, last: e.created_at };
      if (e.user_id) userMap[e.user_id].count++;
    });
    _adminData.feedback.forEach(f => {
      if (f.user_id && !userMap[f.user_id]) userMap[f.user_id] = { id: f.user_id, count: 0, last: f.created_at };
    });
    _adminData.users = Object.values(userMap).sort((a, b) => b.count - a.count);

    renderAdminContent();
  } catch (err) {
    content.innerHTML = '<div class="admin-empty">加载失败: ' + escapeHtml(err.message) + '</div>';
  }
}

function renderAdminAnalytics(c) {
  const events = _adminData.events;

  // Filter by user
  const filtered = _adminSelectedUser === 'all' ? events : events.filter(e => e.user_id === _adminSelectedUser);

  // Stats
  const uniqueSessions = new Set(filtered.map(e => e.session_id)).size;
  const pageViews = filtered.filter(e => e.event === 'page_view').length;
  const totalDuration = filtered.filter(e => e.event === 'page_duration').reduce((s, e) => s + e.value, 0);
  const avgSessionMin = uniqueSessions > 0 ? Math.round(totalDuration / uniqueSessions / 60000) : 0;

  // Event counts by name
  const eventCounts = {};
  filtered.forEach(e => { if (e.event !== 'page_duration') eventCounts[e.event] = (eventCounts[e.event] || 0) + 1; });
  const sortedEvents = Object.entries(eventCounts).sort((a, b) => b[1] - a[1]);
  const maxCount = sortedEvents.length > 0 ? sortedEvents[0][1] : 1;

  // Page duration breakdown
  const pageDurations = {};
  filtered.filter(e => e.event === 'page_duration').forEach(e => {
    pageDurations[e.label] = (pageDurations[e.label] || 0) + e.value;

  // User selector
  const userOptions = _adminData.users.map(u =>
    `<option value="${u.id}" ${_adminSelectedUser === u.id ? 'selected' : ''}>${u.id.slice(0, 8)}... (${u.count}事件)</option>`

      <div class="stat-card green"><div class="stat-num">${pageViews}</div><div class="stat-label">页面浏览</div></div>
      <div class="stat-card purple"><div class="stat-num">${avgSessionMin}min</div><div class="stat-label">平均会话时长</div></div>
      <div class="stat-card pink"><div class="stat-num">${filtered.length}</div><div class="stat-label">总事件数</div></div>
    </div>

    <div class="admin-section-title">事件分布</div>
    <div class="chart-container">
      ${sortedEvents.slice(0, 15).map(([name, count]) => `
        <div class="chart-bar-row">
          <div class="chart-bar-label">${escapeHtml(name)}</div>
          <div class="chart-bar-track">
            <div class="chart-bar-fill" style="width:${Math.round(count/maxCount*100)}%;background:var(--accent);"></div>
          </div>
          <div class="chart-bar-num">${count}</div>

// ---- 昵称校验 ----
const BANNED_WORDS = [
  // 违禁词列表（黄赌毒 + 违法 + 不当内容）
  '赌博','赌场','博彩','色情','裸体','性爱','毒品','大麻','冰毒','海洛因',
  '可卡因','吸毒','贩毒','嫖娼','卖淫','妓女','傻逼','他妈','操你','草泥马',
  '废物','垃圾人','狗日','贱人','婊子','鸡巴','屌','fuck','shit','bitch',
  'porn','sex','nude','drug','cock','dick','pussy','ass','nigger','nigga',
  'kill','murder','terrorist','admin','管理员','系统','官方','脑瓜子','buzzy',
  '客服','运营','moderator','system','support','staff'
];

function validateNickname(nickname) {
  const trimmed = nickname.trim();
  if (trimmed.length < 2) return { ok: false, msg: '昵称至少 2 个字符' };
  if (trimmed.length > 12) return { ok: false, msg: '昵称最多 12 个字符' };
  // 只允许中文、英文、数字、下划线、短横线
  if (!/^[\u4e00-\u9fa5a-zA-Z0-9_\-]+$/.test(trimmed)) {
    return { ok: false, msg: '昵称只能包含中英文、数字、下划线、短横线' };
  }
  // 违禁词检查
  const lower = trimmed.toLowerCase();
  for (const word of BANNED_WORDS) {
    if (lower.includes(word.toLowerCase())) {
      return { ok: false, msg: '昵称包含不当内容，请换一个' };
    }
  }
  return { ok: true, msg: '' };
}

let _nicknameCheckTimer = null;
async function checkNicknameUnique(nickname) {
  const hint = document.getElementById('nicknameHint');
  const trimmed = nickname.trim();
  
  // 先做本地校验
  const local = validateNickname(trimmed);
  if (!local.ok) {
    hint.textContent = local.msg;
    hint.className = 'nickname-hint err';
    return false;
  }
  
  // 再查远程唯一性
  hint.textContent = '检查中...';
  hint.className = 'nickname-hint checking';
  try {
    const res = await fetch(
      `${API_BASE}/user_profiles?select=id&nickname=ilike.${encodeURIComponent(trimmed)}&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (res.ok) {
      const data = await res.json();
      if (data.length > 0) {
        hint.textContent = '该昵称已被使用';
        hint.className = 'nickname-hint err';
        return false;
      }
    }
    hint.textContent = '✓ 昵称可用';
    hint.className = 'nickname-hint ok';
    return true;
  } catch {
    hint.textContent = '';
    hint.className = 'nickname-hint';
    return true; // 网络错误不阻止注册，后端有唯一约束兜底
  }
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authBtn');

  if (!email || !password) { showAuthError('请输入邮箱和密码'); return; }
  if (password.length < 6) { showAuthError('密码至少 6 位'); return; }

  // 注册模式下必须填昵称
  if (isSignUpMode) {
    const nickname = document.getElementById('authNickname').value.trim();
    const localCheck = validateNickname(nickname);
    if (!localCheck.ok) { showAuthError(localCheck.msg); return; }
  }

  btn.disabled = true;
  btn.textContent = isSignUpMode ? '注册中...' : '登录中...';
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authSuccess').classList.remove('show');

  try {
    let result;
    if (isSignUpMode) {
      const nickname = document.getElementById('authNickname').value.trim();
      
      // 最终唯一性检查
      const isUnique = await checkNicknameUnique(nickname);
      if (!isUnique) {
        btn.disabled = false;
        btn.textContent = '注 册';
        showAuthError(document.getElementById('nicknameHint').textContent || '昵称不可用');
        return;
      }

      result = await sb.auth.signUp({ email, password });
      if (result.error) throw result.error;
      // 检查是否邮箱已被注册
      if (result.data?.user?.identities?.length === 0) {
        showAuthError('该邮箱已被注册');
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
      }
      
      // 注册成功后写入 user_profiles
      if (result.data?.user) {
        try {
          const token = result.data.session?.access_token || SUPABASE_KEY;
          await fetch(`${API_BASE}/user_profiles`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({
              user_id: result.data.user.id,
              nickname: nickname
            })
          });
        } catch (e) {
          console.warn('写入昵称失败，可稍后补填:', e);
        }
      }

      if (result.data?.user && !result.data.session) {
        // 需要邮箱确认
        showAuthSuccess('📮 注册成功！验证邮件已发送到 ' + email + '，请查收并点击确认链接后再登录。');
        btn.disabled = false;
        btn.textContent = '注 册';
        isSignUpMode = false;
        toggleAuthMode(); // 切到登录模式
        return;
      }
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
      if (result.error) throw result.error;
    }

    // 登录/注册成功，onAuthStateChange 会处理 UI 切换
  } catch (err) {
    const msg = err.message || '操作失败';
    const translated = msg.includes('Invalid login') ? '邮箱或密码错误'
      : msg.includes('Email not confirmed') ? '📮 请先去邮箱点击确认链接，再回来登录'
      : msg.includes('already registered') ? '该邮箱已被注册'
      : msg.includes('rate limit') ? '操作太频繁，请稍后再试'
      : msg.includes('duplicate') || msg.includes('unique') ? '该昵称已被使用，请换一个'
      : msg;
    showAuthError(translated);
    btn.disabled = false;
    btn.textContent = isSignUpMode ? '注 册' : '登 录';
  }
}

const CATEGORIES = [
  { id: 'thought', emoji: '💭', label: '想法' },
  { id: 'inspiration', emoji: '⚡', label: '灵感' },
  { id: 'todo', emoji: '✅', label: '待办' },
  { id: 'quote', emoji: '📖', label: '摘录' },
  { id: 'link', emoji: '🔗', label: '链接' },
  { id: 'reflection', emoji: '🪞', label: '感悟' },
  { id: 'product', emoji: '🧪', label: '产品' },
];
const typeLabels = {};
CATEGORIES.forEach(c => typeLabels[c.id] = c.label);

// ---- Smart Classification ----
function classifyContent(text) {
  const t = text.toLowerCase();
  const trimmed = text.trim();
  const scores = {};
  CATEGORIES.forEach(c => scores[c.id] = 0);

  // ===== 链接识别 =====
  if (/https?:\/\/|www\.|\.com|\.cn|\.io|\.org|\.net/i.test(t) || /xhslink|bilibili|zhihu|weixin|douyin/i.test(t)) scores.link += 10;

  // ===== 待办识别（大幅强化） =====
  // 1. 显式待办关键词
  if (/要做|需要|待办|todo|记得|别忘|提醒|deadline|ddl|计划做|打算|安排/i.test(t)) scores.todo += 10;
  // 2. 时间 + 动作 模式（"9点去游泳"、"明天开会"、"下午3点面试"、"周末搬家"）
  if (/\d{1,2}[点时:：]\d{0,2}.*[去做到上来回买取送拿接办跑打写寄交约见弄搞学练修剪洗扫拖煮烧烤发带拍挂订]/.test(trimmed)) scores.todo += 12;
  if (/\d{1,2}[点时:：]\d{0,2}/.test(trimmed) && trimmed.length < 30) scores.todo += 8;
  // 3. 时间词开头/包含（明天、今天、下午、周一、下周...）
  if (/^(今天|明天|后天|今晚|明早|早上|上午|下午|晚上|傍晚|中午|周[一二三四五六日末]|下周|这周|本周|月底|月初|年底)/.test(trimmed)) scores.todo += 8;
  if (/(明天|后天|今晚|明早|下午|晚上|周[一二三四五六日末]|下周|下个月)/.test(t) && trimmed.length < 40) scores.todo += 6;
  // 4. 祈使/动作句式（"去+地点"、"买+东西"、"约+人"）
  if (/^(去|买|约|找|问|看|查|办|交|还|拿|取|寄|送|接|打|写|做|弄|搞|订|预约|报名|联系|回复|确认|提交|完成|处理|准备|整理|收拾|打扫)/.test(trimmed)) scores.todo += 8;
  // 5. 列表/清单模式（"1. xxx" "- xxx"）
  if (/^[\d①②③④⑤⑥⑦⑧⑨⑩][.、)）]\s*\S/.test(trimmed) || /^[-•·]\s*\S/.test(trimmed)) scores.todo += 5;
  // 6. 结尾动作词
  if (/[去做办买取送拿接交寄还]$/.test(trimmed) && trimmed.length < 20) scores.todo += 6;
  // 7. 常见待办短语
  if (/充(值|电|钱)|缴(费|税|纳)|还(钱|款|书|卡)|预约|挂号|签到|打卡|报销|续费|加油|充会员|交房租|交水电/i.test(t)) scores.todo += 10;
  // 8. 短文本 + 包含动词（短句更可能是待办而非想法）
  const hasActionVerb = /[去做买约找看办交还拿取寄送接打写弄搞订]/.test(trimmed);
  if (trimmed.length <= 15 && hasActionVerb) scores.todo += 4;

  // ===== 摘录识别 =====
  if (/[""「」『』]/.test(text) || /说过|名言|摘录|原文|出自|引用|——.*说/i.test(t)) scores.quote += 8;
  if (/^["「『]/.test(trimmed)) scores.quote += 10;

  // ===== 产品识别 =====
  if (/产品|用户体验|ux|ui|交互|需求|功能|体验|设计|迭代|mvp|feature|痛点|场景|用户/i.test(t)) scores.product += 7;
  if (/产品经理|pm|产品设计|用户调研|竞品/i.test(t)) scores.product += 10;

  // ===== 感悟识别 =====
  if (/感觉|觉得|认为|反思|本质|启发|认知|思考|感受|感悟|理解|洞察|意识到|发现了|明白了|宽容|容错/i.test(t)) scores.reflection += 7;
  if (/人生|哲学|价值观|世界观|底层逻辑/i.test(t)) scores.reflection += 5;

  // ===== 灵感识别 =====
  if (/突然|灵感|想到一个|如果能|可以做一个|idea|创意|点子|脑洞|能不能/i.test(t)) scores.inspiration += 10;

  // ===== 技术/AI 话题 =====
  if (/ai|人工智能|gpt|llm|agent|模型|算法|机器学习|mcp|token|prompt/i.test(t)) {
    scores.thought += 5;
    if (scores.product > 0) scores.product += 3;
    if (scores.reflection > 0) scores.reflection += 3;
  }

  // ===== 想法默认分（降低权重，避免轻易压过其他类型） =====
  scores.thought += 1;

  const sorted = Object.entries(scores).filter(([_, s]) => s > 0).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return ['thought'];
  const topScore = sorted[0][1];
  const rec = [];
  sorted.forEach(([id, score]) => { if (score >= topScore * 0.5 && score > 3) rec.push(id); });
  if (rec.length === 0) rec.push(sorted[0][0]);
  return rec.slice(0, 3);
}

// ---- State ----
let entries = [];
let allEntries = []; // all entries loaded for Q&A
let cachedEntries = [];
let selectedTypes = new Set();
let currentRecommended = [];
let manuallyDeselected = new Set();
let debounceTimer = null;

// ---- Compose Chips ----
function renderComposeChips() {
  const grid = document.getElementById('composeChips');
  grid.innerHTML = CATEGORIES.map(c => {
    const isSel = selectedTypes.has(c.id);
    const isRec = currentRecommended.includes(c.id);
    return `<button class="compose-chip ${isSel ? 'selected' : ''} ${isRec ? 'recommended' : ''}"
              data-type="${c.id}" onclick="toggleChip('${c.id}')">
              ${c.emoji} ${c.label}<span class="rec-dot"></span></button>`;
  }).join('');
}

function toggleChip(typeId) {
  if (selectedTypes.has(typeId)) {
    selectedTypes.delete(typeId);
    if (currentRecommended.includes(typeId)) manuallyDeselected.add(typeId);
  } else {
    selectedTypes.add(typeId);
    manuallyDeselected.delete(typeId);
  }
  renderComposeChips();
}

function onContentChange() {
  const text = document.getElementById('contentInput').value.trim();
  if (text.length < 4) { currentRecommended = []; renderComposeChips(); return; }
  const rec = classifyContent(text);
  const prevRec = new Set(currentRecommended);
  currentRecommended = rec;
  rec.forEach(r => { if (!prevRec.has(r) && !manuallyDeselected.has(r)) selectedTypes.add(r); });
  renderComposeChips();
}

// ---- Submit ----
async function handleSubmit() {
  const content = document.getElementById('contentInput').value.trim();
  if (!content) { showToast('写点什么再提交'); return; }
  if (selectedTypes.size === 0) { classifyContent(content).forEach(t => selectedTypes.add(t)); renderComposeChips(); }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  const typesArray = Array.from(selectedTypes);
  const primaryType = typesArray[0];
  const extraTypeTags = typesArray.slice(1).map(t => { const c = CATEGORIES.find(c => c.id === t); return c ? c.label : t; });
  const tagsRaw = document.getElementById('tagsInput').value.trim();
  const userTags = tagsRaw ? tagsRaw.split(/[\s,，、]+/).filter(Boolean) : [];
  const allTags = [...userTags, ...extraTypeTags];
  const title = content.length > 30 ? content.substring(0, 30) + '...' : content;
  // Extract URLs from content
  const detectedUrls = extractUrls(content);
  _lastRawInputText = detectedUrls.length > 0 ? content : ''; // 记录原始文本用于前端预解析
  const entry = { title, content, type: primaryType, tags: allTags, urls: detectedUrls, source: /iPhone|iPad|Android/i.test(navigator.userAgent) ? '手机' : '电脑', user_id: currentUser?.id };
  try {
    const res = await fetch(`${API_BASE}/entries`, { method: 'POST', headers, body: JSON.stringify(entry) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const saved = await res.json();
    document.getElementById('contentInput').value = '';
    document.getElementById('contentInput').style.height = 'auto';
    document.getElementById('tagsInput').value = '';
    selectedTypes.clear(); currentRecommended = []; manuallyDeselected.clear();
    renderComposeChips();
    btn.disabled = false; btn.textContent = '记下来';
    if (navigator.vibrate) navigator.vibrate(10);
    // 需求1：记录用户手动切换分类（AI推荐 vs 用户最终选择）
    const aiRecommended = classifyContent(content);
    const userFinal = typesArray;
    const wasManuallyChanged = JSON.stringify(aiRecommended.sort()) !== JSON.stringify([...userFinal].sort());
    if (wasManuallyChanged) {
      _ba.track('classify_correction', 'compose', 'manual_override', 0, {
        ai_recommended: aiRecommended,
        user_selected: userFinal,
        content_preview: content.substring(0, 50)
      });
      console.log(`[分类修正] AI推荐: ${aiRecommended.join(',')} → 用户选择: ${userFinal.join(',')}`);
    }
    _ba.track('submit_entry', 'compose', primaryType, content.length, { has_url: detectedUrls.length > 0, tags: allTags.length, ai_types: aiRecommended, manual_override: wasManuallyChanged });
    // BUG-07 fix: Supabase POST 可能返回空数组，确保 savedEntry 有有效 id
    const savedEntry = (Array.isArray(saved) && saved.length > 0) ? saved[0] : null;
    if (!savedEntry || !savedEntry.id) {
      // 如果返回为空，用本地构造的 entry 降级（但不调用需要 id 的操作如 saveLinkSummary）
      const fallbackEntry = { ...entry, content, id: null };
      if (detectedUrls.length > 0) {
        showToast('已保存，正在读取链接内容...');
        generateInsightWithLink(fallbackEntry, detectedUrls[0]);
      } else {
        showToast('已记录 ✓');
        generateInsight(fallbackEntry);
      }
    } else {
      // If URL detected — main feedback is link content reading
      if (detectedUrls.length > 0) {
        showToast('已保存，正在读取链接内容...');
        generateInsightWithLink(savedEntry, detectedUrls[0]);
      } else {
        showToast('已记录 ✓');
        generateInsight(savedEntry);
      }
    }
  } catch (err) {
    console.error('Save error:', err);
    showToast('保存失败，请检查网络');
    btn.disabled = false; btn.textContent = '记下来';
  }
}

// ---- URL Extraction ----
function extractUrls(text) {
  // 排除中文字符、中文标点、全角字符、emoji 等非 URL 字符
  const urlRegex = /https?:\/\/[^\s<>"\u4e00-\u9fff\uff00-\uffef\u3000-\u303f\u2000-\u206f\u{1F300}-\u{1FAFF}\u{1F600}-\u{1F64F}\u{1F680}-\u{1F6FF}]+/giu;
  const matches = (text.match(urlRegex) || []).map(u => u.replace(/[,;:!?)\]】）。！？，、；：]+$/, ''));
  // Also detect short links like xhslink.com/xxx
  const shortRegex = /(?:xhslink\.com|b23\.tv|t\.cn|dwz\.cn|youtu\.be)\/[^\s<>"\u4e00-\u9fff\uff00-\uffef\u3000-\u303f]+/gi;
  const shortMatches = (text.match(shortRegex) || [])
    .map(u => u.replace(/[,;:!?)\]】）。！？，、；：]+$/, ''))
    .map(u => u.startsWith('http') ? u : 'https://' + u);
  return [...new Set([...matches, ...shortMatches])];
}

// Identify link platform
function identifyPlatform(url) {
  const u = url.toLowerCase();
  if (/xiaohongshu\.com|xhslink\.com|xhs\.cn/.test(u)) return { name: '小红书', icon: '📕' };
  if (/youtube\.com|youtu\.be/.test(u)) return { name: 'YouTube', icon: '▶️' };
  if (/bilibili\.com|b23\.tv/.test(u)) return { name: 'B站', icon: '📺' };
  if (/zhihu\.com/.test(u)) return { name: '知乎', icon: '💬' };
  if (/weixin\.qq\.com|mp\.weixin/.test(u)) return { name: '微信公众号', icon: '💚' };
  if (/douyin\.com/.test(u)) return { name: '抖音', icon: '🎵' };
  if (/twitter\.com|x\.com/.test(u)) return { name: 'X/Twitter', icon: '🐦' };
  if (/github\.com/.test(u)) return { name: 'GitHub', icon: '🐙' };
  if (/juejin\.cn/.test(u)) return { name: '掘金', icon: '💎' };
  if (/36kr\.com/.test(u)) return { name: '36氪', icon: '📰' };
  if (/sspai\.com/.test(u)) return { name: '少数派', icon: '📝' };
  if (/notion\.so|notion\.site/.test(u)) return { name: 'Notion', icon: '📄' };
  if (/medium\.com/.test(u)) return { name: 'Medium', icon: '📖' };
  try { return { name: new URL(url).hostname.replace('www.', ''), icon: '🔗' }; } catch { return { name: '网页', icon: '🔗' }; }
}

// ---- 小红书分享文本预解析（前端直接提取，不依赖后端）----
function parseXhsShareText(fullText) {
  // 小红书分享文本常见格式:
  // 格式A: "58 花名不详🌿 发布了一篇小红书笔记，快来看吧！ 😆 笔记标题 😆 http://xhslink.com/a/xxx"
  // 格式B: "#标题标签# 作者名的小红书 http://xhslink.com/xxx"
  // 格式C: "标题内容 💽 作者... http://xhslink.com/xxx 复制后打开【小红书】查看笔记！"
  // 格式D: "标题内容 http://xhslink.com/xxx 复制后打开【小红书】查看笔记！"
  if (!fullText || !/xhslink\.com|xiaohongshu\.com/.test(fullText)) return null;

  let author = '', title = '';

  // 格式A: "XX 作者名 发布了一篇小红书笔记" + "😆 标题 😆"
  const m1 = fullText.match(/\d+\s+(.+?)\s+发布了一篇小红书笔记/);
  if (m1) author = m1[1].trim();

  // 提取 😆...😆 之间的标题
  const m2 = fullText.match(/😆\s*(.+?)\s*😆/);
  if (m2) title = m2[1].trim();

  // "来自 作者名 的分享/小红书"
  if (!author) {
    const m3 = fullText.match(/来自\s*(.+?)\s*的(?:分享|小红书)/);
    if (m3) author = m3[1].trim();
  }

  // 格式B: #话题标签# 作为标题线索
  if (!title) {
    const hashTags = fullText.match(/#([^#]+?)#/g);
    if (hashTags && hashTags.length > 0) {
      title = hashTags.map(t => t.replace(/#/g, '')).join(' ');
    }
  }

  // 格式C/D（通用 fallback）: URL 前面的内容就是标题
  // 去掉已知后缀和 URL，剩下的就是标题
  if (!title) {
    const urlMatch = fullText.match(/https?:\/\/(xhslink\.com|xiaohongshu\.com)[^\s]*/);
    if (urlMatch) {
      let beforeUrl = fullText.substring(0, fullText.indexOf(urlMatch[0])).trim();
      // 清理尾部 emoji 和省略号（如 "💽 Claude..."）
      // 如果尾部有 "作者..." 的模式，尝试提取作者
      const authorTrail = beforeUrl.match(/[\s\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]+(\S+?)\.{2,3}$/u);
      if (authorTrail) {
        author = author || authorTrail[1].trim();
        beforeUrl = beforeUrl.substring(0, authorTrail.index).trim();
      }
      // 清理末尾残留的 emoji
      beforeUrl = beforeUrl.replace(/[\s\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}]+$/u, '').trim();
      if (beforeUrl.length >= 2) {
        title = beforeUrl;
      }
    }
  }

  // 去除作者名前后的数字编号
  if (author) author = author.replace(/^\d+\s*/, '').trim();

  if (!author && !title) return null;

  const platform = { name: '小红书', icon: '📕' };
  const summaryText = title || `来自 ${author} 的小红书笔记`;
  return {
    title: title || '小红书笔记',
    description: summaryText,
    bodyText: summaryText,
    summary: {
      title: title || '小红书笔记',
      platform,
      text: summaryText,
      keywords: [],
      author: author || '',
      extraInfo: author ? `👤 ${author}` : '',
      contentType: '',
    },
    _fromShareText: true,
  };
}

// ---- Link Parser API ----
const LINK_PARSER_API = 'https://link-parser-api.onrender.com'; // 部署后的地址（HTTPS，GitHub Pages 兼容）
const LINK_PARSER_TENCENT = 'http://81.71.120.8'; // 腾讯云服务器（Nginx 反代 → 8900，仅非HTTPS环境可用）
const LINK_PARSER_LOCAL = 'http://localhost:8900'; // 本地调试

// 判断当前是否在 HTTPS 环境（GitHub Pages 等），HTTPS 页面无法调用 HTTP API（Mixed Content）
const IS_SECURE_CONTEXT = location.protocol === 'https:';

// 存储原始输入文本（用于前端预解析 fallback）
let _lastRawInputText = '';
// 存储后端返回的部分数据（如 note_id）用于 fallback 增强
let _lastApiPartialData = null;

async function fetchLinkContent(url) {
  _lastApiPartialData = null;

  // 1. 先尝试自建 API（服务端 httpx 抓取，支持小红书/B站/YouTube等）
  const apiResult = await fetchFromParserAPI(url);
  if (apiResult) return apiResult;

  // 2. 小红书专用：用后端返回的 note_id + 分享文本组合出结果
  const isXhs = /xhslink\.com|xiaohongshu\.com|xhs\.cn/.test(url);
  if (isXhs) {
    const xhsResult = _buildXhsCompositeResult(url);
    if (xhsResult) return xhsResult;
  }

  // 3. 降级：CORS proxy（对普通网页可能有效，小红书不用尝试了）
  if (!isXhs) {
    const proxyResult = await fetchFromCorsProxy(url);
    if (proxyResult) return proxyResult;
  }

  // 4. 最终降级：从分享文本中直接提取（小红书专用）
  if (_lastRawInputText) {
    const xhsResult = parseXhsShareText(_lastRawInputText);
    if (xhsResult) return xhsResult;
  }

  return null;
}

// 组合 Render 返回的 note_id + 分享文本解析，构造小红书展示结果
function _buildXhsCompositeResult(originalUrl) {
  const noteId = _lastApiPartialData?.note_id;
  const shareTextResult = _lastRawInputText ? parseXhsShareText(_lastRawInputText) : null;

  // 至少需要 note_id 或分享文本解析结果之一
  if (!noteId && !shareTextResult) return null;

  const platform = { name: '小红书', icon: '📕' };
  const title = shareTextResult?.title || '';
  const author = shareTextResult?.summary?.author || '';

  // 构造小红书标准链接
  const noteUrl = noteId ? `https://www.xiaohongshu.com/explore/${noteId}` : originalUrl;

  // 至少有标题或 note_id 才算有效结果
  if (!title && !noteId) return null;

  const displayTitle = title || '小红书笔记';
  const summaryText = title
    ? (author ? `👤 ${author}\n\n${title}` : title)
    : (author ? `👤 ${author} 的小红书笔记` : '小红书笔记');

  return {
    title: displayTitle,
    description: summaryText,
    bodyText: summaryText,
    summary: {
      title: displayTitle,
      platform,
      text: summaryText,
      keywords: [],
      author: author,
      extraInfo: noteId ? `🔗 笔记ID: ${noteId}` : '',
      contentType: '',
      noteUrl, // 方便后续使用标准链接
    },
    _fromShareText: true,
    _noteId: noteId,
  };
}

async function fetchFromParserAPI(url) {
  // 根据安全上下文选择端点：HTTPS 环境下不能调 HTTP 端点（Mixed Content 限制）
  const endpoints = IS_SECURE_CONTEXT
    ? [LINK_PARSER_API]  // HTTPS 环境只用 Render（HTTPS）
    : [LINK_PARSER_API, LINK_PARSER_TENCENT, LINK_PARSER_LOCAL]; // 非 HTTPS 可用全部
  for (const base of endpoints) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 18000);
      const res = await fetch(`${base}/parse?url=${encodeURIComponent(url)}`, {
        signal: controller.signal,
      });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.error) {
        // 即使失败了，也保存有用的部分数据（如 note_id）
        if (data.note_id && !_lastApiPartialData?.note_id) {
          _lastApiPartialData = { note_id: data.note_id, platform: data.platform };
        }
        continue;
      }

      // 检测"有结构但无实质内容"的情况（后端反爬拿到空壳数据）
      const FALLBACK_TITLES = ['小红书笔记', '未获取到标题', ''];
      const ERROR_PATTERNS = ['页面不见了', '页面不存在', '404', '访问受限', '请在app内打开', '需要验证', '登录'];
      const hasRealTitle = data.title && !FALLBACK_TITLES.includes(data.title)
        && !ERROR_PATTERNS.some(p => (data.title || '').includes(p));
      const hasRealSummary = data.summary && data.summary.length > 2
        && !ERROR_PATTERNS.some(p => (data.summary || '').includes(p))
        && !/沪ICP备|营业执照|网信算备/.test(data.summary || '');
      const hasRealAuthor = data.author && data.author !== '未知' && data.author !== '';
      if (!hasRealTitle && !hasRealSummary && !hasRealAuthor) continue; // 视为失败，尝试下一个

      // 转换为前端统一格式
      const platform = data.platform || identifyPlatform(url);
      const keywords = extractKeywords(`${data.title || ''} ${data.summary || ''}`).slice(0, 5);
      return {
        title: data.title || '',
        description: data.summary || '',
        bodyText: data.summary || '',
        summary: {
          title: data.title || '未获取到标题',
          platform,
          text: data.summary || '',
          keywords,
          author: data.author || '',
          extraInfo: data.extra_info || '',
          contentType: data.content_type || '',
        },
      };
    } catch {
      continue;
    }
  }
  return null;
}

async function fetchFromCorsProxy(url) {
  const proxies = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  ];
  for (const makeProxy of proxies) {
    try {
      const proxyUrl = makeProxy(url);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(proxyUrl, {
        signal: controller.signal,
        headers: { 'Accept': 'text/html,application/xhtml+xml,*/*' }
      });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const html = await res.text();
      if (html.length < 100) continue;
      return parseHtmlContent(html, url);
    } catch { continue; }
  }
  return null;
}

function parseHtmlContent(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  let title = '';
  const ogTitle = doc.querySelector('meta[property="og:title"]');
  const twitterTitle = doc.querySelector('meta[name="twitter:title"]');
  const titleTag = doc.querySelector('title');
  title = (ogTitle?.content || twitterTitle?.content || titleTag?.textContent || '').trim();

  let description = '';
  const ogDesc = doc.querySelector('meta[property="og:description"]');
  const twitterDesc = doc.querySelector('meta[name="twitter:description"]');
  const metaDesc = doc.querySelector('meta[name="description"]');
  description = (ogDesc?.content || twitterDesc?.content || metaDesc?.content || '').trim();

  ['script','style','nav','footer','header','aside','iframe','noscript','svg'].forEach(tag => {
    doc.querySelectorAll(tag).forEach(el => el.remove());
  });
  let bodyText = '';
  const article = doc.querySelector('article') || doc.querySelector('[role="main"]') || doc.querySelector('.content');
  bodyText = (article || doc.body)?.textContent || '';
  bodyText = bodyText.replace(/\s+/g, ' ').trim();
  if (bodyText.length > 2000) bodyText = bodyText.substring(0, 2000);

  const platform = identifyPlatform(url);
  const keywords = extractKeywords(`${title} ${description} ${bodyText}`).slice(0, 5);
  let summary = '';
  if (description && description.length > 30) {
    summary = description.length > 300 ? description.substring(0, 300) + '...' : description;
  } else if (bodyText.length > 50) {
    const sentences = bodyText.match(/[^。！？.!?\n]+[。！？.!?\n]?/g) || [];
    summary = sentences.filter(s => s.trim().length > 10).slice(0, 4).join('').trim();
    if (summary.length > 300) summary = summary.substring(0, 300) + '...';
    if (summary.length < 20) summary = bodyText.substring(0, 200) + '...';
  } else if (description) { summary = description; }
  if (!summary && title) summary = `来自${platform.name}的内容：${title}`;
  if (!summary) return null;
  return { title, description, bodyText, summary: { title: title || '未获取到标题', platform, text: summary, keywords } };
}

  } catch {}
  const others = insightHistory.filter(e => e.id !== savedEntry.id);
