  let insightData = null;

    ? [LINK_PARSER_API]
    : [LINK_PARSER_API, LINK_PARSER_TENCENT, LINK_PARSER_LOCAL];
  const inspireBody2 = JSON.stringify({
    content: savedEntry.content,
    type: savedEntry.type,
    history: others.slice(0, 8).map(e => ({ content: e.content.substring(0, 200), type: e.type })),
  });
  for (const base of inspireEndpoints2) {
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutMs = attempt === 0 ? 45000 : 30000;
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        console.log(`[灵感碰撞-链接] 尝试 ${base} (attempt ${attempt + 1})`);
        const res = await fetch(`${base}/inspire`, {
          method: 'POST', signal: controller.signal,
          headers: { 'Content-Type': 'application/json' },
          body: inspireBody2,
        });
        clearTimeout(timeout);
        if (res.ok) {
          const text = await res.text();
          try { insightData = JSON.parse(text); } catch { console.error('[灵感碰撞-链接] JSON 解析失败'); continue; }
          if (insightData && insightData.insight) break;
        }
      } catch (err) {
        console.warn(`[灵感碰撞-链接] ${base} attempt ${attempt + 1} 失败:`, err.name);
        if (err.name === 'AbortError' && attempt === 0) continue;
        break;
      }

  }

  // 如果后端灵感引擎不可用，降级到本地分析
  const insight = insightData || null;
  const localInsight = analyzeInsight(savedEntry, others);

  // ========== BUILD RESULT CARD ==========

              ${s.keywords.map(k => `<span class="link-kw-tag">${escapeHtml(k)}</span>`).join('')}
            </div>` : ''}
        </div>

        ${insight && insight.insight ? `

            <div style="font-size:13px;line-height:1.7;color:rgba(255,255,255,0.75);padding:4px 0;">${formatInsightText(insight.insight)}</div>
            ${insight.sources && insight.sources.length > 0 ? insight.sources.map(s =>
              `<div class="insight-related-item"><span class="insight-source-tag">[${escapeHtml(s.from)}]</span> ${escapeHtml(s.title)}</div>`

          </div>` : '')}
      </div>`;
  } else {

    const failSources = insight && insight.sources ? insight.sources : [];
    const failModeBadge = insight ? buildModeBadge(insight) : '<span class="insight-mode-badge mode-local">本地分析</span>';
    container.innerHTML = `

// ---- Save link summary to DB ----
async function saveLinkSummary(entryId, summaryData) {
  if (!entryId) return;
  try {
    await fetch(`${API_BASE}/entries?id=eq.${entryId}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ link_summary: summaryData })
    });
  } catch (err) {
    console.warn('Failed to save link summary:', err);
  }
}

// ---- 灵光一闪：粒子爆炸特效 ----
function spawnSparkleParticles(card) {
  const emojis = ['✨', '⚡', '💡', '🌟', '✦', '◆', '🔥', '💫'];
  const rect = card.getBoundingClientRect();
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;';
  document.body.appendChild(container);

  // 全屏闪光效果
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;' +
    'background:radial-gradient(circle at 50% 40%, rgba(255,215,0,0.25), rgba(191,90,242,0.08) 50%, transparent 70%);' +
    'animation:screenFlash 0.8s ease-out forwards;';

      animation:sparkleParticle ${dur}s ease-out ${delay}s forwards;

  // 第二波：8 颗延迟涟漪粒子（更远更慢）

      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 60;
      const dur = 1.2 + Math.random() * 0.6;
      const size = 12 + Math.random() * 10;
      p.style.cssText = `position:fixed;left:${startX}px;top:${startY}px;font-size:${size}px;pointer-events:none;z-index:9999;opacity:0;
        animation:sparkleParticle ${dur}s ease-out forwards;
        --dx:${dx}px; --dy:${dy}px;`;

  }, 300);

  // 注入 keyframes（只需注入一次）
  if (!document.getElementById('sparkleParticleKF')) {

    style.textContent = `

        0% { opacity: 1; }

  }

}

// ---- 待办异步灵感碰撞（问题2：待办类型也要碰撞）----
async function _todoAsyncInspire(newEntry) {
  const appendEl = document.getElementById('todoInsightAppend');

  let insightHistory = [...cachedEntries];
  try {
    if (insightHistory.length === 0) {

      if (res.ok) insightHistory = await res.json();
    }
  } catch {}
  const others = insightHistory.filter(e => e.id !== newEntry.id);

  let insightData = null;
  const endpoints = IS_SECURE_CONTEXT
    ? [LINK_PARSER_API]
    : [LINK_PARSER_API, LINK_PARSER_TENCENT, LINK_PARSER_LOCAL];
  const todoBody = JSON.stringify({
    content: newEntry.content, type: newEntry.type,
    history: others.slice(0, 8).map(e => ({ content: e.content.substring(0, 200), type: e.type })),
  });
  for (const base of endpoints) {
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutMs = attempt === 0 ? 45000 : 30000;
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        console.log(`[灵感碰撞-待办] 尝试 ${base} (attempt ${attempt + 1})`);
        const res = await fetch(`${base}/inspire`, {

          if (insightData && insightData.insight) break;

      } catch (err) {
        console.warn(`[灵感碰撞-待办] ${base} attempt ${attempt + 1} 失败:`, err.name);

          ${sources.map(s => `<div class="insight-related-item"><span class="insight-source-tag">[${escapeHtml(s.from)}]</span> ${escapeHtml(s.title)}</div>`).join('')}</div>` : ''}

    // 触发 sparkle 特效

function buildModeBadge(data) {
  const hasKB = data.has_knowledge;
  const hasNotes = data.has_notes;
  const hasAI = data.has_ai;

  if (hasAI && (hasKB || hasNotes)) {
    // AI 碰撞模式（最强）
    const parts = [];
    if (hasKB) parts.push('知识库');
    if (hasNotes) parts.push('笔记');
    return `<span class="insight-mode-badge mode-ai">${parts.join('+')} · AI 碰撞</span>`;
  } else if (hasAI) {
    return '<span class="insight-mode-badge mode-ai">AI 碰撞</span>';
  } else if (hasKB || hasNotes) {
    // 规则匹配模式
    const parts = [];
    if (hasKB) parts.push('知识库');
    if (hasNotes) parts.push('笔记');
    return `<span class="insight-mode-badge mode-rule">${parts.join('+')} · 规则匹配</span>`;
  } else {
    // 纯鼓励模式

  }
}

// ---- 格式化 insight 文本（Task 4: 长文本排版优化）----
function formatInsightText(text) {
  if (!text) return '';
  // 先转义 HTML，然后恢复有意义的格式
  let html = escapeHtml(text);
  // 处理换行符
  html = html.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  // 加粗 **text** 或 *text*
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 如果有段落分隔，包裹 p 标签
  if (html.includes('</p>')) {
    html = '<p>' + html + '</p>';
  }
  return html;
}

function analyzeInsight(newEntry, history) {
  const tl = CATEGORIES.find(c => c.id === newEntry.type)?.label || newEntry.type;

  // No history at all — first entry ever
  if (history.length === 0) {
    return pickEncouragement(newEntry, tl, 0);
  }

  const newWords = extractKeywords(newEntry.content);
  const scored = history.map(e => {
    const eWords = extractKeywords(e.content);
    const overlap = newWords.filter(w => eWords.includes(w));
    const sameType = e.type === newEntry.type ? 1 : 0;
    const newTags = new Set(newEntry.tags || []);
    const tagOverlap = (e.tags || []).filter(t => newTags.has(t)).length;
    return { entry: e, score: overlap.length * 3 + sameType + tagOverlap * 2, overlapWords: overlap };
  }).filter(s => s.score > 2).sort((a, b) => b.score - a.score);

  // Count same-type entries in history
  const tc = {}; history.forEach(e => { tc[e.type] = (tc[e.type] || 0) + 1; });
  const sameTypeCount = (tc[newEntry.type] || 0) + 1; // +1 for the new one

  // No strong connections → encouragement mode
  if (scored.length === 0) {
    return pickEncouragement(newEntry, tl, sameTypeCount);
  }

  // Has connections → insight mode (existing logic)
  const top = scored.slice(0, 3);
  const related = top.map(s => s.entry.content.length > 50 ? s.entry.content.substring(0, 50) + '...' : s.entry.content);
  const allOW = [...new Set(top.flatMap(s => s.overlapWords))];
  let summary = '';
  if (allOW.length > 0) {
    const kw = allOW.slice(0, 4).map(w => `<strong>${w}</strong>`).join('、');
    const stc = top.filter(s => s.entry.type === newEntry.type).length;
    if (top.length >= 2) {
      summary = `这条记录与你之前的 <strong>${top.length} 条想法</strong>有关联，核心关键词：${kw}。`;
      summary += stc >= 2 ? ` 你已经在「${tl}」类下积累了多条相关记录，值得持续深挖。` : ` 这些想法跨越不同分类，或许正形成更大的思考脉络。`;
    } else {
      summary = `这条记录与一条历史想法产生了共鸣，关键词：${kw}。持续记录，连点成线。`;
    }
  } else {
    summary = `你最近在相似方向上有不少思考，持续积累会带来意想不到的灵感碰撞。`;
  }
  if (sameTypeCount >= 5) {
    summary += ` 提示：你在「${tl}」下已有 <strong>${sameTypeCount}</strong> 条记录。`;
  }
  return { mode: 'insight', icon: '✨', title: '灵感亮点', summary, related };
}

// Positive encouragement when no strong connections found
function pickEncouragement(newEntry, typeLabel, sameTypeCount) {
  const content = newEntry.content;
  const len = content.length;

  // Build a pool of encouragements and randomly pick one
  const pool = [];

  // Based on content length
  if (len > 100) {
    pool.push('这条记录很丰富，长篇思考往往能沉淀出最好的洞察。');
    pool.push('写得挺详细的，认真记录的习惯会让你未来受益。');
  } else if (len > 40) {
    pool.push('不错的记录，每一条想法都是未来灵感的种子。');
    pool.push('又多了一条，保持这个节奏，好想法会越积越多。');
  } else {
    pool.push('简短有力，有时候最棒的灵感就是几个字。');
    pool.push('先记下来就对了，以后说不定会用到。');
  }

  // Based on type
  const typeEncouragements = {
    thought: ['每一个想法都值得被记住，继续思考。', '想法记下来才不会溜走，做得好。'],
    inspiration: ['灵感稍纵即逝，你抓住了它。', '又一个灵感入库了，说不定哪天它就派上用场。'],
    todo: ['记下待办是搞定事情的第一步。', '加入清单了，执行力从这里开始。'],
    quote: ['好的摘录会在某个时刻点亮你的思路。', '收藏的好句子，未来会跟你的想法产生共鸣。'],
    link: ['收藏了一条资源，好内容值得回头看。', '链接存好了，以后想找就能找到。'],
    reflection: ['感悟是最珍贵的思考结晶。', '反思让人进步，这条记录很有价值。'],
    product: ['产品嗅觉在线，保持对需求的敏感度。', '又一条产品思考，这些积累会成为你的竞争力。'],
  };
  const typePool = typeEncouragements[newEntry.type] || typeEncouragements.thought;
  pool.push(...typePool);

  // Based on accumulation count
  if (sameTypeCount === 1) {
    pool.push(`这是你的第一条「${typeLabel}」记录，一个好的开始。`);
  } else if (sameTypeCount >= 5 && sameTypeCount < 10) {
    pool.push(`你在「${typeLabel}」下已经积累了 <strong>${sameTypeCount}</strong> 条，量变即将产生质变。`);
  } else if (sameTypeCount >= 10) {
    pool.push(`「${typeLabel}」已有 <strong>${sameTypeCount}</strong> 条记录了，这已经是一个小型专题库。`);
  }

  // Time-based encouragements
  const hour = new Date().getHours();
  if (hour >= 0 && hour < 6) {
    pool.push('深夜灵感往往最真实，休息好也很重要。');
  } else if (hour >= 6 && hour < 9) {
    pool.push('早起记录想法，今天一定会很高效。');
  } else if (hour >= 22) {
    pool.push('临睡前的思考往往特别清醒，记下来是对的。');
  }

  const picked = pool[Math.floor(Math.random() * pool.length)];
  return { mode: 'encouragement', icon: '💫', title: '已记录', summary: picked, related: [] };
}

function detectIntent(question) {
  const q = question.toLowerCase();

  // Search intent: user wants to find a specific record
  const searchPatterns = [
    /找|搜|查|哪条|哪个|哪篇|在哪|定位|搜索/,
    /记过|写过|提过|说过|记录过|有没有/,
    /关于.{1,8}(的|那条|那个|记录)/,
    /^.{1,15}(在哪|是哪)/,
  ];

  // Summary intent: user wants analysis/thinking
  const summaryPatterns = [
    /总结|分析|归纳|梳理|盘点|回顾|复盘|概括/,
    /有什么|有哪些|有几条|多少条/,
    /趋势|规律|特点|共性|主题|方向/,
    /怎么看|怎么想|什么想法|什么思考/,
    /帮我|给我|列出|整理|提炼/,
    /最近|这段时间|这周|这几天|近期/,
  ];

  let searchScore = 0, summaryScore = 0;
  searchPatterns.forEach(p => { if (p.test(q)) searchScore++; });
  summaryPatterns.forEach(p => { if (p.test(q)) summaryScore++; });

  // If question is short and looks like a keyword → treat as search
  if (question.length <= 8 && summaryScore === 0) searchScore += 2;

  // If question ends with ? or ？ and is longer → more likely summary
  if (/[?？]$/.test(question) && question.length > 10) summaryScore += 1;

  return summaryScore > searchScore ? 'summary' : 'search';
}

async function handleAsk() {
  const input = document.getElementById('askInput');
  const question = input.value.trim();
  if (!question) return;
  _ba.track('ask_question', 'review', 'ask', question.length);

  const container = document.getElementById('answerContainer');
  const sendBtn = document.getElementById('askSend');
  sendBtn.disabled = true;

  // Show thinking
  container.innerHTML = `
    <div class="answer-panel summary-mode">
      <div class="thinking">
        <div class="thinking-dots"><span></span><span></span><span></span></div>
        <span class="thinking-text" id="askPhaseText">正在思考...</span>
      </div>
    </div>`;

  // Load all entries if not loaded
  if (allEntries.length === 0) {
    try {
      const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=200`, { headers });
      if (res.ok) allEntries = await res.json();
    } catch {
      container.innerHTML = '';
      showToast('加载记录失败');
      sendBtn.disabled = false;
      return;
    }
  }

  if (allEntries.length === 0) {
    container.innerHTML = '';
    showToast('还没有记录');
    sendBtn.disabled = false;
    return;
  }

  // 先判断意图
  const intent = detectIntent(question);

  // 搜索模式走本地（快速响应）
  if (intent === 'search') {
    await new Promise(r => setTimeout(r, 300));
    renderSearchAnswer(question, container);
    sendBtn.disabled = false;
    return;
  }

  // 总结模式：尝试调用后端 AI
  const phaseEl = document.getElementById('askPhaseText');
  if (phaseEl) phaseEl.textContent = 'AI 分析中...';

  // 5 秒超时提示
  const hintTimer = setTimeout(() => {
    const pt = document.getElementById('askPhaseText');
    if (pt) pt.textContent = 'AI 正在深度分析你的记录...';
  }, 5000);

  let aiResult = null;
  const askEndpoints = IS_SECURE_CONTEXT
    ? [LINK_PARSER_API]
    : [LINK_PARSER_API, LINK_PARSER_TENCENT, LINK_PARSER_LOCAL];

  for (const base of askEndpoints) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      // 传入记录（精简版，减少传输量）
      const entriesForApi = allEntries.slice(0, 200).map(e => ({
        id: e.id,
        content: e.content.substring(0, 500),
        type: e.type,
        tags: (e.tags || []).slice(0, 5),
        created_at: e.created_at,
      }));
      const res = await fetch(`${base}/ask`, {
        method: 'POST',
        signal: controller.signal,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, entries: entriesForApi }),
      });
      clearTimeout(timeout);
      if (res.ok) {
        aiResult = await res.json();
        if (aiResult && aiResult.answer && aiResult.has_ai) break;
        // 如果后端说没 AI，也跳出但走本地
        if (aiResult && !aiResult.has_ai) { aiResult = null; break; }
      }
    } catch { continue; }
  }

  clearTimeout(hintTimer);

  if (aiResult && aiResult.answer) {
    // AI 回答成功
    renderAIAnswer(question, aiResult, container);
  } else {
    // 降级到本地分析
    renderSummaryAnswer(question, container);
  }

  sendBtn.disabled = false;
  // Don't clear input so user can refine
}

// ---- Search Mode: Find and highlight records ----
function renderSearchAnswer(question, container) {
  const questionKW = extractKeywords(question);
  const questionLower = question.toLowerCase();

  // Score each entry for relevance
  const scored = allEntries.map(e => {
    const entryKW = extractKeywords(e.content);
    const contentLower = e.content.toLowerCase();

    let score = 0;
    const matchedWords = [];

    // Direct substring match (strongest signal)
    questionKW.forEach(kw => {
      if (contentLower.includes(kw.toLowerCase())) {
        score += 5;
        matchedWords.push(kw);
      }
    });

    // Keyword overlap
    const overlap = questionKW.filter(w => entryKW.includes(w));
    score += overlap.length * 3;
    overlap.forEach(w => { if (!matchedWords.includes(w)) matchedWords.push(w); });

    // Tag match
    const tags = (e.tags || []).map(t => t.toLowerCase());
    questionKW.forEach(kw => {
      if (tags.some(t => t.includes(kw.toLowerCase()))) score += 4;
    });

    // Type label match
    const tl = typeLabels[e.type] || '';
    if (questionLower.includes(tl)) score += 3;

    return { entry: e, score, matchedWords: [...new Set(matchedWords)] };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    container.innerHTML = `
      <div class="answer-panel search-mode">
        <div class="answer-intent">
          <span class="answer-intent-icon">🔍</span>
          <span class="answer-intent-label">搜索记录</span>
          <button class="answer-close" onclick="closeAnswer()">&times;</button>
        </div>
        <div style="padding: 20px 16px; text-align: center; color: var(--text-tertiary); font-size: 14px;">
          没找到相关记录，试试换个关键词？
        </div>
      </div>`;
    return;
  }

  const topResults = scored.slice(0, 5);

  container.innerHTML = `
    <div class="answer-panel search-mode">
      <div class="answer-intent">
        <span class="answer-intent-icon">🔍</span>
        <span class="answer-intent-label">找到 ${scored.length} 条相关记录</span>
        <button class="answer-close" onclick="closeAnswer()">&times;</button>
      </div>
      <div class="answer-question">"${escapeHtml(question)}"</div>
      <div class="search-results">
        ${topResults.map((s, i) => {
          const e = s.entry;
          const date = new Date(e.created_at);
          const timeStr = formatTime(date);
          const highlighted = highlightText(e.content, s.matchedWords);
          const relevance = Math.min(100, Math.round(s.score / topResults[0].score * 100));
          return `
            <div class="search-result-item" onclick="scrollToEntry('${e.id}')">
              <div class="search-result-header">
                <span class="search-result-badge ${e.type}">${typeLabels[e.type] || e.type}</span>
                <span class="search-result-time">${timeStr}</span>
              </div>
              <div class="search-result-content">${highlighted}</div>
              <div class="search-result-score">
                <span style="color:var(--accent);">●</span> 相关度 ${relevance}%
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function highlightText(text, keywords) {
  let result = escapeHtml(text);
  if (text.length > 120) result = escapeHtml(text.substring(0, 120)) + '...';
  keywords.forEach(kw => {
    const regex = new RegExp(`(${escapeRegex(escapeHtml(kw))})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  });
  return result;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function scrollToEntry(id) {
  // Remove previous highlights
  document.querySelectorAll('.entry-card.highlighted').forEach(el => el.classList.remove('highlighted'));

  const card = document.querySelector(`.entry-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('highlighted');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Remove highlight after 4s
    setTimeout(() => card.classList.remove('highlighted'), 4000);
  } else {
    showToast('该记录不在当前列表中');
  }
}

// ---- Summary Mode: Think and summarize ----
function renderSummaryAnswer(question, container) {
  const questionKW = extractKeywords(question);
  const questionLower = question.toLowerCase();

  // Find relevant entries
  const scored = allEntries.map(e => {
    const entryKW = extractKeywords(e.content);
    const contentLower = e.content.toLowerCase();
    let score = 0;
    questionKW.forEach(kw => { if (contentLower.includes(kw.toLowerCase())) score += 5; });
    const overlap = questionKW.filter(w => entryKW.includes(w));
    score += overlap.length * 3;
    const tags = (e.tags || []).map(t => t.toLowerCase());
    questionKW.forEach(kw => { if (tags.some(t => t.includes(kw.toLowerCase()))) score += 4; });
    const tl = typeLabels[e.type] || '';
    if (questionLower.includes(tl)) score += 3;
    return { entry: e, score };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  // If no keyword matches, use all entries for broad questions
  const relevantEntries = scored.length > 0 ? scored.slice(0, 15).map(s => s.entry) : allEntries.slice(0, 15);
  const isGlobal = scored.length === 0; // broad question about everything

  // Generate summary
  const summary = generateSummary(question, relevantEntries, isGlobal);

  const sources = relevantEntries.slice(0, 5).map(e =>
    e.content.length > 40 ? e.content.substring(0, 40) + '...' : e.content
  );

  container.innerHTML = `
    <div class="answer-panel summary-mode">
      <div class="answer-intent">
        <span class="answer-intent-icon">🧠</span>
        <span class="answer-intent-label">思考总结</span>
        <span class="answer-mode-badge mode-local">本地分析</span>
        <button class="answer-close" onclick="closeAnswer()">&times;</button>
      </div>
      <div class="answer-question">"${escapeHtml(question)}"</div>
      <div class="summary-body">${summary}</div>
      ${sources.length > 0 ? `
        <div class="summary-sources">
          <div class="summary-sources-label">基于以下记录</div>
          ${sources.map((s, i) => {
            const entry = relevantEntries[i];
            return entry ? `<div class="summary-source-item clickable" onclick="scrollToEntry('${entry.id}')">${escapeHtml(s)}</div>`
              : `<div class="summary-source-item">${escapeHtml(s)}</div>`;
          }).join('')}
        </div>` : ''}
    </div>`;
}

  container.innerHTML = `

function formatAIAnswer(text) {
  if (!text) return '';
  // 先转义（但保留后端已嵌入的 <ref> 标签）
  // 后端返回的 answer 中 <ref data-id="xxx">记录N</ref> 需要保留
  // 分离 ref 标签，对非 ref 内容做 escapeHtml
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
  // 恢复 ref 标签
  html = html.replace(/&lt;ref data-id=&quot;([^&]+)&quot;&gt;(.*?)&lt;\/ref&gt;/g,
    '<ref data-id="$1">$2</ref>');
  // 处理换行
  html = html.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  // 加粗
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  if (html.includes('</p>')) {
    html = '<p>' + html + '</p>';
  }
  return html;
}

function generateSummary(question, relevantEntries, isGlobal) {
  if (relevantEntries.length === 0) {
    return '没有找到相关记录来回答这个问题。试试记录更多想法，让知识库更丰富。';
  }

  const questionLower = question.toLowerCase();

  // Analyze entries
  const typeDist = {};
  const tagDist = {};
  const timeSpan = { earliest: null, latest: null };
  const allKeywords = {};
  const contentSnippets = [];

  relevantEntries.forEach(e => {
    // Type distribution
    typeDist[e.type] = (typeDist[e.type] || 0) + 1;

    // Tag distribution
    (e.tags || []).forEach(t => {
      const typeLabelSet = new Set(Object.values(typeLabels));
      if (!typeLabelSet.has(t)) tagDist[t] = (tagDist[t] || 0) + 1;
    });

    // Time span
    const d = new Date(e.created_at);
    if (!timeSpan.earliest || d < timeSpan.earliest) timeSpan.earliest = d;
    if (!timeSpan.latest || d > timeSpan.latest) timeSpan.latest = d;

    // Keywords
    extractKeywords(e.content).forEach(kw => { allKeywords[kw] = (allKeywords[kw] || 0) + 1; });

    // Content snippets
    contentSnippets.push(e.content.length > 60 ? e.content.substring(0, 60) : e.content);
  });

  // Build structured summary
  let html = '';

  // Section 1: Overview
  html += '<div class="summary-section">';
  html += '<div class="summary-section-title">概览</div>';

  if (isGlobal) {
    html += `<div class="summary-point">你目前共有 <strong>${allEntries.length}</strong> 条记录`;
    if (timeSpan.earliest) {
      const days = Math.ceil((timeSpan.latest - timeSpan.earliest) / 86400000);
      html += `，时间跨度 <strong>${days > 0 ? days + ' 天' : '今天'}</strong>`;
    }
    html += `。</div>`;
  } else {
    html += `<div class="summary-point">找到 <strong>${relevantEntries.length}</strong> 条相关记录。`;
    if (timeSpan.earliest && timeSpan.latest) {
      const days = Math.ceil((timeSpan.latest - timeSpan.earliest) / 86400000);
      html += ` 时间跨度 <strong>${days > 0 ? days + ' 天' : '今天内'}</strong>。`;
    }
    html += '</div>';
  }

  // Type breakdown
  const typeBreakdown = Object.entries(typeDist)
    .sort((a, b) => b[1] - a[1])
    .map(([type, count]) => `${typeLabels[type] || type} ${count} 条`)
    .join('、');
  if (typeBreakdown) {
    html += `<div class="summary-point">分类分布：${typeBreakdown}。</div>`;
  }
  html += '</div>';

  // Section 2: Key themes
  const topKeywords = Object.entries(allKeywords)
    .sort((a, b) => b[1] - a[1])
    .filter(([_, c]) => c >= 2)
    .slice(0, 8);

  if (topKeywords.length > 0) {
    html += '<div class="summary-section">';
    html += '<div class="summary-section-title">核心主题</div>';
    const kwStr = topKeywords.map(([w, c]) => `<strong>${w}</strong>(${c}次)`).join('、');
    html += `<div class="summary-point">高频关键词：${kwStr}。</div>`;

    // Find thematic clusters
    const clusters = findThematicClusters(relevantEntries);
    if (clusters.length > 0) {
      clusters.forEach(cl => {
        html += `<div class="summary-point">${cl}</div>`;
      });
    }
    html += '</div>';
  }

  // Section 3: Observations / Thinking
  html += '<div class="summary-section">';
  html += '<div class="summary-section-title">思考</div>';

  // Check for patterns
  const dominantType = Object.entries(typeDist).sort((a, b) => b[1] - a[1])[0];
  if (dominantType && dominantType[1] >= 3) {
    const label = typeLabels[dominantType[0]] || dominantType[0];
    html += `<div class="summary-point">你的记录偏重「${label}」类，占 ${Math.round(dominantType[1] / relevantEntries.length * 100)}%，说明这是你当前重点关注的方向。</div>`;
  }

  // Check for evolution of thought
  if (relevantEntries.length >= 3) {
    const earlier = relevantEntries.slice(-Math.ceil(relevantEntries.length / 2));
    const later = relevantEntries.slice(0, Math.ceil(relevantEntries.length / 2));
    const earlyKW = new Set(earlier.flatMap(e => extractKeywords(e.content)));
    const lateKW = new Set(later.flatMap(e => extractKeywords(e.content)));
    const newConcepts = [...lateKW].filter(w => !earlyKW.has(w) && w.length >= 2).slice(0, 5);
    if (newConcepts.length >= 2) {
      html += `<div class="summary-point">最近的记录中出现了一些新概念：<strong>${newConcepts.join('、')}</strong>，你的思考在不断延伸。</div>`;
    }
  }

  // Actionable suggestions
  const todoEntries = relevantEntries.filter(e => e.type === 'todo');
  if (todoEntries.length > 0) {
    html += `<div class="summary-point">其中有 <strong>${todoEntries.length}</strong> 条待办事项，别忘了跟进执行。</div>`;
  }

  // Tags insight
  const topTags = Object.entries(tagDist).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (topTags.length > 0) {
    const tagStr = topTags.map(([t, c]) => `#${t}`).join(' ');
    html += `<div class="summary-point">常用标签：${tagStr}——这些可能是你值得深耕的领域标签。</div>`;
  }

  // General encouragement if sparse
  if (relevantEntries.length < 3) {
    html += `<div class="summary-point">相关记录还比较少，持续记录后会产生更丰富的洞察。</div>`;
  }

  html += '</div>';
  return html;
}

function findThematicClusters(entries) {
  // Group entries by keyword co-occurrence
  const clusters = [];
  const kwSets = entries.map(e => new Set(extractKeywords(e.content)));

  // Find pairs of entries with high overlap
  const seen = new Set();
  for (let i = 0; i < entries.length && clusters.length < 3; i++) {
    if (seen.has(i)) continue;
    const group = [i];
    for (let j = i + 1; j < entries.length; j++) {
      if (seen.has(j)) continue;
      const overlap = [...kwSets[i]].filter(w => kwSets[j].has(w));
      if (overlap.length >= 3) {
        group.push(j);
        seen.add(j);
      }
    }
    if (group.length >= 2) {
      seen.add(i);
      const sharedKW = [...kwSets[group[0]]].filter(w =>
        group.every(idx => kwSets[idx].has(w))
      ).slice(0, 3);
      if (sharedKW.length > 0) {
        clusters.push(`你有 <strong>${group.length}</strong> 条记录围绕「<strong>${sharedKW.join('、')}</strong>」展开，形成了一个小的思考集群。`);
      }
    }
  }
  return clusters;
}

// ---- Keyword Extraction (shared) ----
function extractKeywords(text) {
  const cleaned = text.replace(/https?:\/\/\S+/g, '').replace(/[^\u4e00-\u9fff\w]+/g, ' ').toLowerCase();
  const chineseMatches = text.match(/[\u4e00-\u9fff]{2,6}/g) || [];
  const englishMatches = cleaned.match(/[a-z]{3,}/g) || [];
  const stopWords = new Set([
    '的','了','是','在','我','有','和','就','不','人','都','一','一个',
    '上','也','很','到','说','要','去','你','会','着','没有','看','好',
    '这','他','她','它','们','那','个','来','但','而','与','或','等',
    '这个','那个','什么','怎么','可以','因为','所以','如果','虽然','但是',
    '还是','已经','一下','比较','这样','那样','关于','或者','以及',
    'the','and','for','that','this','with','are','was','not','but','have',
    'from','they','been','has','its','will','can','would','could','should',
  ]);
  return [...new Set([...chineseMatches, ...englishMatches].filter(w => !stopWords.has(w)))];
}

  listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

}

// ---- Delete ----
async function deleteEntry(id) {
  if (!confirm('确定删除？')) return;
  _ba.track('delete_entry', 'review', 'delete');
  try {
    await fetch(`${API_BASE}/entries?id=eq.${id}`, { method: 'DELETE', headers });

    cachedEntries = cachedEntries.filter(e => e.id !== id);

  } catch { showToast('删除失败'); }
}

let _longPressTimer = null;
let _longPressTriggered = false;

function initLongPress() {
  const listEl = document.getElementById('entryList');
  if (!listEl) return;

  listEl.addEventListener('touchstart', e => {
    const card = e.target.closest('.entry-card');
    if (!card || e.target.closest('.entry-delete') || e.target.closest('.link-summary-toggle')) return;
    _longPressTriggered = false;
    _longPressTimer = setTimeout(() => {
      _longPressTriggered = true;
      if (navigator.vibrate) navigator.vibrate(30);
      openTagEditor(card.dataset.id);
    }, 500);
  }, { passive: true });

  listEl.addEventListener('touchend', () => { clearTimeout(_longPressTimer); });
  listEl.addEventListener('touchmove', () => { clearTimeout(_longPressTimer); });
  listEl.addEventListener('touchcancel', () => { clearTimeout(_longPressTimer); });

  // PC 端右键也可以触发
  listEl.addEventListener('contextmenu', e => {
    const card = e.target.closest('.entry-card');
    if (!card) return;
    e.preventDefault();
    openTagEditor(card.dataset.id);
  });
}

function openTagEditor(entryId) {
  const entry = entries.find(e => e.id === entryId) || allEntries.find(e => e.id === entryId);
  if (!entry) return;

  const currentType = entry.type;
  const typeLabelSet = new Set(Object.values(typeLabels));
  const currentExtraTags = (entry.tags || []).filter(t => typeLabelSet.has(t));
  const currentNormalTags = (entry.tags || []).filter(t => !typeLabelSet.has(t));

  // 当前选中的类型集合
  const selectedTypeSet = new Set([currentType]);
  // 把 extra tags（如"待办"标签名）也转回 type id
  currentExtraTags.forEach(tagLabel => {
    const cat = CATEGORIES.find(c => c.label === tagLabel);
    if (cat) selectedTypeSet.add(cat.id);
  });

  const overlay = document.createElement('div');
  overlay.className = 'tag-editor-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  function renderEditor() {
    const chipsHtml = CATEGORIES.map(c => {
      const sel = selectedTypeSet.has(c.id);
      return `<button class="tag-editor-chip ${sel ? 'selected' : ''}" data-type="${c.id}">${c.emoji} ${c.label}</button>`;
    }).join('');

    overlay.innerHTML = `
      <div class="tag-editor-panel">
        <div class="tag-editor-header">
          <span class="tag-editor-title">修改分类</span>
          <button class="tag-editor-close" onclick="this.closest('.tag-editor-overlay').remove()">&times;</button>
        </div>
        <div class="tag-editor-section">
          <div class="tag-editor-label">选择分类（可多选，第一个为主分类）</div>
          <div class="tag-editor-chips">${chipsHtml}</div>
        </div>
        <div class="tag-editor-section">
          <div class="tag-editor-label">内容预览</div>
          <div style="font-size:14px;color:var(--text-secondary);line-height:1.5;max-height:80px;overflow:hidden;">
            ${escapeHtml(entry.content.substring(0, 150))}${entry.content.length > 150 ? '...' : ''}
          </div>
        </div>
        <button class="tag-editor-save" id="tagEditorSave">保存修改</button>
      </div>`;

    overlay.querySelectorAll('.tag-editor-chip').forEach(chip => {
      chip.onclick = () => {
        const tid = chip.dataset.type;
        if (selectedTypeSet.has(tid)) {
          if (selectedTypeSet.size > 1) selectedTypeSet.delete(tid);
        } else {
          selectedTypeSet.add(tid);
        }
        renderEditor();
      };
    });

    overlay.querySelector('#tagEditorSave').onclick = () => saveTagEdit(entryId, selectedTypeSet, currentNormalTags, overlay);
  }

  renderEditor();
  document.body.appendChild(overlay);
}

async function saveTagEdit(entryId, selectedTypeSet, normalTags, overlay) {
  const types = Array.from(selectedTypeSet);
  const primaryType = types[0];
  const extraTypeTags = types.slice(1).map(t => { const c = CATEGORIES.find(c => c.id === t); return c ? c.label : t; });
  const allTags = [...normalTags, ...extraTypeTags];

  const btn = overlay.querySelector('#tagEditorSave');
  btn.textContent = '保存中...'; btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/entries?id=eq.${entryId}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ type: primaryType, tags: allTags })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // 更新本地数据
    [entries, cachedEntries, allEntries, todoEntries].forEach(list => {
      const found = list.find(e => e.id === entryId);
      if (found) { found.type = primaryType; found.tags = allTags; }
    });

    overlay.remove();
    renderEntries();
    // 重新加载待办（分类可能变了）
    loadTodoEntries();
    showToast('分类已更新 ✓');
  } catch (err) {
    console.error('Tag edit error:', err);
    showToast('修改失败，请重试');
    btn.textContent = '保存修改'; btn.disabled = false;
  }
}

// Bug3+4 fix: 判断一条记录是否为待办（type='todo' 或 tags含'待办'标签）
function isTodoEntry(e) {
  if (e.type === 'todo') return true;
  if (Array.isArray(e.tags) && e.tags.some(t => t === '待办' || t === 'todo' || t === 'Todo')) return true;
  return false;
}

let todoEntries = [];
let todoFilter = 'pending'; // 'pending' | 'done' | 'all'
let todoPanelOpen = false;

// 加载所有待办类型的记录
async function loadTodoEntries() {
  // 优先从已加载的 entries/allEntries 中过滤（避免额外请求失败）
  const source = allEntries.length > 0 ? allEntries : entries.length > 0 ? entries : cachedEntries;
  // Bug3+4 fix: 同时匹配 type==='todo' 和 tags中包含'待办'的记录
  let localTodos = source.filter(e => isTodoEntry(e));

  // 如果本地已有待办数据，直接使用
  if (localTodos.length > 0) {
    todoEntries = localTodos;
  } else {
    // 本地没有则尝试从 API 单独拉取
    try {
      const res = await fetch(
        `${API_BASE}/entries?select=*&type=eq.todo&order=created_at.desc&limit=200`,
        { headers }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      todoEntries = await res.json();
    } catch (err) {
      console.error('加载待办失败:', err);
      todoEntries = [];
    }
  }

  // 确保每条记录都有 todo_done 字段
  todoEntries.forEach(e => {
    if (typeof e.todo_done === 'undefined') e.todo_done = false;
  });
  restoreTodoDoneLocal(todoEntries);
  updateTodoHubCard();
}

// 更新回顾页面的待办入口卡片
function updateTodoHubCard() {
  const card = document.getElementById('todoHubCard');
  const badge = document.getElementById('todoHubBadge');
  const subtitle = document.getElementById('todoHubSubtitle');

  const pending = todoEntries.filter(e => !e.todo_done);
  const done = todoEntries.filter(e => e.todo_done);
  const total = todoEntries.length;

  if (total === 0) {
    card.style.display = 'none';
    return;
  }

  card.style.display = 'flex';
  badge.textContent = pending.length;
  badge.className = pending.length > 0 ? 'todo-hub-badge' : 'todo-hub-badge empty';

  if (pending.length === 0 && done.length > 0) {
    subtitle.textContent = `全部完成！共 ${done.length} 项`;
  } else if (pending.length > 0) {
    // 获取最近一条待完成项的时间描述
    const latest = pending[0];
    const timeStr = formatTime(new Date(latest.created_at));
    subtitle.textContent = `${pending.length} 项待完成 · 最近 ${timeStr}`;
  } else {
    subtitle.textContent = `${total} 条待办`;
  }
}

// 打开待办面板
function openTodoPanel() {
  todoPanelOpen = true;
  _ba.trackPageView('todo');
  const panel = document.getElementById('todoPanel');
  panel.style.display = 'flex';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => panel.classList.add('open'));
  });
  renderTodoPanel();
}

// 关闭待办面板
function closeTodoPanel() {
  todoPanelOpen = false;
  _ba.trackPageView('review');
  const panel = document.getElementById('todoPanel');
  panel.classList.remove('open');
  setTimeout(() => { panel.style.display = 'none'; }, 350);
}

// 切换待办筛选
function switchTodoFilter(filter) {
  todoFilter = filter;
  document.querySelectorAll('.todo-filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === filter);
  });
  renderTodoList();
}

// 渲染完整面板
function renderTodoPanel() {
  const pending = todoEntries.filter(e => !e.todo_done);
  const done = todoEntries.filter(e => e.todo_done);
  const total = todoEntries.length;

  // 统计
  document.getElementById('todoPendingNum').textContent = pending.length;
  document.getElementById('todoDoneNum').textContent = done.length;
  document.getElementById('todoPanelCount').textContent = `共 ${total} 项`;

  // 进度条
  const pct = total > 0 ? Math.round(done.length / total * 100) : 0;
  document.getElementById('todoProgressFill').style.width = pct + '%';

  // 筛选计数
  document.getElementById('todoFilterPendingCount').textContent = pending.length > 0 ? `(${pending.length})` : '';
  document.getElementById('todoFilterDoneCount').textContent = done.length > 0 ? `(${done.length})` : '';

  renderTodoList();
}

// 渲染待办列表（按时间分组）
function renderTodoList() {
  const container = document.getElementById('todoListContainer');
  let items;

  if (todoFilter === 'pending') {
    items = todoEntries.filter(e => !e.todo_done);
  } else if (todoFilter === 'done') {
    items = todoEntries.filter(e => e.todo_done);
  } else {
    items = [...todoEntries];
  }

  if (items.length === 0) {
    const msg = todoFilter === 'pending' ? '没有待完成的事项，太棒了！' :
                todoFilter === 'done' ? '还没有已完成的事项' : '还没有待办记录';
    const icon = todoFilter === 'pending' ? '🎉' : '📋';
    container.innerHTML = `<div class="todo-empty"><div class="todo-empty-icon">${icon}</div><div class="todo-empty-text">${msg}</div></div>`;
    return;
  }

  // 按时间分组
  const groups = groupByTime(items);
  let html = '';

  for (const [label, groupItems] of groups) {
    html += `<div class="todo-time-group">`;
    html += `<div class="todo-time-label">${label}</div>`;
    groupItems.forEach(e => {
      const isDone = e.todo_done;
      const timeStr = formatTime(new Date(e.created_at));
      const typeLabelSet = new Set(Object.values(typeLabels));
      const tags = (e.tags || []).filter(t => !typeLabelSet.has(t));
      const tagsHtml = tags.map(t => `<span class="todo-item-tag">#${t}</span>`).join('');

      html += `
        <div class="todo-item ${isDone ? 'done' : ''}" data-id="${e.id}">
          <button class="todo-checkbox ${isDone ? 'checked' : ''}" onclick="toggleTodoDone('${e.id}', event)">
            ${isDone ? '✓' : ''}
          </button>
          <div class="todo-item-body">
            <div class="todo-item-content">${escapeHtml(e.content)}</div>
            <div class="todo-item-meta">
              <span>${timeStr}</span>
              ${tagsHtml ? `<div class="todo-item-tags">${tagsHtml}</div>` : ''}
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

// 按时间分组
function groupByTime(items) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const thisWeek = new Date(today); thisWeek.setDate(thisWeek.getDate() - 7);
  const thisMonth = new Date(today); thisMonth.setDate(thisMonth.getDate() - 30);

  const groups = new Map();
  const addTo = (label, item) => {
    if (!groups.has(label)) groups.set(label, []);
    groups.get(label).push(item);
  };

  items.forEach(item => {
    const d = new Date(item.created_at);
    if (d >= today) addTo('今天', item);
    else if (d >= yesterday) addTo('昨天', item);
    else if (d >= thisWeek) addTo('近 7 天', item);
    else if (d >= thisMonth) addTo('近 30 天', item);
    else addTo('更早', item);
  });

  return groups;
}

// 切换待办完成状态
async function toggleTodoDone(id, event) {
  event.stopPropagation();
  const entry = todoEntries.find(e => e.id === id);
  if (!entry) return;

  const newDone = !entry.todo_done;
  _ba.track(newDone ? 'todo_complete' : 'todo_reopen', 'todo', 'toggle');
  const itemEl = event.target.closest('.todo-item');

  // 动画
  if (itemEl) itemEl.classList.add('completing');

  // 先更新本地状态（乐观更新）
  entry.todo_done = newDone;
  [entries, cachedEntries, allEntries].forEach(list => {
    const found = list.find(e => e.id === id);
    if (found) found.todo_done = newDone;
  });

  try {
    // 尝试更新数据库
    const res = await fetch(`${API_BASE}/entries?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=representation' },
      body: JSON.stringify({ todo_done: newDone })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch (err) {
    // 数据库更新失败（可能字段尚未添加），用 localStorage 持久化
    console.warn('数据库更新失败，降级到本地存储:', err.message);
    saveTodoDoneLocal(id, newDone);
  }

  // 延迟一下再重新渲染（让动画完成）
  setTimeout(() => {
    renderTodoPanel();
    updateTodoHubCard();
    showToast(newDone ? '已完成 ✓' : '已恢复待办');
  }, 300);
}

// localStorage 降级：保存待办完成状态
function saveTodoDoneLocal(id, done) {
  try {
    const stored = JSON.parse(localStorage.getItem('todo_done_map') || '{}');
    if (done) stored[id] = true; else delete stored[id];
    localStorage.setItem('todo_done_map', JSON.stringify(stored));
  } catch {}
}

// localStorage 降级：恢复待办完成状态
function restoreTodoDoneLocal(items) {
  try {
    const stored = JSON.parse(localStorage.getItem('todo_done_map') || '{}');
    items.forEach(e => {
      if (typeof e.todo_done === 'undefined' || e.todo_done === null) {
        e.todo_done = !!stored[e.id];
      }
    });
  } catch {}
}

// ---- Health ----
async function checkHealth() {
  try { const r = await fetch(`${API_BASE}/entries?select=id&limit=1`, { headers }); setOnline(r.ok); } catch { setOnline(false); }
}
function setOnline(s) {
  const d = document.getElementById('statusDot');
  d.className = s ? 'status-dot' : 'status-dot offline';
  d.title = s ? '数据库已连接' : '连接失败';
}

// ---- Utils ----
function formatTime(date) {
  const now = new Date(), diff = now - date;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
  const m = date.getMonth()+1, d = date.getDate();
  const h = String(date.getHours()).padStart(2,'0'), mi = String(date.getMinutes()).padStart(2,'0');
  if (date.getFullYear() === now.getFullYear()) return `${m}月${d}日 ${h}:${mi}`;
  return `${date.getFullYear()}/${m}/${d}`;
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- Init (called after login) ----
let _appInitialized = false;
let _healthInterval = null;
function initApp() {
  if (_appInitialized) {
    // Already initialized, just refresh data
    checkHealth();
    entries = []; allEntries = []; cachedEntries = [];
    fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers })
      .then(r => r.ok ? r.json() : []).then(data => { cachedEntries = data; loadTodoEntries(); }).catch(() => {});
    return;
  }
  _appInitialized = true;
  renderComposeChips(); updateIndicator(); checkHealth();
  initLongPress(); // 需求5：初始化长按编辑标签
  fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers })
    .then(r => r.ok ? r.json() : []).then(data => { cachedEntries = data; loadTodoEntries(); }).catch(() => {});
  _healthInterval = setInterval(checkHealth, 30000);
  // 预热 Render 后端（免费版会休眠，提前唤醒避免灵感碰撞超时）
  fetch(`${LINK_PARSER_API}/health`, { method: 'GET' }).then(r => {
    console.log(`[预热] Render 后端状态: ${r.status}`);
  }).catch(() => {
    console.log('[预热] Render 后端未响应，可能在冷启动中');
  });

  // ---- Analytics & Feedback init ----
  _ba.startFlush();
  _ba.track('app_open', 'lifecycle', 'init', 0, { source: /iPhone|iPad|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop' });
  document.getElementById('feedbackFab').style.display = 'flex';
  // Check admin access — show admin button if admin
  checkIsAdmin().then(isAdmin => {
    if (isAdmin) {
      // Add admin icon button to header
      const headerActions = document.querySelector('.header-actions');
      if (headerActions && !document.getElementById('adminBtn')) {
        const btn = document.createElement('button');
        btn.id = 'adminBtn';
        btn.className = 'icon-btn';
        btn.title = '管理后台';
        btn.textContent = '📊';
        btn.onclick = openAdmin;
        headerActions.insertBefore(btn, headerActions.firstChild);
      }
    }
  });
}
