<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="随手记">
<meta name="theme-color" content="#000000">
<title>随手记</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --card: rgba(28, 28, 30, 0.8);
    --card-solid: #1c1c1e;
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.3);
    --accent: #0a84ff;
    --accent-light: rgba(10,132,255,0.15);
    --green: #30d158;
    --orange: #ff9f0a;
    --pink: #ff375f;
    --purple: #bf5af2;
    --teal: #64d2ff;
    --yellow: #ffd60a;
    --border: rgba(255,255,255,0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
  }

  .app {
    max-width: 480px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: var(--safe-bottom);
  }

  /* ---- Header ---- */
  .header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--card);
    border: none; color: var(--accent); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green); margin-right: 4px;
  }
  .status-dot.offline { background: var(--pink); box-shadow: 0 0 6px var(--pink); }

  /* ---- Tabs ---- */
  .tabs { display: flex; padding: 8px 20px; position: relative; }
  .tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 15px; font-weight: 500;
    color: var(--text-secondary); background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: color 0.2s;
  }
  .tab.active { color: var(--text); }
  .tab-indicator {
    position: absolute; bottom: 0; height: 2px; background: var(--accent); border-radius: 1px;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* ---- Compose ---- */
  .compose { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
  .compose-input {
    width: 100%; min-height: 140px; max-height: 40vh;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; color: var(--text); font-size: 16px; line-height: 1.6;
    resize: none; outline: none; font-family: inherit; transition: border-color 0.2s;
  }
  .compose-input::placeholder { color: var(--text-tertiary); }
  .compose-input:focus { border-color: rgba(10,132,255,0.4); }

  .compose-section-label {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px;
  }
  .ai-badge {
    font-size: 10px; font-weight: 600; background: linear-gradient(135deg, #0a84ff, #bf5af2);
    color: white; padding: 1px 7px; border-radius: 6px;
  }
  .compose-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .compose-chip {
    padding: 8px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    position: relative;
  }
  .compose-chip:active { transform: scale(0.95); }
  .compose-chip.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .compose-chip .rec-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); display: none;
    position: absolute; top: 4px; right: 4px;
  }
  .compose-chip.recommended .rec-dot { display: block; }

  .tags-input-row { display: flex; gap: 8px; align-items: center; }
  .tags-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
  }
  .tags-input::placeholder { color: var(--text-tertiary); }

  .submit-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--accent); color: white; font-size: 17px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
  .submit-btn:disabled { background: rgba(10,132,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; }

  /* ---- Insight Card ---- */
  .insight-card {
    background: linear-gradient(135deg, rgba(10,132,255,0.08), rgba(191,90,242,0.08));
    border: 1px solid rgba(10,132,255,0.15); border-radius: 16px; padding: 16px;
    animation: slideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .insight-icon { font-size: 18px; }
  .insight-title {
    font-size: 14px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .insight-close {
    margin-left: auto; background: none; border: none;
    color: var(--text-tertiary); font-size: 18px; cursor: pointer;
    padding: 2px 6px; -webkit-tap-highlight-color: transparent;
  }
  .insight-body { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.75); }
  .insight-body strong { color: var(--accent); font-weight: 600; }
  .insight-related { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
  .insight-related-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .insight-related-item {
    font-size: 13px; color: var(--text-secondary); padding: 4px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
  }
  .insight-related-item::before { content: '·'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .insight-card.encouragement {
    background: linear-gradient(135deg, rgba(48,209,88,0.06), rgba(255,214,10,0.06));
    border-color: rgba(48,209,88,0.12);
  }
  .insight-card.encouragement .insight-title {
    background: linear-gradient(135deg, var(--green), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* ---- Ask Bar (Review Page) ---- */
  .ask-bar {
    padding: 12px 20px; display: flex; gap: 8px; align-items: center;
    position: sticky; top: 0; z-index: 50;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .ask-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .ask-input::placeholder { color: var(--text-tertiary); }
  .ask-input:focus { border-color: rgba(10,132,255,0.4); }
  .ask-send {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.15s; flex-shrink: 0;
  }
  .ask-send:active { transform: scale(0.9); }
  .ask-send:disabled { background: rgba(10,132,255,0.3); cursor: not-allowed; }

  /* ---- Answer Panel ---- */
  .answer-panel {
    margin: 0 20px 12px; border-radius: 16px; overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .answer-intent {
    display: flex; align-items: center; gap: 8px; padding: 14px 16px;
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
  }
  .answer-intent-icon { font-size: 16px; }
  .answer-intent-label {
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .answer-close {
    margin-left: auto; background: none; border: none;
    color: var(--text-tertiary); font-size: 18px; cursor: pointer;
    padding: 2px 6px; -webkit-tap-highlight-color: transparent;
  }

  /* Search result style */
  .answer-panel.search-mode { background: var(--card); border: 1px solid var(--border); }
  .answer-panel.search-mode .answer-question {
    padding: 0 16px 10px; font-size: 13px; color: var(--text-tertiary); line-height: 1.4;
  }
  .search-results { display: flex; flex-direction: column; }
  .search-result-item {
    padding: 12px 16px; border-top: 1px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .search-result-item:active { background: rgba(255,255,255,0.04); }
  .search-result-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .search-result-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
  .search-result-badge.thought { background: rgba(10,132,255,0.15); color: var(--accent); }
  .search-result-badge.inspiration { background: rgba(255,159,10,0.15); color: var(--orange); }
  .search-result-badge.todo { background: rgba(48,209,88,0.15); color: var(--green); }
  .search-result-badge.quote { background: rgba(191,90,242,0.15); color: var(--purple); }
  .search-result-badge.link { background: rgba(100,210,255,0.15); color: var(--teal); }
  .search-result-badge.reflection { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .search-result-badge.product { background: rgba(255,55,95,0.15); color: var(--pink); }
  .search-result-time { font-size: 11px; color: var(--text-tertiary); }
  .search-result-content { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); }
  .search-result-content mark {
    background: rgba(10,132,255,0.25); color: var(--accent);
    border-radius: 2px; padding: 0 2px;
  }
  .search-result-score {
    font-size: 11px; color: var(--text-tertiary); margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Summary result style */
  .answer-panel.summary-mode {
    background: linear-gradient(135deg, rgba(10,132,255,0.06), rgba(191,90,242,0.06));
    border: 1px solid rgba(10,132,255,0.12);
  }
  .answer-panel.summary-mode .answer-question {
    padding: 0 16px 10px; font-size: 13px; color: var(--text-tertiary); line-height: 1.4;
  }
  .summary-body {
    padding: 0 16px 16px; font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8);
  }
  .summary-body strong { color: var(--accent); font-weight: 600; }
  .summary-body .summary-section {
    margin-bottom: 12px;
  }
  .summary-body .summary-section-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .summary-body .summary-section-title::before {
    content: ''; width: 3px; height: 14px; border-radius: 2px;
    background: linear-gradient(135deg, var(--accent), var(--purple)); flex-shrink: 0;
  }
  .summary-body .summary-point {
    padding: 3px 0; display: flex; align-items: flex-start; gap: 8px;
  }
  .summary-body .summary-point::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0; margin-top: 8px;
  }
  .summary-sources {
    padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .summary-sources-label {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .summary-source-item {
    font-size: 12px; color: var(--text-secondary); padding: 2px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.4;
  }
  .summary-source-item::before { content: '→'; color: var(--accent); flex-shrink: 0; font-size: 11px; }

  /* Thinking animation */
  .thinking { padding: 20px 16px; display: flex; align-items: center; gap: 10px; }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: thinking 1.4s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinking {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .thinking-text { font-size: 13px; color: var(--text-secondary); }

  /* Highlighted entry card */
  .entry-card.highlighted {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(10,132,255,0.15);
    animation: highlightPulse 2s ease-out;
  }
  @keyframes highlightPulse {
    0% { box-shadow: 0 0 0 1px var(--accent), 0 4px 30px rgba(10,132,255,0.3); }
    100% { box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(10,132,255,0.15); }
  }

  /* ---- Entry List ---- */
  .entry-list { padding: 8px 20px 100px; display: flex; flex-direction: column; gap: 12px; }
  .entry-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1px solid var(--border); transition: all 0.3s;
  }
  .entry-card:active { transform: scale(0.98); }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .entry-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .entry-type-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; font-weight: 500; }
  .entry-type-badge.thought { background: rgba(10,132,255,0.15); color: var(--accent); }
  .entry-type-badge.inspiration { background: rgba(255,159,10,0.15); color: var(--orange); }
  .entry-type-badge.todo { background: rgba(48,209,88,0.15); color: var(--green); }
  .entry-type-badge.quote { background: rgba(191,90,242,0.15); color: var(--purple); }
  .entry-type-badge.link { background: rgba(100,210,255,0.15); color: var(--teal); }
  .entry-type-badge.reflection { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .entry-type-badge.product { background: rgba(255,55,95,0.15); color: var(--pink); }
  .entry-time { font-size: 12px; color: var(--text-tertiary); white-space: nowrap; }
  .entry-content { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.85); word-break: break-word; }
  .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .entry-tag { font-size: 12px; color: var(--text-secondary); background: rgba(255,255,255,0.06); padding: 2px 10px; border-radius: 8px; }

  /* Link Summary Collapsible */
  .link-summary-toggle {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; color: var(--teal); font-size: 13px; font-weight: 500;
    cursor: pointer; -webkit-tap-highlight-color: transparent; width: 100%;
    transition: all 0.2s;
  }
  .link-summary-toggle:active { transform: scale(0.98); }
  .link-summary-toggle .toggle-arrow {
    font-size: 10px; transition: transform 0.2s; margin-left: auto; color: var(--text-tertiary);
  }
  .link-summary-toggle.open .toggle-arrow { transform: rotate(90deg); }
  .link-summary-body {
    display: none; margin-top: 8px; padding: 12px;
    background: rgba(100,210,255,0.04); border: 1px solid rgba(100,210,255,0.08);
    border-radius: 12px; font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.7);
  }
  .link-summary-body.open { display: block; animation: slideIn 0.3s ease; }
  .link-summary-body .ls-title {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px;
  }
  .link-summary-body .ls-source {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .link-summary-body .ls-text { white-space: pre-wrap; }
  .link-summary-loading {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(100,210,255,0.04); border: 1px solid rgba(100,210,255,0.08);
    border-radius: 12px; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-secondary);
  }
  .link-summary-loading .spinner { width: 16px; height: 16px; border-width: 1.5px; }

  /* ---- Link Reading Progress ---- */
  .link-reading-card {
    border-color: rgba(100,210,255,0.2) !important;
    background: linear-gradient(135deg, rgba(100,210,255,0.06), rgba(10,132,255,0.06)) !important;
  }
  .link-reading-progress {
    padding: 4px 0 2px;
  }
  .link-reading-bar {
    height: 3px; border-radius: 2px; background: rgba(100,210,255,0.1);
    overflow: hidden; margin-bottom: 10px;
  }
  .link-reading-fill {
    height: 100%; width: 30%; border-radius: 2px;
    background: linear-gradient(90deg, var(--teal), var(--accent));
    animation: readingProgress 2.5s ease-in-out infinite;
  }
  @keyframes readingProgress {
    0% { width: 5%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 5%; margin-left: 95%; }
  }
  .link-reading-hint {
    font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  }

  /* ---- Link Result Card (main feedback) ---- */
  .link-result-card {
    border-color: rgba(100,210,255,0.2) !important;
    background: linear-gradient(135deg, rgba(100,210,255,0.06), rgba(10,132,255,0.06)) !important;
  }
  .link-result-main {
    padding: 2px 0 4px;
  }
  .link-result-title {
    font-size: 16px; font-weight: 700; color: var(--text);
    line-height: 1.5; margin-bottom: 6px;
  }
  .link-result-meta {
    font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;
    line-height: 1.5;
  }
  .link-result-summary {
    font-size: 14px; line-height: 1.75; color: rgba(255,255,255,0.78);
    margin-top: 8px; white-space: pre-wrap;
  }
  .link-result-keywords {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .link-kw-tag {
    font-size: 12px; padding: 3px 10px; border-radius: 10px;
    background: rgba(100,210,255,0.1); color: var(--teal); font-weight: 500;
  }
  .link-result-related {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* Insight card link summary section (review page) */
  .insight-link-summary {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .insight-link-summary .ils-label {
    font-size: 11px; font-weight: 600; color: var(--teal);
    letter-spacing: 0.5px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .insight-link-summary .ils-title {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
  }
  .insight-link-summary .ils-text {
    font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.7);
  }

  .entry-delete {
    background: none; border: none; color: var(--text-tertiary); font-size: 16px;
    cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent;
    opacity: 0; transition: opacity 0.2s;
  }
  .entry-card:hover .entry-delete, .entry-card:active .entry-delete { opacity: 1; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; color: var(--text-tertiary); text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; line-height: 1.6; }

<script>
// ---- Config ----
const SUPABASE_URL = 'https://dbduutzsoynmhbfazpxu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiZHV1dHpzb3lubWhiZmF6cHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzU3NDIsImV4cCI6MjA4OTg1MTc0Mn0.lTrhFI7KlhbYQlvyCJ-n-MIPR9uRJ3nW44tE2CNRCW8';
const API_BASE = `${SUPABASE_URL}/rest/v1`;
const headers = {

const CATEGORIES = [

  { id: 'inspiration', emoji: '⚡', label: '灵感' },
  { id: 'todo', emoji: '✅', label: '待办' },

const typeLabels = {};
CATEGORIES.forEach(c => typeLabels[c.id] = c.label);

// ---- Smart Classification ----
function classifyContent(text) {
  const t = text.toLowerCase();
  const scores = {};
  CATEGORIES.forEach(c => scores[c.id] = 0);
  if (/https?:\/\/|www\.|\.com|\.cn|\.io|\.org|\.net/i.test(t) || /xhslink|bilibili|zhihu|weixin|douyin/i.test(t)) scores.link += 10;
  if (/要做|需要|待办|todo|记得|别忘|提醒|deadline|ddl|计划做|打算/i.test(t)) scores.todo += 10;
  if (/[""「」『』]/.test(text) || /说过|名言|摘录|原文|出自|引用|——.*说/i.test(t)) scores.quote += 8;
  if (/^["「『]/.test(text.trim())) scores.quote += 10;
  if (/产品|用户体验|ux|ui|交互|需求|功能|体验|设计|迭代|mvp|feature|痛点|场景|用户/i.test(t)) scores.product += 7;
  if (/产品经理|pm|产品设计|用户调研|竞品/i.test(t)) scores.product += 10;
  if (/感觉|觉得|认为|反思|本质|启发|认知|思考|感受|感悟|理解|洞察|意识到|发现了|明白了|宽容|容错/i.test(t)) scores.reflection += 7;
  if (/人生|哲学|价值观|世界观|底层逻辑/i.test(t)) scores.reflection += 5;
  if (/突然|灵感|想到一个|如果能|可以做一个|idea|创意|点子|脑洞|能不能/i.test(t)) scores.inspiration += 10;
  if (/ai|人工智能|gpt|llm|agent|模型|算法|机器学习|mcp|token|prompt/i.test(t)) {
    scores.thought += 5;
    if (scores.product > 0) scores.product += 3;
    if (scores.reflection > 0) scores.reflection += 3;
  }
  scores.thought += 3;
  const sorted = Object.entries(scores).filter(([_, s]) => s > 0).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return ['thought'];
  const topScore = sorted[0][1];
  const rec = [];
  sorted.forEach(([id, score]) => { if (score >= topScore * 0.5 && score > 3) rec.push(id); });
  if (rec.length === 0) rec.push(sorted[0][0]);
  return rec.slice(0, 3);
}

// ---- State ----
let entries = [];
let allEntries = []; // all entries loaded for Q&A
let cachedEntries = [];
let selectedTypes = new Set();
let currentRecommended = [];
let manuallyDeselected = new Set();
let debounceTimer = null;

// ---- Compose Chips ----
function renderComposeChips() {
  const grid = document.getElementById('composeChips');
  grid.innerHTML = CATEGORIES.map(c => {
    const isSel = selectedTypes.has(c.id);
    const isRec = currentRecommended.includes(c.id);
    return `<button class="compose-chip ${isSel ? 'selected' : ''} ${isRec ? 'recommended' : ''}"
              data-type="${c.id}" onclick="toggleChip('${c.id}')">
              ${c.emoji} ${c.label}<span class="rec-dot"></span></button>`;
  }).join('');
}

function toggleChip(typeId) {
  if (selectedTypes.has(typeId)) {
    selectedTypes.delete(typeId);
    if (currentRecommended.includes(typeId)) manuallyDeselected.add(typeId);
  } else {
    selectedTypes.add(typeId);
    manuallyDeselected.delete(typeId);
  }
  renderComposeChips();
}

function onContentChange() {
  const text = document.getElementById('contentInput').value.trim();
  if (text.length < 4) { currentRecommended = []; renderComposeChips(); return; }
  const rec = classifyContent(text);
  const prevRec = new Set(currentRecommended);
  currentRecommended = rec;
  rec.forEach(r => { if (!prevRec.has(r) && !manuallyDeselected.has(r)) selectedTypes.add(r); });
  renderComposeChips();
}

// ---- Tab Switching ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('composeView').style.display = tab === 'compose' ? 'flex' : 'none';
  document.getElementById('listView').style.display = tab === 'list' ? 'block' : 'none';
  if (tab === 'list') loadEntries();

}

function updateIndicator() {
  const at = document.querySelector('.tab.active');
  const ind = document.getElementById('tabIndicator');
  ind.style.left = at.offsetLeft + 'px';
  ind.style.width = at.offsetWidth + 'px';
}

// ---- Submit ----
async function handleSubmit() {
  const content = document.getElementById('contentInput').value.trim();
  if (!content) { showToast('写点什么再提交'); return; }
  if (selectedTypes.size === 0) { classifyContent(content).forEach(t => selectedTypes.add(t)); renderComposeChips(); }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  const typesArray = Array.from(selectedTypes);
  const primaryType = typesArray[0];
  const extraTypeTags = typesArray.slice(1).map(t => { const c = CATEGORIES.find(c => c.id === t); return c ? c.label : t; });
  const tagsRaw = document.getElementById('tagsInput').value.trim();
  const userTags = tagsRaw ? tagsRaw.split(/[\s,，、]+/).filter(Boolean) : [];
  const allTags = [...userTags, ...extraTypeTags];
  const title = content.length > 30 ? content.substring(0, 30) + '...' : content;
  // Extract URLs from content
  const detectedUrls = extractUrls(content);
  _lastRawInputText = detectedUrls.length > 0 ? content : ''; // 记录原始文本用于前端预解析
  const entry = { title, content, type: primaryType, tags: allTags, urls: detectedUrls, source: /iPhone|iPad|Android/i.test(navigator.userAgent) ? '手机' : '电脑' };
  try {
    const res = await fetch(`${API_BASE}/entries`, { method: 'POST', headers, body: JSON.stringify(entry) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const saved = await res.json();
    document.getElementById('contentInput').value = '';
    document.getElementById('contentInput').style.height = 'auto';
    document.getElementById('tagsInput').value = '';
    selectedTypes.clear(); currentRecommended = []; manuallyDeselected.clear();
    renderComposeChips();
    btn.disabled = false; btn.textContent = '记下来';
    if (navigator.vibrate) navigator.vibrate(10);
    const savedEntry = saved[0] || { ...entry, content };
    // If URL detected — main feedback is link content reading
    if (detectedUrls.length > 0) {
      showToast('已保存，正在读取链接内容...');
      generateInsightWithLink(savedEntry, detectedUrls[0]);
    } else {
      showToast('已记录 ✓');
      generateInsight(savedEntry);
    }
  } catch (err) {

    showToast('保存失败，请检查网络');

// ---- URL Extraction ----
function extractUrls(text) {
  const urlRegex = /https?:\/\/[^\s<>"\u4e00-\u9fff]+/gi;
  const matches = text.match(urlRegex) || [];
  // Also detect short links like xhslink.com/xxx
  const shortRegex = /(?:xhslink\.com|b23\.tv|t\.cn|dwz\.cn|youtu\.be)\/[^\s<>"]+/gi;
  const shortMatches = (text.match(shortRegex) || []).map(u => u.startsWith('http') ? u : 'https://' + u);
  return [...new Set([...matches, ...shortMatches])];
}

// Identify link platform
function identifyPlatform(url) {
  const u = url.toLowerCase();
  if (/xiaohongshu\.com|xhslink\.com|xhs\.cn/.test(u)) return { name: '小红书', icon: '📕' };
  if (/youtube\.com|youtu\.be/.test(u)) return { name: 'YouTube', icon: '▶️' };
  if (/bilibili\.com|b23\.tv/.test(u)) return { name: 'B站', icon: '📺' };
  if (/zhihu\.com/.test(u)) return { name: '知乎', icon: '💬' };
  if (/weixin\.qq\.com|mp\.weixin/.test(u)) return { name: '微信公众号', icon: '💚' };
  if (/douyin\.com/.test(u)) return { name: '抖音', icon: '🎵' };
  if (/twitter\.com|x\.com/.test(u)) return { name: 'X/Twitter', icon: '🐦' };
  if (/github\.com/.test(u)) return { name: 'GitHub', icon: '🐙' };
  if (/juejin\.cn/.test(u)) return { name: '掘金', icon: '💎' };
  if (/36kr\.com/.test(u)) return { name: '36氪', icon: '📰' };
  if (/sspai\.com/.test(u)) return { name: '少数派', icon: '📝' };
  if (/notion\.so|notion\.site/.test(u)) return { name: 'Notion', icon: '📄' };
  if (/medium\.com/.test(u)) return { name: 'Medium', icon: '📖' };
  try { return { name: new URL(url).hostname.replace('www.', ''), icon: '🔗' }; } catch { return { name: '网页', icon: '🔗' }; }
}

// ---- 小红书分享文本预解析（前端直接提取，不依赖后端）----
function parseXhsShareText(fullText) {
  // 小红书分享文本常见格式:
  // 格式A: "58 花名不详🌿 发布了一篇小红书笔记，快来看吧！ 😆 笔记标题 😆 http://xhslink.com/a/xxx"
  // 格式B: "#标题标签# 作者名的小红书 http://xhslink.com/xxx"
  // 格式C: "标题内容 💽 作者... http://xhslink.com/xxx 复制后打开【小红书】查看笔记！"
  // 格式D: "标题内容 http://xhslink.com/xxx 复制后打开【小红书】查看笔记！"
  if (!fullText || !/xhslink\.com|xiaohongshu\.com/.test(fullText)) return null;

  let author = '', title = '';

  // 格式A: "XX 作者名 发布了一篇小红书笔记" + "😆 标题 😆"
  const m1 = fullText.match(/\d+\s+(.+?)\s+发布了一篇小红书笔记/);
  if (m1) author = m1[1].trim();

  // 提取 😆...😆 之间的标题
  const m2 = fullText.match(/😆\s*(.+?)\s*😆/);
  if (m2) title = m2[1].trim();

  // "来自 作者名 的分享/小红书"
  if (!author) {
    const m3 = fullText.match(/来自\s*(.+?)\s*的(?:分享|小红书)/);
    if (m3) author = m3[1].trim();
  }

  // 格式B: #话题标签# 作为标题线索
  if (!title) {
    const hashTags = fullText.match(/#([^#]+?)#/g);
    if (hashTags && hashTags.length > 0) {
      title = hashTags.map(t => t.replace(/#/g, '')).join(' ');
    }
  }

  // 格式C/D（通用 fallback）: URL 前面的内容就是标题
  // 去掉已知后缀和 URL，剩下的就是标题
  if (!title) {
    const urlMatch = fullText.match(/https?:\/\/(xhslink\.com|xiaohongshu\.com)[^\s]*/);
    if (urlMatch) {
      let beforeUrl = fullText.substring(0, fullText.indexOf(urlMatch[0])).trim();
      // 清理尾部 emoji 和省略号（如 "💽 Claude..."）
      // 如果尾部有 "作者..." 的模式，尝试提取作者
      const authorTrail = beforeUrl.match(/[\s\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]+(\S+?)\.{2,3}$/u);
      if (authorTrail) {
        author = author || authorTrail[1].trim();
        beforeUrl = beforeUrl.substring(0, authorTrail.index).trim();
      }
      // 清理末尾残留的 emoji
      beforeUrl = beforeUrl.replace(/[\s\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}]+$/u, '').trim();
      if (beforeUrl.length >= 2) {
        title = beforeUrl;
      }
    }
  }

  // 去除作者名前后的数字编号
  if (author) author = author.replace(/^\d+\s*/, '').trim();

  if (!author && !title) return null;

  const platform = { name: '小红书', icon: '📕' };
  const summaryText = title || `来自 ${author} 的小红书笔记`;
  return {
    title: title || '小红书笔记',
    description: summaryText,
    bodyText: summaryText,
    summary: {
      title: title || '小红书笔记',
      platform,
      text: summaryText,
      keywords: [],
      author: author || '',
      extraInfo: author ? `👤 ${author}` : '',
      contentType: '',
    },
    _fromShareText: true,
  };
}

// ---- Link Parser API ----
const LINK_PARSER_API = 'https://link-parser-api.onrender.com'; // 部署后的地址
const LINK_PARSER_LOCAL = 'http://localhost:8900'; // 本地调试

// 存储原始输入文本（用于前端预解析 fallback）
let _lastRawInputText = '';

async function fetchLinkContent(url) {
  // 1. 先尝试自建 API（服务端 httpx 抓取，支持小红书/B站/YouTube等）
  const apiResult = await fetchFromParserAPI(url);
  if (apiResult) return apiResult;

  // 2. 降级：CORS proxy（对普通网页可能有效）
  const proxyResult = await fetchFromCorsProxy(url);
  if (proxyResult) return proxyResult;

  // 3. 最终降级：从分享文本中直接提取（小红书专用）
  if (_lastRawInputText) {
    const xhsResult = parseXhsShareText(_lastRawInputText);
    if (xhsResult) return xhsResult;
  }

  return null;
}

async function fetchFromParserAPI(url) {
  // 尝试远程 API，然后本地
  const endpoints = [LINK_PARSER_API, LINK_PARSER_LOCAL];
  for (const base of endpoints) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 18000);
      const res = await fetch(`${base}/parse?url=${encodeURIComponent(url)}`, {
        signal: controller.signal,
      });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.error) continue;

      // 检测"有结构但无实质内容"的情况（后端反爬拿到空壳数据）
      const FALLBACK_TITLES = ['小红书笔记', '未获取到标题', ''];
      const hasRealTitle = data.title && !FALLBACK_TITLES.includes(data.title);
      const hasRealSummary = data.summary && data.summary.length > 2;
      const hasRealAuthor = data.author && data.author !== '未知' && data.author !== '';
      if (!hasRealTitle && !hasRealSummary && !hasRealAuthor) continue; // 视为失败，尝试下一个

      // 转换为前端统一格式
      const platform = data.platform || identifyPlatform(url);
      const keywords = extractKeywords(`${data.title || ''} ${data.summary || ''}`).slice(0, 5);
      return {
        title: data.title || '',
        description: data.summary || '',
        bodyText: data.summary || '',
        summary: {
          title: data.title || '未获取到标题',
          platform,
          text: data.summary || '',
          keywords,
          author: data.author || '',
          extraInfo: data.extra_info || '',
          contentType: data.content_type || '',
        },
      };
    } catch {
      continue;
    }
  }
  return null;
}

async function fetchFromCorsProxy(url) {
  const proxies = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  ];
  for (const makeProxy of proxies) {
    try {
      const proxyUrl = makeProxy(url);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(proxyUrl, {
        signal: controller.signal,
        headers: { 'Accept': 'text/html,application/xhtml+xml,*/*' }
      });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const html = await res.text();
      if (html.length < 100) continue;
      return parseHtmlContent(html, url);
    } catch { continue; }
  }
  return null;
}

function parseHtmlContent(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  let title = '';
  const ogTitle = doc.querySelector('meta[property="og:title"]');
  const twitterTitle = doc.querySelector('meta[name="twitter:title"]');
  const titleTag = doc.querySelector('title');
  title = (ogTitle?.content || twitterTitle?.content || titleTag?.textContent || '').trim();

  let description = '';
  const ogDesc = doc.querySelector('meta[property="og:description"]');
  const twitterDesc = doc.querySelector('meta[name="twitter:description"]');
  const metaDesc = doc.querySelector('meta[name="description"]');
  description = (ogDesc?.content || twitterDesc?.content || metaDesc?.content || '').trim();

  ['script','style','nav','footer','header','aside','iframe','noscript','svg'].forEach(tag => {
    doc.querySelectorAll(tag).forEach(el => el.remove());
  });
  let bodyText = '';
  const article = doc.querySelector('article') || doc.querySelector('[role="main"]') || doc.querySelector('.content');
  bodyText = (article || doc.body)?.textContent || '';
  bodyText = bodyText.replace(/\s+/g, ' ').trim();
  if (bodyText.length > 2000) bodyText = bodyText.substring(0, 2000);

  const platform = identifyPlatform(url);
  const keywords = extractKeywords(`${title} ${description} ${bodyText}`).slice(0, 5);
  let summary = '';
  if (description && description.length > 30) {
    summary = description.length > 300 ? description.substring(0, 300) + '...' : description;
  } else if (bodyText.length > 50) {
    const sentences = bodyText.match(/[^。！？.!?\n]+[。！？.!?\n]?/g) || [];
    summary = sentences.filter(s => s.trim().length > 10).slice(0, 4).join('').trim();
    if (summary.length > 300) summary = summary.substring(0, 300) + '...';
    if (summary.length < 20) summary = bodyText.substring(0, 200) + '...';
  } else if (description) { summary = description; }
  if (!summary && title) summary = `来自${platform.name}的内容：${title}`;
  if (!summary) return null;
  return { title, description, bodyText, summary: { title: title || '未获取到标题', platform, text: summary, keywords } };
}

// ---- Insight with Link Summary ----
async function generateInsightWithLink(savedEntry, url) {
  const container = document.getElementById('insightContainer');
  const platform = identifyPlatform(url);

  // Show loading state — clearly tell user we're reading the link
  container.innerHTML = `
    <div class="insight-card link-reading-card">
      <div class="insight-header">
        <span class="insight-icon">${platform.icon}</span>
        <span class="insight-title">正在为你读取内容...</span>
      </div>
      <div class="link-reading-progress">
        <div class="link-reading-bar"><div class="link-reading-fill"></div></div>
        <span class="link-reading-hint">正在访问${platform.name}并解析页面内容</span>
      </div>
    </div>`;

  // Fetch link content — this is the main event
  const linkData = await fetchLinkContent(url);

  // Load history for insight (secondary, in background)
  try {
    if (cachedEntries.length === 0) {
      const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers });
      if (res.ok) cachedEntries = await res.json();
    }
  } catch {}
  const others = cachedEntries.filter(e => e.id !== savedEntry.id);
  const insight = analyzeInsight(savedEntry, others);
  cachedEntries.unshift(savedEntry);
  if (cachedEntries.length > 30) cachedEntries = cachedEntries.slice(0, 30);

  // ========== BUILD RESULT CARD ==========

  if (linkData && linkData.summary && linkData.summary.text && linkData.summary.text.length > 2) {
    // SUCCESS: Link content is the MAIN feedback
    const s = linkData.summary;
    const displayPlatform = s.platform || platform;

    // Save to DB asynchronously
    saveLinkSummary(savedEntry.id, {
      url, title: s.title, platform: displayPlatform.name, text: s.text,
      keywords: s.keywords || [], author: s.author || '', extra_info: s.extraInfo || '',
    });

    // Build the primary content card — link summary IS the feedback
    container.innerHTML = `
      <div class="insight-card link-result-card">
        <div class="insight-header">
          <span class="insight-icon">${displayPlatform.icon}</span>
          <span class="insight-title">已读取 · ${escapeHtml(displayPlatform.name)}</span>
          <button class="insight-close" onclick="this.closest('.insight-card').remove()">&times;</button>
        </div>

        <div class="link-result-main">
          ${s.title ? `<div class="link-result-title">${escapeHtml(s.title)}</div>` : ''}
          ${s.author ? `<div class="link-result-meta">👤 ${escapeHtml(s.author)}</div>` : ''}
          ${s.extraInfo ? `<div class="link-result-meta">${escapeHtml(s.extraInfo)}</div>` : ''}
          <div class="link-result-summary">${escapeHtml(s.text)}</div>
          ${s.keywords && s.keywords.length > 0 ? `
            <div class="link-result-keywords">
              ${s.keywords.map(k => `<span class="link-kw-tag">${escapeHtml(k)}</span>`).join('')}
            </div>` : ''}
        </div>

        ${insight.related && insight.related.length > 0 ? `
          <div class="link-result-related">
            <div class="insight-related-label">你的想法库中有相关记录</div>
            ${insight.related.map(r => `<div class="insight-related-item">${escapeHtml(r)}</div>`).join('')}
          </div>` : ''}
      </div>`;
  } else {
    // FAILED: Fall back to encouragement + explain link is saved
    container.innerHTML = `
      <div class="insight-card${insight.mode === 'encouragement' ? ' encouragement' : ''}">
        <div class="insight-header">
          <span class="insight-icon">${platform.icon}</span>
          <span class="insight-title">链接已保存</span>
          <button class="insight-close" onclick="this.closest('.insight-card').remove()">&times;</button>
        </div>
        <div class="insight-body" style="margin-bottom:8px;">
          <span style="color:var(--text-tertiary);">暂时无法读取${platform.name}的页面内容，链接已保存到记录中。</span>
        </div>
        <div class="insight-body">${insight.summary}</div>
        ${insight.related && insight.related.length > 0 ? `
          <div class="insight-related"><div class="insight-related-label">关联记录</div>
          ${insight.related.map(r => `<div class="insight-related-item">${escapeHtml(r)}</div>`).join('')}</div>` : ''}
      </div>`;
  }
}

// ---- Save link summary to DB ----
async function saveLinkSummary(entryId, summaryData) {
  if (!entryId) return;
  try {
    await fetch(`${API_BASE}/entries?id=eq.${entryId}`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ link_summary: summaryData })
    });
  } catch (err) {
    console.warn('Failed to save link summary:', err);
  }
}

// ---- Insight (post-save) ----
async function generateInsight(newEntry) {
  const container = document.getElementById('insightContainer');
  try {
    if (cachedEntries.length === 0) {
      const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers });
      if (res.ok) cachedEntries = await res.json();
    }
  } catch {}
  const others = cachedEntries.filter(e => e.id !== newEntry.id);
  const insight = analyzeInsight(newEntry, others);
  cachedEntries.unshift(newEntry);
  if (cachedEntries.length > 30) cachedEntries = cachedEntries.slice(0, 30);
  container.innerHTML = `
    <div class="insight-card${insight.mode === 'encouragement' ? ' encouragement' : ''}">
      <div class="insight-header">
        <span class="insight-icon">${insight.icon}</span><span class="insight-title">${insight.title}</span>
        <button class="insight-close" onclick="this.closest('.insight-card').remove()">&times;</button>
      </div>
      <div class="insight-body">${insight.summary}</div>
      ${insight.related && insight.related.length > 0 ? `
        <div class="insight-related"><div class="insight-related-label">关联记录</div>
        ${insight.related.map(r => `<div class="insight-related-item">${escapeHtml(r)}</div>`).join('')}</div>` : ''}
    </div>`;
}

function analyzeInsight(newEntry, history) {
  const tl = CATEGORIES.find(c => c.id === newEntry.type)?.label || newEntry.type;

  // No history at all — first entry ever
  if (history.length === 0) {
    return pickEncouragement(newEntry, tl, 0);
  }

  const newWords = extractKeywords(newEntry.content);
  const scored = history.map(e => {
    const eWords = extractKeywords(e.content);
    const overlap = newWords.filter(w => eWords.includes(w));
    const sameType = e.type === newEntry.type ? 1 : 0;
    const newTags = new Set(newEntry.tags || []);
    const tagOverlap = (e.tags || []).filter(t => newTags.has(t)).length;
    return { entry: e, score: overlap.length * 3 + sameType + tagOverlap * 2, overlapWords: overlap };
  }).filter(s => s.score > 2).sort((a, b) => b.score - a.score);

  // Count same-type entries in history
  const tc = {}; history.forEach(e => { tc[e.type] = (tc[e.type] || 0) + 1; });
  const sameTypeCount = (tc[newEntry.type] || 0) + 1; // +1 for the new one

  // No strong connections → encouragement mode
  if (scored.length === 0) {
    return pickEncouragement(newEntry, tl, sameTypeCount);
  }

  // Has connections → insight mode (existing logic)
  const top = scored.slice(0, 3);
  const related = top.map(s => s.entry.content.length > 50 ? s.entry.content.substring(0, 50) + '...' : s.entry.content);
  const allOW = [...new Set(top.flatMap(s => s.overlapWords))];
  let summary = '';
  if (allOW.length > 0) {
    const kw = allOW.slice(0, 4).map(w => `<strong>${w}</strong>`).join('、');
    const stc = top.filter(s => s.entry.type === newEntry.type).length;
    if (top.length >= 2) {
      summary = `这条记录与你之前的 <strong>${top.length} 条想法</strong>有关联，核心关键词：${kw}。`;
      summary += stc >= 2 ? ` 你已经在「${tl}」类下积累了多条相关记录，值得持续深挖。` : ` 这些想法跨越不同分类，或许正形成更大的思考脉络。`;
    } else {
      summary = `这条记录与一条历史想法产生了共鸣，关键词：${kw}。持续记录，连点成线。`;
    }
  } else {
    summary = `你最近在相似方向上有不少思考，持续积累会带来意想不到的灵感碰撞。`;
  }
  if (sameTypeCount >= 5) {
    summary += ` 提示：你在「${tl}」下已有 <strong>${sameTypeCount}</strong> 条记录。`;
  }
  return { mode: 'insight', icon: '✨', title: '灵感亮点', summary, related };
}

// Positive encouragement when no strong connections found
function pickEncouragement(newEntry, typeLabel, sameTypeCount) {
  const content = newEntry.content;
  const len = content.length;

  // Build a pool of encouragements and randomly pick one
  const pool = [];

  // Based on content length
  if (len > 100) {
    pool.push('这条记录很丰富，长篇思考往往能沉淀出最好的洞察。');
    pool.push('写得挺详细的，认真记录的习惯会让你未来受益。');
  } else if (len > 40) {
    pool.push('不错的记录，每一条想法都是未来灵感的种子。');
    pool.push('又多了一条，保持这个节奏，好想法会越积越多。');
  } else {
    pool.push('简短有力，有时候最棒的灵感就是几个字。');
    pool.push('先记下来就对了，以后说不定会用到。');
  }

  // Based on type
  const typeEncouragements = {
    thought: ['每一个想法都值得被记住，继续思考。', '想法记下来才不会溜走，做得好。'],
    inspiration: ['灵感稍纵即逝，你抓住了它。', '又一个灵感入库了，说不定哪天它就派上用场。'],
    todo: ['记下待办是搞定事情的第一步。', '加入清单了，执行力从这里开始。'],
    quote: ['好的摘录会在某个时刻点亮你的思路。', '收藏的好句子，未来会跟你的想法产生共鸣。'],
    link: ['收藏了一条资源，好内容值得回头看。', '链接存好了，以后想找就能找到。'],
    reflection: ['感悟是最珍贵的思考结晶。', '反思让人进步，这条记录很有价值。'],
    product: ['产品嗅觉在线，保持对需求的敏感度。', '又一条产品思考，这些积累会成为你的竞争力。'],
  };
  const typePool = typeEncouragements[newEntry.type] || typeEncouragements.thought;
  pool.push(...typePool);

  // Based on accumulation count
  if (sameTypeCount === 1) {
    pool.push(`这是你的第一条「${typeLabel}」记录，一个好的开始。`);
  } else if (sameTypeCount >= 5 && sameTypeCount < 10) {
    pool.push(`你在「${typeLabel}」下已经积累了 <strong>${sameTypeCount}</strong> 条，量变即将产生质变。`);
  } else if (sameTypeCount >= 10) {
    pool.push(`「${typeLabel}」已有 <strong>${sameTypeCount}</strong> 条记录了，这已经是一个小型专题库。`);
  }

  // Time-based encouragements
  const hour = new Date().getHours();
  if (hour >= 0 && hour < 6) {
    pool.push('深夜灵感往往最真实，休息好也很重要。');
  } else if (hour >= 6 && hour < 9) {
    pool.push('早起记录想法，今天一定会很高效。');
  } else if (hour >= 22) {
    pool.push('临睡前的思考往往特别清醒，记下来是对的。');
  }

  const picked = pool[Math.floor(Math.random() * pool.length)];
  return { mode: 'encouragement', icon: '💫', title: '已记录', summary: picked, related: [] };
}

function detectIntent(question) {
  const q = question.toLowerCase();

  // Search intent: user wants to find a specific record
  const searchPatterns = [
    /找|搜|查|哪条|哪个|哪篇|在哪|定位|搜索/,
    /记过|写过|提过|说过|记录过|有没有/,
    /关于.{1,8}(的|那条|那个|记录)/,
    /^.{1,15}(在哪|是哪)/,
  ];

  // Summary intent: user wants analysis/thinking
  const summaryPatterns = [
    /总结|分析|归纳|梳理|盘点|回顾|复盘|概括/,
    /有什么|有哪些|有几条|多少条/,
    /趋势|规律|特点|共性|主题|方向/,
    /怎么看|怎么想|什么想法|什么思考/,
    /帮我|给我|列出|整理|提炼/,
    /最近|这段时间|这周|这几天|近期/,
  ];

  let searchScore = 0, summaryScore = 0;
  searchPatterns.forEach(p => { if (p.test(q)) searchScore++; });
  summaryPatterns.forEach(p => { if (p.test(q)) summaryScore++; });

  // If question is short and looks like a keyword → treat as search
  if (question.length <= 8 && summaryScore === 0) searchScore += 2;

  // If question ends with ? or ？ and is longer → more likely summary
  if (/[?？]$/.test(question) && question.length > 10) summaryScore += 1;

  return summaryScore > searchScore ? 'summary' : 'search';
}

async function handleAsk() {
  const input = document.getElementById('askInput');
  const question = input.value.trim();
  if (!question) return;

  const container = document.getElementById('answerContainer');
  const sendBtn = document.getElementById('askSend');
  sendBtn.disabled = true;

  // Show thinking
  container.innerHTML = `
    <div class="answer-panel search-mode">
      <div class="thinking">
        <div class="thinking-dots"><span></span><span></span><span></span></div>
        <span class="thinking-text">正在思考...</span>
      </div>
    </div>`;

  // Load all entries if not loaded
  if (allEntries.length === 0) {
    try {
      const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=200`, { headers });
      if (res.ok) allEntries = await res.json();
    } catch {
      container.innerHTML = '';
      showToast('加载记录失败');
      sendBtn.disabled = false;
      return;
    }
  }

  if (allEntries.length === 0) {
    container.innerHTML = '';
    showToast('还没有记录');
    sendBtn.disabled = false;
    return;
  }

  // Small delay for UX feel
  await new Promise(r => setTimeout(r, 400));

  const intent = detectIntent(question);

  if (intent === 'search') {
    renderSearchAnswer(question, container);
  } else {
    renderSummaryAnswer(question, container);
  }

  sendBtn.disabled = false;
  // Don't clear input so user can refine
}

// ---- Search Mode: Find and highlight records ----
function renderSearchAnswer(question, container) {
  const questionKW = extractKeywords(question);
  const questionLower = question.toLowerCase();

  // Score each entry for relevance
  const scored = allEntries.map(e => {
    const entryKW = extractKeywords(e.content);
    const contentLower = e.content.toLowerCase();

    let score = 0;
    const matchedWords = [];

    // Direct substring match (strongest signal)
    questionKW.forEach(kw => {
      if (contentLower.includes(kw.toLowerCase())) {
        score += 5;
        matchedWords.push(kw);
      }
    });

    // Keyword overlap
    const overlap = questionKW.filter(w => entryKW.includes(w));
    score += overlap.length * 3;
    overlap.forEach(w => { if (!matchedWords.includes(w)) matchedWords.push(w); });

    // Tag match
    const tags = (e.tags || []).map(t => t.toLowerCase());
    questionKW.forEach(kw => {
      if (tags.some(t => t.includes(kw.toLowerCase()))) score += 4;
    });

    // Type label match
    const tl = typeLabels[e.type] || '';
    if (questionLower.includes(tl)) score += 3;

    return { entry: e, score, matchedWords: [...new Set(matchedWords)] };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    container.innerHTML = `
      <div class="answer-panel search-mode">
        <div class="answer-intent">
          <span class="answer-intent-icon">🔍</span>
          <span class="answer-intent-label">搜索记录</span>
          <button class="answer-close" onclick="closeAnswer()">&times;</button>
        </div>
        <div style="padding: 20px 16px; text-align: center; color: var(--text-tertiary); font-size: 14px;">
          没找到相关记录，试试换个关键词？
        </div>
      </div>`;
    return;
  }

  const topResults = scored.slice(0, 5);

  container.innerHTML = `
    <div class="answer-panel search-mode">
      <div class="answer-intent">
        <span class="answer-intent-icon">🔍</span>
        <span class="answer-intent-label">找到 ${scored.length} 条相关记录</span>
        <button class="answer-close" onclick="closeAnswer()">&times;</button>
      </div>
      <div class="answer-question">"${escapeHtml(question)}"</div>
      <div class="search-results">
        ${topResults.map((s, i) => {
          const e = s.entry;
          const date = new Date(e.created_at);
          const timeStr = formatTime(date);
          const highlighted = highlightText(e.content, s.matchedWords);
          const relevance = Math.min(100, Math.round(s.score / topResults[0].score * 100));
          return `
            <div class="search-result-item" onclick="scrollToEntry('${e.id}')">
              <div class="search-result-header">
                <span class="search-result-badge ${e.type}">${typeLabels[e.type] || e.type}</span>
                <span class="search-result-time">${timeStr}</span>
              </div>
              <div class="search-result-content">${highlighted}</div>
              <div class="search-result-score">
                <span style="color:var(--accent);">●</span> 相关度 ${relevance}%
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function highlightText(text, keywords) {
  let result = escapeHtml(text);
  if (text.length > 120) result = escapeHtml(text.substring(0, 120)) + '...';
  keywords.forEach(kw => {
    const regex = new RegExp(`(${escapeRegex(escapeHtml(kw))})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  });
  return result;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function scrollToEntry(id) {
  // Remove previous highlights
  document.querySelectorAll('.entry-card.highlighted').forEach(el => el.classList.remove('highlighted'));

  const card = document.querySelector(`.entry-card[data-id="${id}"]`);
  if (card) {
    card.classList.add('highlighted');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Remove highlight after 4s
    setTimeout(() => card.classList.remove('highlighted'), 4000);
  } else {
    showToast('该记录不在当前列表中');
  }
}

// ---- Summary Mode: Think and summarize ----
function renderSummaryAnswer(question, container) {
  const questionKW = extractKeywords(question);
  const questionLower = question.toLowerCase();

  // Find relevant entries
  const scored = allEntries.map(e => {
    const entryKW = extractKeywords(e.content);
    const contentLower = e.content.toLowerCase();
    let score = 0;
    questionKW.forEach(kw => { if (contentLower.includes(kw.toLowerCase())) score += 5; });
    const overlap = questionKW.filter(w => entryKW.includes(w));
    score += overlap.length * 3;
    const tags = (e.tags || []).map(t => t.toLowerCase());
    questionKW.forEach(kw => { if (tags.some(t => t.includes(kw.toLowerCase()))) score += 4; });
    const tl = typeLabels[e.type] || '';
    if (questionLower.includes(tl)) score += 3;
    return { entry: e, score };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  // If no keyword matches, use all entries for broad questions
  const relevantEntries = scored.length > 0 ? scored.slice(0, 15).map(s => s.entry) : allEntries.slice(0, 15);
  const isGlobal = scored.length === 0; // broad question about everything

  // Generate summary
  const summary = generateSummary(question, relevantEntries, isGlobal);

  const sources = relevantEntries.slice(0, 5).map(e =>
    e.content.length > 40 ? e.content.substring(0, 40) + '...' : e.content
  );

  container.innerHTML = `
    <div class="answer-panel summary-mode">
      <div class="answer-intent">
        <span class="answer-intent-icon">🧠</span>
        <span class="answer-intent-label">思考总结</span>
        <button class="answer-close" onclick="closeAnswer()">&times;</button>
      </div>
      <div class="answer-question">"${escapeHtml(question)}"</div>
      <div class="summary-body">${summary}</div>
      ${sources.length > 0 ? `
        <div class="summary-sources">
          <div class="summary-sources-label">基于以下记录</div>
          ${sources.map(s => `<div class="summary-source-item">${escapeHtml(s)}</div>`).join('')}
        </div>` : ''}
    </div>`;
}

function generateSummary(question, relevantEntries, isGlobal) {
  if (relevantEntries.length === 0) {
    return '没有找到相关记录来回答这个问题。试试记录更多想法，让知识库更丰富。';
  }

  const questionLower = question.toLowerCase();

  // Analyze entries
  const typeDist = {};
  const tagDist = {};
  const timeSpan = { earliest: null, latest: null };
  const allKeywords = {};
  const contentSnippets = [];

  relevantEntries.forEach(e => {
    // Type distribution
    typeDist[e.type] = (typeDist[e.type] || 0) + 1;

    // Tag distribution
    (e.tags || []).forEach(t => {
      const typeLabelSet = new Set(Object.values(typeLabels));
      if (!typeLabelSet.has(t)) tagDist[t] = (tagDist[t] || 0) + 1;
    });

    // Time span
    const d = new Date(e.created_at);
    if (!timeSpan.earliest || d < timeSpan.earliest) timeSpan.earliest = d;
    if (!timeSpan.latest || d > timeSpan.latest) timeSpan.latest = d;

    // Keywords
    extractKeywords(e.content).forEach(kw => { allKeywords[kw] = (allKeywords[kw] || 0) + 1; });

    // Content snippets
    contentSnippets.push(e.content.length > 60 ? e.content.substring(0, 60) : e.content);
  });

  // Build structured summary
  let html = '';

  // Section 1: Overview
  html += '<div class="summary-section">';
  html += '<div class="summary-section-title">概览</div>';

  if (isGlobal) {
    html += `<div class="summary-point">你目前共有 <strong>${allEntries.length}</strong> 条记录`;
    if (timeSpan.earliest) {
      const days = Math.ceil((timeSpan.latest - timeSpan.earliest) / 86400000);
      html += `，时间跨度 <strong>${days > 0 ? days + ' 天' : '今天'}</strong>`;
    }
    html += `。</div>`;
  } else {
    html += `<div class="summary-point">找到 <strong>${relevantEntries.length}</strong> 条相关记录。`;
    if (timeSpan.earliest && timeSpan.latest) {
      const days = Math.ceil((timeSpan.latest - timeSpan.earliest) / 86400000);
      html += ` 时间跨度 <strong>${days > 0 ? days + ' 天' : '今天内'}</strong>。`;
    }
    html += '</div>';
  }

  // Type breakdown
  const typeBreakdown = Object.entries(typeDist)
    .sort((a, b) => b[1] - a[1])
    .map(([type, count]) => `${typeLabels[type] || type} ${count} 条`)
    .join('、');
  if (typeBreakdown) {
    html += `<div class="summary-point">分类分布：${typeBreakdown}。</div>`;
  }
  html += '</div>';

  // Section 2: Key themes
  const topKeywords = Object.entries(allKeywords)
    .sort((a, b) => b[1] - a[1])
    .filter(([_, c]) => c >= 2)
    .slice(0, 8);

  if (topKeywords.length > 0) {
    html += '<div class="summary-section">';
    html += '<div class="summary-section-title">核心主题</div>';
    const kwStr = topKeywords.map(([w, c]) => `<strong>${w}</strong>(${c}次)`).join('、');
    html += `<div class="summary-point">高频关键词：${kwStr}。</div>`;

    // Find thematic clusters
    const clusters = findThematicClusters(relevantEntries);
    if (clusters.length > 0) {
      clusters.forEach(cl => {
        html += `<div class="summary-point">${cl}</div>`;
      });
    }
    html += '</div>';
  }

  // Section 3: Observations / Thinking
  html += '<div class="summary-section">';
  html += '<div class="summary-section-title">思考</div>';

  // Check for patterns
  const dominantType = Object.entries(typeDist).sort((a, b) => b[1] - a[1])[0];
  if (dominantType && dominantType[1] >= 3) {
    const label = typeLabels[dominantType[0]] || dominantType[0];
    html += `<div class="summary-point">你的记录偏重「${label}」类，占 ${Math.round(dominantType[1] / relevantEntries.length * 100)}%，说明这是你当前重点关注的方向。</div>`;
  }

  // Check for evolution of thought
  if (relevantEntries.length >= 3) {
    const earlier = relevantEntries.slice(-Math.ceil(relevantEntries.length / 2));
    const later = relevantEntries.slice(0, Math.ceil(relevantEntries.length / 2));
    const earlyKW = new Set(earlier.flatMap(e => extractKeywords(e.content)));
    const lateKW = new Set(later.flatMap(e => extractKeywords(e.content)));
    const newConcepts = [...lateKW].filter(w => !earlyKW.has(w) && w.length >= 2).slice(0, 5);
    if (newConcepts.length >= 2) {
      html += `<div class="summary-point">最近的记录中出现了一些新概念：<strong>${newConcepts.join('、')}</strong>，你的思考在不断延伸。</div>`;
    }
  }

  // Actionable suggestions
  const todoEntries = relevantEntries.filter(e => e.type === 'todo');
  if (todoEntries.length > 0) {
    html += `<div class="summary-point">其中有 <strong>${todoEntries.length}</strong> 条待办事项，别忘了跟进执行。</div>`;
  }

  // Tags insight
  const topTags = Object.entries(tagDist).sort((a, b) => b[1] - a[1]).slice(0, 3);
  if (topTags.length > 0) {
    const tagStr = topTags.map(([t, c]) => `#${t}`).join(' ');
    html += `<div class="summary-point">常用标签：${tagStr}——这些可能是你值得深耕的领域标签。</div>`;
  }

  // General encouragement if sparse
  if (relevantEntries.length < 3) {
    html += `<div class="summary-point">相关记录还比较少，持续记录后会产生更丰富的洞察。</div>`;
  }

  html += '</div>';
  return html;
}

function findThematicClusters(entries) {
  // Group entries by keyword co-occurrence
  const clusters = [];
  const kwSets = entries.map(e => new Set(extractKeywords(e.content)));

  // Find pairs of entries with high overlap
  const seen = new Set();
  for (let i = 0; i < entries.length && clusters.length < 3; i++) {
    if (seen.has(i)) continue;
    const group = [i];
    for (let j = i + 1; j < entries.length; j++) {
      if (seen.has(j)) continue;
      const overlap = [...kwSets[i]].filter(w => kwSets[j].has(w));
      if (overlap.length >= 3) {
        group.push(j);
        seen.add(j);
      }
    }
    if (group.length >= 2) {
      seen.add(i);
      const sharedKW = [...kwSets[group[0]]].filter(w =>
        group.every(idx => kwSets[idx].has(w))
      ).slice(0, 3);
      if (sharedKW.length > 0) {
        clusters.push(`你有 <strong>${group.length}</strong> 条记录围绕「<strong>${sharedKW.join('、')}</strong>」展开，形成了一个小的思考集群。`);
      }
    }
  }
  return clusters;
}

function closeAnswer() {
  document.getElementById('answerContainer').innerHTML = '';
  // Remove any highlights
  document.querySelectorAll('.entry-card.highlighted').forEach(el => el.classList.remove('highlighted'));
}

// ---- Keyword Extraction (shared) ----
function extractKeywords(text) {
  const cleaned = text.replace(/https?:\/\/\S+/g, '').replace(/[^\u4e00-\u9fff\w]+/g, ' ').toLowerCase();
  const chineseMatches = text.match(/[\u4e00-\u9fff]{2,6}/g) || [];
  const englishMatches = cleaned.match(/[a-z]{3,}/g) || [];
  const stopWords = new Set([
    '的','了','是','在','我','有','和','就','不','人','都','一','一个',
    '上','也','很','到','说','要','去','你','会','着','没有','看','好',
    '这','他','她','它','们','那','个','来','但','而','与','或','等',
    '这个','那个','什么','怎么','可以','因为','所以','如果','虽然','但是',
    '还是','已经','一下','比较','这样','那样','关于','或者','以及',
    'the','and','for','that','this','with','are','was','not','but','have',
    'from','they','been','has','its','will','can','would','could','should',
  ]);
  return [...new Set([...chineseMatches, ...englishMatches].filter(w => !stopWords.has(w)))];
}

// ---- Load Entries ----
async function loadEntries() {
  const listEl = document.getElementById('entryList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=50`, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    entries = await res.json();
    cachedEntries = entries.slice(0, 30);
    allEntries = entries; // also use for Q&A
    renderEntries();
    setOnline(true);
  } catch {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">加载失败<br>请检查网络连接</div></div>';
    setOnline(false);
  }
}

function renderEntries() {
  const listEl = document.getElementById('entryList');
  const counterEl = document.getElementById('counter');
  if (entries.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">💡</div><div class="empty-text">还没有记录<br>去「记录」页写下第一条</div></div>';
    counterEl.textContent = ''; return;
  }
  counterEl.textContent = `共 ${entries.length} 条记录`;
  listEl.innerHTML = entries.map(e => {
    const date = new Date(e.created_at);
    const timeStr = formatTime(date);
    const primaryBadge = `<span class="entry-type-badge ${e.type}">${typeLabels[e.type] || e.type}</span>`;
    const typeLabelSet = new Set(Object.values(typeLabels));
    const extraBadges = (e.tags || []).filter(t => typeLabelSet.has(t) && t !== typeLabels[e.type])
      .map(t => { const cat = CATEGORIES.find(c => c.label === t); return cat ? `<span class="entry-type-badge ${cat.id}">${t}</span>` : ''; }).join('');
    const normalTags = (e.tags || []).filter(t => !typeLabelSet.has(t)).map(t => `<span class="entry-tag">#${t}</span>`).join('');
    // Link summary collapsible
    let linkSummaryHtml = '';
    if (e.link_summary && e.link_summary.title) {
      const ls = e.link_summary;
      const plat = identifyPlatform(ls.url || '');
      linkSummaryHtml = `
        <button class="link-summary-toggle" onclick="toggleLinkSummary(this, event)">
          ${plat.icon} 查看${ls.platform || plat.name}内容摘要
          <span class="toggle-arrow">▶</span>
        </button>
        <div class="link-summary-body" data-entry-id="${e.id}">
          <div class="ls-title">${escapeHtml(ls.title)}</div>
          <div class="ls-source">${plat.icon} 来源：${escapeHtml(ls.platform || plat.name)}</div>
          ${ls.author ? `<div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">👤 ${escapeHtml(ls.author)}</div>` : ''}
          ${ls.extra_info ? `<div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px;">${escapeHtml(ls.extra_info)}</div>` : ''}
          <div class="ls-text">${escapeHtml(ls.text)}</div>
          ${ls.keywords && ls.keywords.length > 0 ? `<div style="margin-top:8px;font-size:12px;color:var(--text-tertiary);">关键词：${ls.keywords.map(k => '<span style="color:var(--teal);">'+escapeHtml(k)+'</span>').join('、')}</div>` : ''}
        </div>`;
    }
    return `
      <div class="entry-card" data-id="${e.id}">
        <div class="entry-header">
          <div class="entry-badges">${primaryBadge}${extraBadges}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="entry-time">${timeStr}</span>
            <button class="entry-delete" onclick="deleteEntry('${e.id}')" title="删除">&times;</button>
          </div>
        </div>
        <div class="entry-content">${escapeHtml(e.content)}</div>
        ${normalTags ? `<div class="entry-tags">${normalTags}</div>` : ''}
        ${linkSummaryHtml}
      </div>`;
  }).join('');
}

function toggleLinkSummary(btn, event) {
  event.stopPropagation();
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  body.classList.toggle('open');
}

// ---- Delete ----
async function deleteEntry(id) {
  if (!confirm('确定删除？')) return;
  try {
    await fetch(`${API_BASE}/entries?id=eq.${id}`, { method: 'DELETE', headers });
    entries = entries.filter(e => e.id !== id);
    cachedEntries = cachedEntries.filter(e => e.id !== id);
    allEntries = allEntries.filter(e => e.id !== id);
    renderEntries(); showToast('已删除');
  } catch { showToast('删除失败'); }
}

// ---- Health ----
async function checkHealth() {
  try { const r = await fetch(`${API_BASE}/entries?select=id&limit=1`, { headers }); setOnline(r.ok); } catch { setOnline(false); }
}
function setOnline(s) {
  const d = document.getElementById('statusDot');
  d.className = s ? 'status-dot' : 'status-dot offline';
  d.title = s ? '数据库已连接' : '连接失败';
}

// ---- Utils ----
function formatTime(date) {
  const now = new Date(), diff = now - date;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
  const m = date.getMonth()+1, d = date.getDate();
  const h = String(date.getHours()).padStart(2,'0'), mi = String(date.getMinutes()).padStart(2,'0');
  if (date.getFullYear() === now.getFullYear()) return `${m}月${d}日 ${h}:${mi}`;
  return `${date.getFullYear()}/${m}/${d}`;
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- Input Events ----
const contentInput = document.getElementById('contentInput');
contentInput.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
});
contentInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, window.innerHeight*0.4) + 'px';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(onContentChange, 400);
});

// Ask input events
document.getElementById('askInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleAsk(); }
});

// ---- Init ----
window.addEventListener('DOMContentLoaded', () => {
  renderComposeChips(); updateIndicator(); checkHealth();
  fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers })
    .then(r => r.ok ? r.json() : []).then(data => { cachedEntries = data; }).catch(() => {});
});
setInterval(checkHealth, 30000);
</script>
