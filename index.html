  const panel = document.getElementById('todoPanel');
  panel.style.display = 'flex';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => panel.classList.add('open'));
  });
  renderTodoPanel();
}

// 关闭待办面板
function closeTodoPanel() {
  todoPanelOpen = false;
  const panel = document.getElementById('todoPanel');
  panel.classList.remove('open');
  setTimeout(() => { panel.style.display = 'none'; }, 350);
}

// 切换待办筛选
function switchTodoFilter(filter) {
  todoFilter = filter;
  document.querySelectorAll('.todo-filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === filter);
  });
  renderTodoList();
}

// 渲染完整面板
function renderTodoPanel() {
  const pending = todoEntries.filter(e => !e.todo_done);
  const done = todoEntries.filter(e => e.todo_done);
  const total = todoEntries.length;

  // 统计
  document.getElementById('todoPendingNum').textContent = pending.length;
  document.getElementById('todoDoneNum').textContent = done.length;
  document.getElementById('todoPanelCount').textContent = `共 ${total} 项`;

  // 进度条
  const pct = total > 0 ? Math.round(done.length / total * 100) : 0;
  document.getElementById('todoProgressFill').style.width = pct + '%';

  // 筛选计数
  document.getElementById('todoFilterPendingCount').textContent = pending.length > 0 ? `(${pending.length})` : '';
  document.getElementById('todoFilterDoneCount').textContent = done.length > 0 ? `(${done.length})` : '';

  renderTodoList();
}

// 渲染待办列表（按时间分组）
function renderTodoList() {
  const container = document.getElementById('todoListContainer');
  let items;

  if (todoFilter === 'pending') {
    items = todoEntries.filter(e => !e.todo_done);
  } else if (todoFilter === 'done') {
    items = todoEntries.filter(e => e.todo_done);
  } else {
    items = [...todoEntries];
  }

  if (items.length === 0) {
    const msg = todoFilter === 'pending' ? '没有待完成的事项，太棒了！' :
                todoFilter === 'done' ? '还没有已完成的事项' : '还没有待办记录';
    const icon = todoFilter === 'pending' ? '🎉' : '📋';
    container.innerHTML = `<div class="todo-empty"><div class="todo-empty-icon">${icon}</div><div class="todo-empty-text">${msg}</div></div>`;
    return;
  }

  // 按时间分组
  const groups = groupByTime(items);
  let html = '';

  for (const [label, groupItems] of groups) {
    html += `<div class="todo-time-group">`;
    html += `<div class="todo-time-label">${label}</div>`;
    groupItems.forEach(e => {
      const isDone = e.todo_done;
      const timeStr = formatTime(new Date(e.created_at));
      const typeLabelSet = new Set(Object.values(typeLabels));
      const tags = (e.tags || []).filter(t => !typeLabelSet.has(t));
      const tagsHtml = tags.map(t => `<span class="todo-item-tag">#${t}</span>`).join('');

      html += `
        <div class="todo-item ${isDone ? 'done' : ''}" data-id="${e.id}">
          <button class="todo-checkbox ${isDone ? 'checked' : ''}" onclick="toggleTodoDone('${e.id}', event)">
            ${isDone ? '✓' : ''}
          </button>
          <div class="todo-item-body">
            <div class="todo-item-content">${escapeHtml(e.content)}</div>
            <div class="todo-item-meta">
              <span>${timeStr}</span>
              ${tagsHtml ? `<div class="todo-item-tags">${tagsHtml}</div>` : ''}
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

// 按时间分组
function groupByTime(items) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const thisWeek = new Date(today); thisWeek.setDate(thisWeek.getDate() - 7);
  const thisMonth = new Date(today); thisMonth.setDate(thisMonth.getDate() - 30);

  const groups = new Map();
  const addTo = (label, item) => {
    if (!groups.has(label)) groups.set(label, []);
    groups.get(label).push(item);
  };

  items.forEach(item => {
    const d = new Date(item.created_at);
    if (d >= today) addTo('今天', item);
    else if (d >= yesterday) addTo('昨天', item);
    else if (d >= thisWeek) addTo('近 7 天', item);
    else if (d >= thisMonth) addTo('近 30 天', item);
    else addTo('更早', item);
  });

  return groups;
}

// 切换待办完成状态
async function toggleTodoDone(id, event) {
  event.stopPropagation();
  const entry = todoEntries.find(e => e.id === id);
  if (!entry) return;

  const newDone = !entry.todo_done;
  const itemEl = event.target.closest('.todo-item');

  // 动画
  if (itemEl) itemEl.classList.add('completing');

  // 先更新本地状态（乐观更新）
  entry.todo_done = newDone;
  [entries, cachedEntries, allEntries].forEach(list => {
    const found = list.find(e => e.id === id);
    if (found) found.todo_done = newDone;
  });

  try {
    // 尝试更新数据库
    const res = await fetch(`${API_BASE}/entries?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...headers, 'Prefer': 'return=representation' },
      body: JSON.stringify({ todo_done: newDone })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch (err) {
    // 数据库更新失败（可能字段尚未添加），用 localStorage 持久化
    console.warn('数据库更新失败，降级到本地存储:', err.message);
    saveTodoDoneLocal(id, newDone);
  }

  // 延迟一下再重新渲染（让动画完成）
  setTimeout(() => {
    renderTodoPanel();
    updateTodoHubCard();
    showToast(newDone ? '已完成 ✓' : '已恢复待办');
  }, 300);
}

// localStorage 降级：保存待办完成状态
function saveTodoDoneLocal(id, done) {
  try {
    const stored = JSON.parse(localStorage.getItem('todo_done_map') || '{}');
    if (done) stored[id] = true; else delete stored[id];
    localStorage.setItem('todo_done_map', JSON.stringify(stored));
  } catch {}
}

// localStorage 降级：恢复待办完成状态
function restoreTodoDoneLocal(items) {
  try {
    const stored = JSON.parse(localStorage.getItem('todo_done_map') || '{}');
    items.forEach(e => {
      if (typeof e.todo_done === 'undefined' || e.todo_done === null) {
        e.todo_done = !!stored[e.id];
      }
    });
  } catch {}
}

// ---- Health ----
async function checkHealth() {
  try { const r = await fetch(`${API_BASE}/entries?select=id&limit=1`, { headers }); setOnline(r.ok); } catch { setOnline(false); }
}
function setOnline(s) {
  const d = document.getElementById('statusDot');
  d.className = s ? 'status-dot' : 'status-dot offline';
  d.title = s ? '数据库已连接' : '连接失败';
}

// ---- Utils ----
function formatTime(date) {
  const now = new Date(), diff = now - date;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
  const m = date.getMonth()+1, d = date.getDate();
  const h = String(date.getHours()).padStart(2,'0'), mi = String(date.getMinutes()).padStart(2,'0');
  if (date.getFullYear() === now.getFullYear()) return `${m}月${d}日 ${h}:${mi}`;
  return `${date.getFullYear()}/${m}/${d}`;
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- Input Events ----
const contentInput = document.getElementById('contentInput');
contentInput.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
});
contentInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, window.innerHeight*0.4) + 'px';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(onContentChange, 400);
});

// Ask input events
document.getElementById('askInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleAsk(); }
});

// ---- Init ----
window.addEventListener('DOMContentLoaded', () => {
  renderComposeChips(); updateIndicator(); checkHealth();
  fetch(`${API_BASE}/entries?select=*&order=created_at.desc&limit=30`, { headers })
    .then(r => r.ok ? r.json() : []).then(data => { cachedEntries = data; loadTodoEntries(); }).catch(() => {});
});
setInterval(checkHealth, 30000);
